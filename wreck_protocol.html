<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRECK PROTOCOL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; font-family: 'Courier New', monospace;
  overflow: hidden; user-select: none;
}
#gameCanvas {
  border: 1px solid #1a2a1a;
  cursor: crosshair;
  image-rendering: pixelated;
}
#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#hud {
  position: absolute; top: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 20px; align-items: center;
  pointer-events: none;
}
.hud-item {
  color: #4eff91; font-size: 13px; letter-spacing: 1px;
  background: rgba(0,0,0,0.7); padding: 4px 10px;
  border: 1px solid #1a3a1a;
}
.hud-item span { color: #fff; }
#tooltip {
  position: absolute; background: rgba(0,0,0,0.9);
  border: 1px solid #4eff91; color: #ccc;
  font-size: 11px; padding: 6px 10px;
  pointer-events: none; display: none;
  max-width: 180px; line-height: 1.5;
}
#instructions {
  position: absolute; bottom: 10px; left: 50%;
  transform: translateX(-50%);
  color: #336633; font-size: 11px; letter-spacing: 1px;
  text-align: center; pointer-events: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud" style="display:none">
    <div class="hud-item">РАУНД <span id="hud-round">1</span>/7</div>
    <div class="hud-item">ПЗ <span id="hud-hp">100</span></div>
    <div class="hud-item">МАССА <span id="hud-energy">10</span> / МП <span id="hud-energy-max">10</span></div>
    <div class="hud-item">ЛОМ <span id="hud-scrap">0</span></div>
  </div>
  <div id="tooltip"></div>
  <div id="instructions"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 650;
canvas.width = W; canvas.height = H;

// Scale canvas to fit window while maintaining aspect ratio
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.97;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════════════
//  GAME STATES
// ═══════════════════════════════════════════════════════════
const STATE = { MENU: 0, ASSEMBLY: 1, ARENA: 2, LOOT: 3, GAMEOVER: 4, WIN: 5, MUTATION: 6, CLASS_SELECT: 7, ENCOUNTER: 8 };
let gameState = STATE.MENU;

function setState(s) {
  gameState = s;
  onStateEnter(s);
}

// ═══════════════════════════════════════════════════════════
//  INPUT SYSTEM
// ═══════════════════════════════════════════════════════════
const Keys = {};
const Mouse = { x: 0, y: 0, cx: 0, cy: 0, down: false, clicked: false, rightClicked: false };
const mouseListeners = [];

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY
  };
}

window.addEventListener('keydown', e => {
  if (!Keys[e.code]) {
    Keys[e.code] = true;
    Keys[e.code + '_pressed'] = true;
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { Keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e);
  Mouse.x = p.x; Mouse.y = p.y;
  Mouse.cx = p.x; Mouse.cy = p.y;
});
canvas.addEventListener('mousedown', e => {
  const p = getCanvasPos(e);
  Mouse.x = p.x; Mouse.y = p.y;
  if (e.button === 0) Mouse.down = true;
  if (e.button === 2) Mouse.rightClicked = true;
  e.preventDefault();
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) { Mouse.down = false; Mouse.clicked = true; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

function clearFrameInput() {
  Mouse.clicked = false;
  Mouse.rightClicked = false;
  for (const k in Keys) if (k.endsWith('_pressed')) Keys[k] = false;
}

// ═══════════════════════════════════════════════════════════
//  DRAWING UTILITIES
// ═══════════════════════════════════════════════════════════
const C = {
  bg:       '#0a0a0f',
  panel:    '#0d1a0d',
  border:   '#1a3a1a',
  accent:   '#4eff91',
  accent2:  '#ff6b35',
  accent3:  '#35c5ff',
  dim:      '#1a4a1a',
  text:     '#cce8cc',
  textDim:  '#4a6a4a',
  warn:     '#ffcc00',
  danger:   '#ff3333',
  wire:     '#ffcc44',
  wireActive: '#fff066',
};

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function strokeRect(x, y, w, h, color, lw=1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
}
function text(str, x, y, color='#cce8cc', size=13, align='left') {
  ctx.fillStyle = color; ctx.font = `${size}px "Courier New",monospace`;
  ctx.textAlign = align; ctx.fillText(str, x, y);
}
function textCenter(str, x, y, color, size) { text(str, x, y, color, size, 'center'); }

function drawButton(label, x, y, w, h, hovered, danger=false) {
  const bc = danger ? C.danger : (hovered ? C.accent : C.dim);
  const tc = hovered ? '#000' : C.accent;
  fillRect(x, y, w, h, hovered ? (danger ? C.danger : C.accent) : '#0a140a');
  strokeRect(x, y, w, h, bc, 1);
  textCenter(label, x + w/2, y + h/2 + 5, tc, 13);
}
function isHover(x, y, w, h) {
  return Mouse.x >= x && Mouse.x <= x+w && Mouse.y >= y && Mouse.y <= y+h;
}
function isClick(x, y, w, h) { return isHover(x,y,w,h) && Mouse.clicked; }

function drawGrid(x, y, w, h, step, color='#0f1f0f') {
  ctx.strokeStyle = color; ctx.lineWidth = 1;
  for (let i = x; i <= x+w; i += step) { ctx.beginPath(); ctx.moveTo(i+0.5,y); ctx.lineTo(i+0.5,y+h); ctx.stroke(); }
  for (let j = y; j <= y+h; j += step) { ctx.beginPath(); ctx.moveTo(x,j+0.5); ctx.lineTo(x+w,j+0.5); ctx.stroke(); }
}

function drawPanel(x, y, w, h, title='') {
  fillRect(x, y, w, h, C.panel);
  strokeRect(x, y, w, h, C.border);
  if (title) {
    fillRect(x, y, w, 22, '#0f1f0f');
    text(title, x+8, y+15, C.accent, 11);
    ctx.strokeStyle = C.border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y+22.5); ctx.lineTo(x+w, y+22.5); ctx.stroke();
  }
}

// Scanlines effect
function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) { ctx.fillRect(0, y, W, 1); }
  ctx.restore();
}

// Vignette
function drawVignette() {
  const g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// Flash effect for hits
let flashTimer = 0, flashColor = '#fff';
function triggerFlash(color='#ff3333', dur=8) { flashTimer = dur; flashColor = color; }
function drawFlash() {
  if (flashTimer <= 0) return;
  ctx.save();
  ctx.globalAlpha = flashTimer / 30 * 0.3;
  ctx.fillStyle = flashColor;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  flashTimer--;
}

// Particle system
const particles = [];
function spawnParticles(x, y, color, n=8, speed=3, life=30) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life, maxLife: life, color, size: 2+Math.random()*2 });
  }
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life--;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════════════════
const Game = {
  round: 1,
  maxRounds: 7,
  scrap: 0,
  robot: null,       // assembled robot config
  inventory: [],     // parts in hand
  lootPool: [],      // parts offered after fight
};

// ═══════════════════════════════════════════════════════════
//  MENU SCREEN
// ═══════════════════════════════════════════════════════════
let menuAnim = 0;
let menuSparks = [];

function initMenu() {
  menuSparks = [];
  for (let i = 0; i < 40; i++) menuSparks.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
    life: Math.random()*200, maxLife: 200+Math.random()*200,
    size: 0.5+Math.random()*1.5
  });
}

function updateMenu() {
  menuAnim++;

  // Update sparks
  for (let i = menuSparks.length-1; i >= 0; i--) {
    const s = menuSparks[i];
    s.x += s.vx; s.y += s.vy;
    s.life--;
    if (s.life <= 0) {
      menuSparks[i] = {
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
        life: 100+Math.random()*200, maxLife: 200+Math.random()*200,
        size: 0.5+Math.random()*1.5
      };
    }
  }

  // Draw background
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0c1a0c');

  // Draw sparks
  for (const s of menuSparks) {
    ctx.save();
    ctx.globalAlpha = (s.life / s.maxLife) * 0.6;
    ctx.fillStyle = C.accent;
    ctx.fillRect(s.x, s.y, s.size, s.size);
    ctx.restore();
  }

  // Title
  const pulse = Math.sin(menuAnim * 0.04) * 0.15 + 0.85;
  ctx.save();
  ctx.globalAlpha = pulse;

  // Big title
  ctx.fillStyle = C.accent;
  ctx.font = 'bold 64px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = C.accent;
  ctx.shadowBlur = 20;
  ctx.fillText('WRECK', W/2, H/2 - 90);
  ctx.shadowBlur = 10;
  ctx.fillStyle = C.accent2;
  ctx.fillText('PROTOCOL', W/2, H/2 - 20);
  ctx.restore();

  ctx.fillStyle = C.textDim;
  ctx.font = '13px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText('собирай · подключай · сражайся · мародёрствуй', W/2, H/2 + 18);

  // Buttons
  const btnW = 200, btnH = 38;
  const bx = W/2 - btnW/2;

  const startHover = isHover(bx, H/2+40, btnW, btnH);
  drawButton('[ НАЧАТЬ ЗАБЕГ ]', bx, H/2+40, btnW, btnH, startHover);
  if (isClick(bx, H/2+40, btnW, btnH)) {
    setState(STATE.CLASS_SELECT);
  }

  // Info
  ctx.fillStyle = C.textDim;
  ctx.font = '11px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText('собери робота · подключи провода · выживи в 7 раундах', W/2, H/2+120);
  ctx.fillText('собирай детали с побеждённых врагов', W/2, H/2+138);

  // Version
  ctx.fillStyle = '#1a2a1a';
  ctx.font = '10px "Courier New",monospace';
  ctx.textAlign = 'right';
  ctx.fillText('v0.1 ALPHA', W-10, H-8);

  drawVignette();
  drawScanlines();
}

// ═══════════════════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════════════════
function startNewGame() {
  Game.round = 1;
  Game.scrap = 10;
  Game.mutations = [];

  // Starting parts
  Game.inventory = [
    createPart('chassis'),
    createPart('gun_basic'),
    createPart('wheel'),
    createPart('armor_light'),
  ];

  initAssembly();
}

// ═══════════════════════════════════════════════════════════
//  STATE ENTER HOOKS
// ═══════════════════════════════════════════════════════════
function onStateEnter(s) {
  const hud = document.getElementById('hud');
  const instr = document.getElementById('instructions');
  hud.style.display = (s === STATE.ARENA) ? 'flex' : 'none';

  if (s === STATE.MENU) {
    initMenu();
    instr.textContent = '';
  } else if (s === STATE.ASSEMBLY) {
    instr.textContent = 'СБОРКА: тащи детали на сетку · R вращение · ПКМ убрать деталь · нажми СРАЖАТЬСЯ';
  } else if (s === STATE.ARENA) {
    instr.textContent = 'WASD/стрелки — движение · ПРОБЕЛ — огонь · уничтожь всех врагов!';
  } else if (s === STATE.CLASS_SELECT) {
    instr.textContent = 'Выбери класс — он определит твой стиль игры на весь забег';
  } else if (s === STATE.ENCOUNTER) {
    instr.textContent = 'Случайная встреча — выбери действие';
  } else if (s === STATE.MUTATION) {
    instr.textContent = 'Выбери мутацию · она останется навсегда';
  } else if (s === STATE.LOOT) {
    instr.textContent = 'Выбери до 3 деталей · остальное уйдёт в металлолом';
  } else if (s === STATE.GAMEOVER) {
    instr.textContent = '';
  } else if (s === STATE.WIN) {
    instr.textContent = '';
  }
}

// ═══════════════════════════════════════════════════════════
//  PLACEHOLDER FUNCTIONS (filled in later parts)
// ═══════════════════════════════════════════════════════════
function createPart(type) { return { type }; }  // replaced in Part 2
function initAssembly() {}                        // replaced in Part 2
function updateAssembly() {}                      // replaced in Part 2
function updateArena() {}                         // replaced in Part 4
function updateLoot() {}                          // replaced in Part 5
function updateClassSelect() {}                   // replaced in Part 6
function updateEncounter() {}                     // replaced in Part 6
function updateGameOver() {}
function updateWin() {}

// ═══════════════════════════════════════════════════════════
//  GAME OVER / WIN SCREENS
// ═══════════════════════════════════════════════════════════
let endAnim = 0;
function drawEndScreen(win) {
  endAnim++;
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0c120c');

  const mainColor = win ? C.accent : C.danger;
  const mainText  = win ? 'ЧЕМПИОН' : 'УНИЧТОЖЕН';
  const subText   = win ? 'Арена твоя.' : 'Твой металлолом питает следующего.';

  ctx.save();
  ctx.globalAlpha = Math.min(1, endAnim / 40);
  ctx.fillStyle = mainColor;
  ctx.font = 'bold 56px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = mainColor;
  ctx.shadowBlur = 30;
  ctx.fillText(mainText, W/2, H/2 - 40);
  ctx.restore();

  ctx.fillStyle = C.textDim;
  ctx.font = '16px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText(subText, W/2, H/2 + 10);
  ctx.fillText(`Пройдено раундов: ${Game.round - 1} / ${Game.maxRounds}`, W/2, H/2 + 40);

  const btnW = 200, btnH = 38, bx = W/2 - 100;
  const restart = isHover(bx, H/2+80, btnW, btnH);
  drawButton('[ ИГРАТЬ СНОВА ]', bx, H/2+80, btnW, btnH, restart);
  if (isClick(bx, H/2+80, btnW, btnH)) {
    endAnim = 0;
    setState(STATE.MENU);
  }

  drawVignette();
  drawScanlines();
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  switch(gameState) {
    case STATE.MENU:     updateMenu();             break;
    case STATE.ASSEMBLY: updateAssembly();         break;
    case STATE.ARENA:    updateArena();            break;
    case STATE.LOOT:     updateLoot();             break;
    case STATE.GAMEOVER: drawEndScreen(false);     break;
    case STATE.WIN:      drawEndScreen(true);      break;
    case STATE.MUTATION:      updateMutation();       break;
    case STATE.CLASS_SELECT:  updateClassSelect();    break;
    case STATE.ENCOUNTER:     updateEncounter();      break;
  }

  updateParticles();
  drawFlash();
  clearFrameInput();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initMenu();
setState(STATE.MENU);
requestAnimationFrame(loop);
</script>

// ── Part factory
function createPart(type, rot=0) {
  const def = PART_DEFS[type];
  if (!def) { console.warn('Unknown part:', type); return null; }
  return {
    id: Math.random().toString(36).slice(2),
    type,
    rot,          // 0,1,2,3 (×90°)
    hp: def.maxHP,
    // grid position (set when placed)
    gx: null, gy: null,
  };
}

// Get effective width/height after rotation
function partW(p) {
  const d = PART_DEFS[p.type];
  return (p.rot % 2 === 0) ? d.w : d.h;
}
function partH(p) {
  const d = PART_DEFS[p.type];
  return (p.rot % 2 === 0) ? d.h : d.w;
}

// Get rotated ports
function getRotatedPorts(part) {
  const def = PART_DEFS[part.type];
  return (def.ports || []).map(port => {
    let ox = port.ox, oy = port.oy;
    for (let r = 0; r < part.rot; r++) {
      const tmp = ox; ox = -oy; oy = tmp; // rotate 90° CW
    }
    const sides = ['top','right','bottom','left'];
    const sideIdx = sides.indexOf(port.side);
    const newSide = sides[(sideIdx + part.rot) % 4];
    return { ...port, ox, oy, side: newSide };
  });
}

// ═══════════════════════════════════════════════════════════
//  ASSEMBLY SYSTEM
// ═══════════════════════════════════════════════════════════
const GRID_SIZE = 54;  // было 36, теперь 1.5×
const GRID_COLS = 8;
const GRID_ROWS = 8;

const Assembly = {
  // Grid: array of {part, gx, gy} placements
  placed: [],
  // Part being dragged
  dragging: null,
  dragOffX: 0, dragOffY: 0,
  // Palette scroll
  palScroll: 0,
  // Wires: [{fromId, fromPortIdx, toId, toPortIdx}]
  wires: [],
  // Wire being drawn
  wiringFrom: null,  // {partId, portIdx, px, py}
  // Grid origin on screen
  gridOriginX: 0,
  gridOriginY: 0,
  // Tab: 'parts' | 'wires'
  tab: 'parts',
  // Stats
  totalMass: 0,
  totalEnergy: 0,
  usedEnergy: 0,
};

function initAssembly() {
  const asmW = GRID_COLS * GRID_SIZE;
  const asmH = GRID_ROWS * GRID_SIZE;
  Assembly.gridOriginX = 60;
  Assembly.gridOriginY = (H - asmH) / 2;
  Assembly.placed = [];
  Assembly.wires = [];
  Assembly.wiringFrom = null;
  Assembly.dragging = null;
  Assembly.tab = 'parts';

  // Place chassis at center
  const chassis = createPart('chassis');
  const cx = Math.floor(GRID_COLS/2) - 1;
  const cy = Math.floor(GRID_ROWS/2) - 1;
  placeOnGrid(chassis, cx, cy);
}

function placeOnGrid(part, gx, gy) {
  part.gx = gx; part.gy = gy;
  Assembly.placed.push(part);
  recalcStats();
}

function removePlaced(partId) {
  const idx = Assembly.placed.findIndex(p => p.id === partId);
  if (idx < 0) return;
  const part = Assembly.placed[idx];
  if (part.type === 'chassis') return; // can't remove chassis
  Assembly.placed.splice(idx, 1);
  // Remove connected wires
  Assembly.wires = Assembly.wires.filter(w => w.fromId !== partId && w.toId !== partId);
  recalcStats();
}

function recalcStats() {
  let mass = 0, capacity = 4, used = 0;
  for (const p of Assembly.placed) {
    const d = PART_DEFS[p.type];
    mass += d.mass;
    if ((d.energy || 0) < 0) capacity += Math.abs(d.energy); // battery adds capacity
    else used += (d.energy || 0);                             // parts consume energy
  }
  Assembly.totalMass   = mass;
  Assembly.usedEnergy  = used;
  Assembly.totalEnergy = capacity; // capacity (for backward compat label)
}

function canPlace(part, gx, gy) {
  const w = partW(part), h = partH(part);
  if (gx < 0 || gy < 0 || gx+w > GRID_COLS || gy+h > GRID_ROWS) return false;
  for (const existing of Assembly.placed) {
    if (existing.id === part.id) continue;
    const ew = partW(existing), eh = partH(existing);
    if (gx < existing.gx+ew && gx+w > existing.gx &&
        gy < existing.gy+eh && gy+h > existing.gy) return false;
  }
  return true;
}

function screenToGrid(sx, sy) {
  return {
    gx: Math.floor((sx - Assembly.gridOriginX) / GRID_SIZE),
    gy: Math.floor((sy - Assembly.gridOriginY) / GRID_SIZE),
  };
}

function gridToScreen(gx, gy) {
  return {
    sx: Assembly.gridOriginX + gx * GRID_SIZE,
    sy: Assembly.gridOriginY + gy * GRID_SIZE,
  };
}

// ── Port screen position
function portScreenPos(part, portIdx) {
  const ports = getRotatedPorts(part);
  const port = ports[portIdx];
  if (!port) return null;
  const { sx, sy } = gridToScreen(part.gx, part.gy);
  const cx = sx + partW(part) * GRID_SIZE / 2 + port.ox * GRID_SIZE * 0.5;
  const cy = sy + partH(part) * GRID_SIZE / 2 + port.oy * GRID_SIZE * 0.5;
  return { x: cx, y: cy, type: port.type };
}

// ── Draw a placed part on the grid
function drawPlacedPart(part, alpha=1) {
  const def = PART_DEFS[part.type];
  const { sx, sy } = gridToScreen(part.gx, part.gy);
  const pw = partW(part) * GRID_SIZE;
  const ph = partH(part) * GRID_SIZE;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Body
  fillRect(sx+1, sy+1, pw-2, ph-2, def.color);
  strokeRect(sx+1, sy+1, pw-2, ph-2, def.border, 2);

  // HP bar
  const hpFrac = part.hp / def.maxHP;
  const barW = pw - 8;
  fillRect(sx+4, sy+ph-6, barW, 3, '#111');
  fillRect(sx+4, sy+ph-6, barW * hpFrac, 3,
    hpFrac > 0.5 ? '#44ff88' : hpFrac > 0.25 ? '#ffcc00' : '#ff3333');

  // Label
  const fontSize = pw > 60 ? 10 : 8;
  ctx.fillStyle = def.border;
  ctx.font = `${fontSize}px "Courier New",monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(def.label, sx + pw/2, sy + 12);

  // Cat icon area
  if (pw >= GRID_SIZE * 1.5) {
    ctx.font = `${Math.min(pw,ph)*0.4}px serif`;
    ctx.fillText(def.icon, sx + pw/2, sy + ph/2 + 8);
  }

  // Draw ports
  const ports = getRotatedPorts(part);
  ports.forEach((port, i) => {
    const pp = portScreenPos(part, i);
    if (!pp) return;
    const isConnected = Assembly.wires.some(w =>
      (w.fromId===part.id && w.fromPortIdx===i) ||
      (w.toId===part.id   && w.toPortIdx===i));
    const pc = port.type === 'OUT'
      ? (isConnected ? '#ffcc44' : '#886622')
      : (isConnected ? '#44aaff' : '#224466');
    ctx.fillStyle = pc;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  ctx.restore();
}

// ── Palette panel (right side)

function drawPalette() {
  drawPanel(PAL_X, 5, PAL_W, PAL_H, 'ИНВЕНТАРЬ');

  const items = Game.inventory;
  const startY = 35;
  const visH = PAL_H - 40;
  const maxScroll = Math.max(0, items.length * PAL_ITEM_H - visH);
  Assembly.palScroll = Math.max(0, Math.min(Assembly.palScroll, maxScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(PAL_X, 28, PAL_W, visH);
  ctx.clip();

  items.forEach((part, i) => {
    if (!part) return;
    const def = PART_DEFS[part.type];
    const iy = startY + i * PAL_ITEM_H - Assembly.palScroll;
    if (iy + PAL_ITEM_H < 28 || iy > H) return;

    const hov = isHover(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4);
    fillRect(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4, hov ? '#152515' : '#0d180d');
    strokeRect(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4, def.border, 1);

    ctx.fillStyle = def.border;
    ctx.font = 'bold 13px "Courier New",monospace';
    ctx.textAlign = 'left';
    ctx.fillText(def.icon + ' ' + def.label, PAL_X+8, iy+18);

    ctx.fillStyle = C.textDim;
    ctx.font = '11px "Courier New",monospace';
    const CAT_RU = {chassis:'шасси',weapon:'оружие',sensor:'сенсор',movement:'движение',armor:'броня',utility:'утилита'};
    ctx.fillText(`${def.w}×${def.h} · ${def.mass}кг · ${CAT_RU[def.cat]||def.cat}`, PAL_X+8, iy+33);
    ctx.fillStyle = C.text;
    ctx.font = '11px "Courier New",monospace';
    const words = def.desc.split(' ');
    let ln='', ly=iy+48;
    for (const w of words) {
      const test = ln ? ln+' '+w : w;
      if (test.length > 28 && ln) { ctx.fillText(ln, PAL_X+8, ly); ln=w; ly+=13; }
      else ln=test;
    }
    ctx.fillText(ln, PAL_X+8, ly);

    // Drag start
    if (hov && Mouse.clicked) {
      Assembly.dragging = { part, fromInventory: true, invIdx: i };
      Assembly.dragOffX = 0; Assembly.dragOffY = 0;
    }
  });

  ctx.restore();

  // Stats
  const sy2 = 5 + PAL_H - 80;
  const energyOver = Assembly.usedEnergy > Assembly.totalEnergy;
  const energyColor = energyOver ? C.danger : C.accent;
  const massHeavy = Assembly.totalMass > 20;

  ctx.font = '12px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = massHeavy ? C.warn : C.text;
  ctx.fillText(`МАССА: ${Assembly.totalMass} кг${massHeavy?' ⚠':''}`, PAL_X+8, sy2+16);

  ctx.fillStyle = energyColor;
  ctx.fillText(`ЭНЕРГИЯ: ${Assembly.usedEnergy} / ${Assembly.totalEnergy}${energyOver?' ⚠':''}`, PAL_X+8, sy2+32);
  if (energyOver) {
    ctx.fillStyle = C.danger; ctx.font = '9px "Courier New",monospace';
    ctx.fillText('перегрузка → скорость -30%', PAL_X+8, sy2+43);
  }

  ctx.fillStyle = C.warn; ctx.font = 'bold 13px "Courier New",monospace';
  ctx.fillText(`ЛОМ: ${Game.scrap} ед.`, PAL_X+8, sy2+56);

  // ── Scrap shop buttons
  drawScrapShop();
}

// ── Wire drawing
function drawWires() {
  for (const wire of Assembly.wires) {
    const fromPart = Assembly.placed.find(p => p.id === wire.fromId);
    const toPart   = Assembly.placed.find(p => p.id === wire.toId);
    if (!fromPart || !toPart) continue;
    const fp = portScreenPos(fromPart, wire.fromPortIdx);
    const tp = portScreenPos(toPart,   wire.toPortIdx);
    if (!fp || !tp) continue;

    ctx.save();
    ctx.strokeStyle = C.wire;
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    // Bezier curve
    const mx = (fp.x+tp.x)/2, my = (fp.y+tp.y)/2;
    ctx.quadraticCurveTo(mx, fp.y, tp.x, tp.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Wire being drawn
  if (Assembly.wiringFrom) {
    const fp = Assembly.wiringFrom;
    ctx.save();
    ctx.strokeStyle = '#ffff88';
    ctx.lineWidth = 2;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(fp.px, fp.py);
    ctx.lineTo(Mouse.x, Mouse.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ── Main assembly update
function updateAssembly() {
  // Background
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  // Grid area
  const gx0 = Assembly.gridOriginX, gy0 = Assembly.gridOriginY;
  const gw = GRID_COLS * GRID_SIZE, gh = GRID_ROWS * GRID_SIZE;
  fillRect(gx0, gy0, gw, gh, '#080e08');
  drawGrid(gx0, gy0, gw, gh, GRID_SIZE, '#0f1f0f');
  strokeRect(gx0, gy0, gw, gh, C.border, 1);

  // Title
  ctx.fillStyle = C.accent; ctx.font = '14px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillText(`СБОРКА — РАУНД ${Game.round}`, gx0, gy0-10);

  // Draw placed parts
  for (const part of Assembly.placed) drawPlacedPart(part);

  // Draw wires
  drawWires();

  // Dragging ghost
  if (Assembly.dragging) {
    const { part } = Assembly.dragging;
    const def = PART_DEFS[part.type];
    const { gx, gy } = screenToGrid(Mouse.x, Mouse.y);
    const valid = canPlace(part, gx, gy);

    // Ghost on grid
    if (gx >= 0 && gy >= 0 && gx < GRID_COLS && gy < GRID_ROWS) {
      const { sx, sy } = gridToScreen(gx, gy);
      ctx.save();
      ctx.globalAlpha = 0.5;
      fillRect(sx+1, sy+1, partW(part)*GRID_SIZE-2, partH(part)*GRID_SIZE-2,
        valid ? def.color : '#3a0000');
      strokeRect(sx+1, sy+1, partW(part)*GRID_SIZE-2, partH(part)*GRID_SIZE-2,
        valid ? def.border : C.danger, 2);
      ctx.restore();
    }

    // Floating icon at cursor
    ctx.fillStyle = def.border;
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.icon, Mouse.x, Mouse.y - 10);

    // Rotate key
    if (Keys['KeyR'] || Keys['KeyR_pressed']) {
      part.rot = (part.rot + 1) % 4;
      Keys['KeyR_pressed'] = false;
    }

    // Drop on left click
    if (Mouse.clicked) {
      if (valid) {
        if (Assembly.dragging.fromInventory) {
          Game.inventory.splice(Assembly.dragging.invIdx, 1);
          placeOnGrid(part, gx, gy);
        } else {
          // Move already placed part
          removePlaced(part.id);
          placeOnGrid(part, gx, gy);
        }
      }
      Assembly.dragging = null;
    }
    // Right click = cancel drag
    if (Mouse.rightClicked) Assembly.dragging = null;
  } else {
    // Right click on placed part = remove
    if (Mouse.rightClicked) {
      for (const part of [...Assembly.placed]) {
        if (part.type === 'chassis') continue;
        const { sx, sy } = gridToScreen(part.gx, part.gy);
        if (Mouse.x >= sx && Mouse.x <= sx + partW(part)*GRID_SIZE &&
            Mouse.y >= sy && Mouse.y <= sy + partH(part)*GRID_SIZE) {
          Game.inventory.push(part);
          removePlaced(part.id);
          break;
        }
      }
    }

    if (Mouse.clicked) {
      if (Assembly.wiringFrom) {
        // ── FINISH or CANCEL wiring
        let connected = false;
        for (const part of Assembly.placed) {
          if (connected) break;
          const ports = getRotatedPorts(part);
          ports.forEach((port, pi) => {
            if (connected) return;
            const pp = portScreenPos(part, pi);
            if (pp && Math.hypot(Mouse.x-pp.x, Mouse.y-pp.y) < 10) {
              const from = Assembly.wiringFrom;
              if (part.id !== from.partId) {
                const fromPart = Assembly.placed.find(p => p.id === from.partId);
                const fromPort = getRotatedPorts(fromPart)[from.portIdx];
                if (fromPort.type === 'OUT' && port.type === 'IN') {
                  Assembly.wires = Assembly.wires.filter(w => !(w.toId===part.id && w.toPortIdx===pi));
                  Assembly.wires.push({ fromId:from.partId, fromPortIdx:from.portIdx, toId:part.id, toPortIdx:pi });
                  connected = true;
                } else if (fromPort.type === 'IN' && port.type === 'OUT') {
                  Assembly.wires = Assembly.wires.filter(w => !(w.toId===from.partId && w.toPortIdx===from.portIdx));
                  Assembly.wires.push({ fromId:part.id, fromPortIdx:pi, toId:from.partId, toPortIdx:from.portIdx });
                  connected = true;
                }
              }
            }
          });
        }
        Assembly.wiringFrom = null; // always clear after click
      } else {
        // ── START wire or drag
        let handled = false;
        for (const part of [...Assembly.placed]) {
          if (handled) break;
          if (part.type === 'chassis') continue;
          const { sx, sy } = gridToScreen(part.gx, part.gy);
          if (Mouse.x >= sx && Mouse.x <= sx + partW(part)*GRID_SIZE &&
              Mouse.y >= sy && Mouse.y <= sy + partH(part)*GRID_SIZE) {
            // Check ports first
            let onPort = false;
            const ports = getRotatedPorts(part);
            ports.forEach((port, pi) => {
              if (onPort) return;
              const pp = portScreenPos(part, pi);
              if (pp && Math.hypot(Mouse.x-pp.x, Mouse.y-pp.y) < 10) {
                onPort = true;
                Assembly.wiringFrom = { partId: part.id, portIdx: pi, px: pp.x, py: pp.y, type: port.type };
              }
            });
            if (!onPort) {
              removePlaced(part.id);
              Assembly.dragging = { part, fromInventory: false };
            }
            handled = true;
          }
        }
      }
    }

    // Tooltip
    const tip = document.getElementById('tooltip');
    let shown = false;
    for (const part of Assembly.placed) {
      const { sx, sy } = gridToScreen(part.gx, part.gy);
      if (Mouse.x >= sx && Mouse.x <= sx+partW(part)*GRID_SIZE &&
          Mouse.y >= sy && Mouse.y <= sy+partH(part)*GRID_SIZE) {
        const def = PART_DEFS[part.type];
        tip.style.display = 'block';
        tip.style.left = (Mouse.cx+12)+'px';
        tip.style.top  = (Mouse.cy-10)+'px';
        tip.innerHTML = `<b style="color:${def.border}">${def.label}</b><br>${def.desc}<br>
          <span style="color:#888">${def.mass}кг · ${def.energy}Э · ПЗ:${def.maxHP}</span>`;
        shown = true; break;
      }
    }
    // Hint when wiring is active
  if (Assembly.wiringFrom) {
    ctx.fillStyle = '#ffff88'; ctx.font='11px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('Кликни на порт другой детали для подключения · ПКМ отмена', W/2, Assembly.gridOriginY - 4);
  }
  if (!shown) { tip.style.display = 'none'; }
  }

  drawPalette();
  drawDoneButton();
  drawRotateHint();
  drawVignette();
  drawScanlines();
}
</script>

<!-- PART 3: ARENA COMBAT -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ARENA STATE
// ═══════════════════════════════════════════════════════════
const Arena = {
  // Player robot
  robot: {
    x: W/2, y: H/2,
    vx: 0, vy: 0,
    angle: 0,           // facing direction (radians)
    hp: 0, maxHP: 0,
    shield: 0, maxShield: 0, shieldRegen: 0,
    speed: 0,           // base speed from movement part
    turnSpeed: 0,
    controlType: 'wheel',
    mass: 1,
    parts: [],          // active placed parts (from Assembly)
    wires: [],
    weapons: [],        // {partId, def, cooldown, angle}
    sensors: [],        // {partId, def, timer}
    knockbackImmune: false,
    radius: 22,
  },
  bullets: [],          // player bullets
  enemyBullets: [],     // enemy bullets
  enemies: [],
  pickups: [],          // scrap/part drops
  frame: 0,
  paused: false,
  arenaW: W,
  arenaH: H - 60,
  arenaY: 30,
  // Camera offset (for future large arenas — keep 0 for now)
  camX: 0, camY: 0,
  result: null,         // 'win' | 'lose'
};

// ── Build arena robot from Assembly
function startArena() {
  const R = Arena.robot;
  R.parts = JSON.parse(JSON.stringify(Assembly.placed)); // deep copy
  R.wires = JSON.parse(JSON.stringify(Assembly.wires));

  // Calculate stats from parts
  let hp = 0, mass = 0, speed = 3.0, turn = 0.055, energy = 4;
  let shield = 0, shieldRegen = 0;
  R.weapons = [];
  R.sensors = [];
  R.controlType = 'wheel'; // default
  R.knockbackImmune = false;

  for (const p of R.parts) {
    const def = PART_DEFS[p.type];
    hp     += def.maxHP;
    mass   += def.mass;
    energy += -(def.energy || 0);

    if (def.cat === 'movement') {
      R.controlType = def.controlType;
      speed *= (def.speedMult || 1);
      turn  *= (def.turnMult  || 1);
      if (def.controlType === 'tank') R.knockbackImmune = true;
    }
    if (def.cat === 'weapon') {
      R.weapons.push({ partId: p.id, def, cooldown: 0, angle: 0 });
    }
    if (def.cat === 'sensor') {
      R.sensors.push({ partId: p.id, def, timer: 0 });
    }
    if (def.shieldHP) {
      shield     += def.shieldHP;
      shieldRegen += def.shieldRegen || 0;
    }
  }

  // Mass penalty
  const massPenalty = Math.max(0.3, 1 - (mass - 4) * 0.025);
  // Energy overload penalty: consuming more than capacity → speed -30%
  const energyUsed = Assembly.usedEnergy || 0;
  const energyCap  = Assembly.totalEnergy || 4;
  const energyPenalty = (energyUsed > energyCap) ? 0.7 : 1.0;
  R.speed     = speed * massPenalty * energyPenalty;
  R.turnSpeed = turn;
  R.maxHP     = hp;
  R.hp        = hp;
  R.maxShield = shield;
  R.shield    = shield;
  R.shieldRegen = shieldRegen;
  R.mass      = mass;
  R.x = Arena.arenaW / 2;
  R.y = Arena.arenaH / 2 + Arena.arenaY;
  R.vx = 0; R.vy = 0;
  R.angle = -Math.PI/2; // face up

  // Compute robot visual radius from part count
  R.radius = 14 + Math.sqrt(R.parts.length) * 5;

  // Arena enemies for this round
  Arena.bullets = [];
  Arena.enemyBullets = [];
  Arena.pickups = [];
  Arena.frame = 0;
  Arena.result = null;
  Arena.enemies = spawnEnemiesForRound(Game.round);

  // Weapon wire links: which sensors trigger which weapons
  R._wireTriggers = buildWireTriggers(R.parts, R.wires, R.sensors, R.weapons);

  setState(STATE.ARENA);
  updateHUD();
}

// ── Wire trigger map: sensorPartId → [weaponIdx, ...]
function buildWireTriggers(parts, wires, sensors, weapons) {
  const map = {}; // sensorPartId → weaponIdx[]
  for (const wire of wires) {
    const fromPart = parts.find(p => p.id === wire.fromId);
    const toPart   = parts.find(p => p.id === wire.toId);
    if (!fromPart || !toPart) continue;
    const fromDef = PART_DEFS[fromPart.type];
    const toDef   = PART_DEFS[toPart.type];
    if (fromDef.cat === 'sensor' && toDef.cat === 'weapon') {
      if (!map[fromPart.id]) map[fromPart.id] = [];
      const wi = weapons.findIndex(w => w.partId === toPart.id);
      if (wi >= 0 && !map[fromPart.id].includes(wi)) map[fromPart.id].push(wi);
    }
  }
  return map;
}

// ═══════════════════════════════════════════════════════════
//  BULLET SYSTEM
// ═══════════════════════════════════════════════════════════
function spawnBullet(x, y, angle, def, friendly=true) {
  const arr = friendly ? Arena.bullets : Arena.enemyBullets;
  arr.push({
    x, y,
    vx: Math.cos(angle) * def.bulletSpeed,
    vy: Math.sin(angle) * def.bulletSpeed,
    damage: def.damage,
    life: Math.ceil(def.range / def.bulletSpeed),
    isLaser: def.isLaser || false,
    r: def.isLaser ? 3 : 4,
    color: friendly ? '#ffcc44' : '#ff4444',
  });
}

function updateBullets() {
  // Player bullets
  for (let i = Arena.bullets.length-1; i >= 0; i--) {
    const b = Arena.bullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if (b.life <= 0 || isOutOfArena(b.x, b.y)) { Arena.bullets.splice(i,1); continue; }

    // Hit enemies
    let hit = false;
    for (let j = Arena.enemies.length-1; j >= 0; j--) {
      const e = Arena.enemies[j];
      if (Math.hypot(b.x-e.x, b.y-e.y) < e.radius + b.r) {
        damageEnemy(j, b.damage, b.vx, b.vy);
        spawnParticles(b.x, b.y, '#ff8844', 5, 2);
        Arena.bullets.splice(i,1);
        hit = true; break;
      }
    }
  }

  // Enemy bullets
  for (let i = Arena.enemyBullets.length-1; i >= 0; i--) {
    const b = Arena.enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if (b.life <= 0 || isOutOfArena(b.x, b.y)) { Arena.enemyBullets.splice(i,1); continue; }

    const R = Arena.robot;
    if (Math.hypot(b.x-R.x, b.y-R.y) < R.radius + b.r) {
      damageRobot(b.damage);
      spawnParticles(b.x, b.y, '#ff2222', 6, 2);
      Arena.enemyBullets.splice(i,1);
    }
  }
}

function isOutOfArena(x, y) {
  return x < 0 || x > Arena.arenaW || y < Arena.arenaY || y > Arena.arenaH + Arena.arenaY;
}

function damageRobot(dmg) {
  const R = Arena.robot;
  if (R.shield > 0) {
    R.shield = Math.max(0, R.shield - dmg);
    triggerFlash('#4488ff', 5);
  } else {
    R.hp = Math.max(0, R.hp - dmg);
    triggerFlash('#ff3333', 8);
    if (R.hp <= 0) Arena.result = 'lose';
  }
  updateHUD();
}

function damageEnemy(idx, dmg, bvx=0, bvy=0) {
  const e = Arena.enemies[idx];
  e.hp -= dmg;
  // Knockback from bullet velocity
  const bspd = Math.hypot(bvx, bvy);
  if (bspd > 0) {
    const kb = (dmg / 20) * 2.5;
    e.vx += (bvx / bspd) * kb;
    e.vy += (bvy / bspd) * kb;
  }
  if (e.hp <= 0) killEnemy(idx);
}

function killEnemy(idx) {
  const e = Arena.enemies[idx];
  spawnParticles(e.x, e.y, e.color, 20, 4, 50);
  spawnParticles(e.x, e.y, '#ffcc44', 8, 2, 30);
  // Drop loot
  if (Math.random() < 0.6) {
    Arena.pickups.push({ x: e.x, y: e.y, type: 'scrap', value: 3+Math.floor(Math.random()*5) });
  }
  if (e.dropPart && Math.random() < 0.4) {
    Arena.pickups.push({ x: e.x+20, y: e.y, type: 'part', partType: e.dropPart });
  }
  Arena.enemies.splice(idx, 1);
  triggerFlash('#ffcc44', 4);
}

// ═══════════════════════════════════════════════════════════
//  ROBOT MOVEMENT
// ═══════════════════════════════════════════════════════════
function updateRobotMovement() {
  const R = Arena.robot;
  const up    = Keys['ArrowUp']    || Keys['KeyW'];
  const down  = Keys['ArrowDown']  || Keys['KeyS'];
  const left  = Keys['ArrowLeft']  || Keys['KeyA'];
  const right = Keys['ArrowRight'] || Keys['KeyD'];

  const ct = R.controlType;

  if (ct === 'wheel' || ct === 'tank') {
    // Tank/wheel: rotate then forward
    if (left)  R.angle -= R.turnSpeed;
    if (right) R.angle += R.turnSpeed;
    if (up)    { R.vx += Math.cos(R.angle) * 0.4; R.vy += Math.sin(R.angle) * 0.4; }
    if (down)  { R.vx -= Math.cos(R.angle) * 0.25; R.vy -= Math.sin(R.angle) * 0.25; }
    R.vx *= 0.82; R.vy *= 0.82;
  } else if (ct === '8way') {
    // Spider: 8-directional, aim with mouse
    const tx = Mouse.x - R.x, ty = Mouse.y - R.y;
    R.angle = Math.atan2(ty, tx);
    if (up)    R.vy -= 0.5;
    if (down)  R.vy += 0.5;
    if (left)  R.vx -= 0.5;
    if (right) R.vx += 0.5;
    R.vx *= 0.78; R.vy *= 0.78;
  } else if (ct === 'jet') {
    // Jets: momentum, rotate to aim mouse
    const tx = Mouse.x - R.x, ty = Mouse.y - R.y;
    R.angle = Math.atan2(ty, tx);
    if (up)    { R.vx += Math.cos(R.angle) * 0.7; R.vy += Math.sin(R.angle) * 0.7; }
    if (down)  { R.vx *= 0.92; R.vy *= 0.92; }
    if (left)  { R.vx -= Math.cos(R.angle+Math.PI/2)*0.3; R.vy -= Math.sin(R.angle+Math.PI/2)*0.3; }
    if (right) { R.vx += Math.cos(R.angle+Math.PI/2)*0.3; R.vy += Math.sin(R.angle+Math.PI/2)*0.3; }
    R.vx *= 0.96; R.vy *= 0.96;
  } else {
    // Fallback: wheel
    if (left)  R.angle -= R.turnSpeed;
    if (right) R.angle += R.turnSpeed;
    if (up)    { R.vx += Math.cos(R.angle) * 0.4; R.vy += Math.sin(R.angle) * 0.4; }
    R.vx *= 0.82; R.vy *= 0.82;
  }

  // Speed cap
  const spd = Math.hypot(R.vx, R.vy);
  if (spd > R.speed) { R.vx *= R.speed/spd; R.vy *= R.speed/spd; }

  R.x += R.vx; R.y += R.vy;

  // Arena bounds
  const ay = Arena.arenaY, ah = Arena.arenaH;
  R.x = Math.max(R.radius, Math.min(Arena.arenaW - R.radius, R.x));
  R.y = Math.max(ay + R.radius, Math.min(ay + ah - R.radius, R.y));

  // Shield regen
  if (R.maxShield > 0) {
    R.shield = Math.min(R.maxShield, R.shield + R.shieldRegen * 0.016);
  }
}

// ═══════════════════════════════════════════════════════════
//  WEAPON SYSTEM (sensors + wires + firing)
// ═══════════════════════════════════════════════════════════
function updateWeapons() {
  const R = Arena.robot;
  const triggers = R._wireTriggers || {};

  // SPACE = ручной огонь по всем оружиям (всегда работает)
  if (Keys['Space_pressed'] || Keys['Space']) {
    for (let wi = 0; wi < R.weapons.length; wi++) fireWeapon(wi, R);
    Keys['Space_pressed'] = false;
  }

  // Автоматика сенсоров (дополнительно к ручному огню)
  for (const sensor of R.sensors) {
    const def = sensor.def;
    sensor.timer++;

    // Автосенсор: враг в зоне обнаружения
    if (def.sensorRange) {
      const inRange = Arena.enemies.some(e => Math.hypot(e.x-R.x, e.y-R.y) < def.sensorRange);
      if (inRange && sensor.timer >= (def.triggerRate || 30)) {
        sensor.timer = 0;
        fireSensorWires(sensor, triggers, R);
      }
    }
    // Таймер: импульс по расписанию
    if (def.timerRate && sensor.timer >= def.timerRate) {
      sensor.timer = 0;
      fireSensorWires(sensor, triggers, R);
    }
  }

  // Cooldown weapons
  for (const w of R.weapons) { if (w.cooldown > 0) w.cooldown--; }
}

function fireSensorWires(sensor, triggers, R) {
  const wis = triggers[sensor.partId];
  if (!wis || wis.length === 0) return;
  for (const wi of wis) fireWeapon(wi, R);
}

function fireWeapon(wi, R) {
  const w = R.weapons[wi];
  if (!w || w.cooldown > 0) return;
  w.cooldown = w.def.fireRate;

  // Aim at nearest enemy
  let angle = R.angle;
  let nearest = null, nearDist = Infinity;
  for (const e of Arena.enemies) {
    const d = Math.hypot(e.x-R.x, e.y-R.y);
    if (d < nearDist) { nearDist = d; nearest = e; }
  }
  if (nearest) angle = Math.atan2(nearest.y - R.y, nearest.x - R.x);

  // Spawn bullet: offset capped so it never passes through a close enemy
  const nearDist2 = nearest ? Math.hypot(nearest.x-R.x, nearest.y-R.y) : 999;
  const spawnOffset = Math.min(R.radius + 6, nearDist2 * 0.4 + 4);
  const bx = R.x + Math.cos(angle) * spawnOffset;
  const by = R.y + Math.sin(angle) * spawnOffset;
  spawnBullet(bx, by, angle, w.def, true);
  spawnParticles(bx, by, '#ffcc44', 3, 2, 10);
}

// ═══════════════════════════════════════════════════════════
//  PICKUPS
// ═══════════════════════════════════════════════════════════
function updatePickups() {
  const R = Arena.robot;
  for (let i = Arena.pickups.length-1; i >= 0; i--) {
    const p = Arena.pickups[i];
    if (Math.hypot(p.x-R.x, p.y-R.y) < R.radius + 12) {
      if (p.type === 'scrap') {
        Game.scrap += p.value;
        spawnParticles(p.x, p.y, '#44ff88', 5, 2);
      } else if (p.type === 'part') {
        // Add to loot pool for after combat
        Arena._droppedParts = Arena._droppedParts || [];
        Arena._droppedParts.push(createPart(p.partType));
        spawnParticles(p.x, p.y, '#ffcc44', 8, 3);
      }
      Arena.pickups.splice(i,1);
      updateHUD();
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER ROBOT
// ═══════════════════════════════════════════════════════════
function drawRobot() {
  const R = Arena.robot;
  ctx.save();
  ctx.translate(R.x, R.y);
  ctx.rotate(R.angle + Math.PI/2);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3, 3, R.radius, R.radius*0.7, 0, 0, Math.PI*2);
  ctx.fill();

  // Body — color by control type
  const bodyColors = { wheel:'#2a4a2a', tank:'#1a2a3a', '8way':'#3a1a3a', jet:'#3a2a1a' };
  const borderColors= { wheel:'#4eff91', tank:'#4488ff', '8way':'#cc44cc', jet:'#ff6644' };
  const bc = bodyColors[R.controlType] || '#2a4a2a';
  const bb = borderColors[R.controlType] || '#4eff91';

  // Hex body
  ctx.fillStyle = bc;
  ctx.beginPath();
  for (let i=0; i<6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/6;
    const px = Math.cos(a)*R.radius*0.9, py = Math.sin(a)*R.radius*0.9;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = bb; ctx.lineWidth = 2;
  ctx.stroke();

  // Cannon barrel (points "up" in local space = forward)
  ctx.fillStyle = '#888';
  ctx.fillRect(-4, -R.radius-8, 8, 14);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
  ctx.strokeRect(-4, -R.radius-8, 8, 14);

  // Shield ring
  if (R.maxShield > 0 && R.shield > 0) {
    ctx.save();
    ctx.globalAlpha = (R.shield / R.maxShield) * 0.5;
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, R.radius + 5, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  // HP bar above robot
  const barW = R.radius * 2;
  const bx2 = R.x - barW/2, by2 = R.y - R.radius - 14;
  fillRect(bx2, by2, barW, 5, '#111');
  const hpFrac = R.hp / R.maxHP;
  fillRect(bx2, by2, barW * hpFrac, 5,
    hpFrac > 0.5 ? '#44ff88' : hpFrac > 0.25 ? '#ffcc00' : '#ff3333');
  if (R.maxShield > 0) {
    fillRect(bx2, by2-6, barW, 4, '#112244');
    fillRect(bx2, by2-6, barW*(R.shield/R.maxShield), 4, '#4488ff');
  }
}

// ── Pickups render
function drawPickups() {
  for (const p of Arena.pickups) {
    const bob = Math.sin(Arena.frame * 0.08) * 2;
    if (p.type === 'scrap') {
      ctx.fillStyle = '#44ff88';
      ctx.fillRect(p.x-5, p.y-5+bob, 10, 10);
      ctx.strokeStyle = '#22aa44'; ctx.lineWidth = 1;
      ctx.strokeRect(p.x-5, p.y-5+bob, 10, 10);
      ctx.fillStyle = '#000'; ctx.font = '9px monospace'; ctx.textAlign='center';
      ctx.fillText('S', p.x, p.y+4+bob);
    } else {
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(p.x, p.y+bob, 7, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#000'; ctx.font = '9px monospace'; ctx.textAlign='center';
      ctx.fillText('P', p.x, p.y+4+bob);
    }
  }
}

// ── Bullets render
function drawBullets() {
  for (const b of Arena.bullets) {
    ctx.fillStyle = b.isLaser ? '#88ffff' : '#ffcc44';
    ctx.shadowColor = b.isLaser ? '#00ffff' : '#ff8800';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  for (const b of Arena.enemyBullets) {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  const R = Arena.robot;
  document.getElementById('hud-round').textContent = Game.round;
  document.getElementById('hud-hp').textContent = Math.ceil(R.hp);
  document.getElementById('hud-energy').textContent = R.mass || 0;
  document.getElementById('hud-energy-max').textContent = R.maxHP || 0;
  document.getElementById('hud-scrap').textContent = Game.scrap;
}

// ═══════════════════════════════════════════════════════════
//  ARENA BACKGROUND
// ═══════════════════════════════════════════════════════════
function drawArenaBackground() {
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  // Floor
  fillRect(0, ay, aw, ah, '#07100a');

  // Arena grid
  ctx.strokeStyle = '#0c1a0c'; ctx.lineWidth = 1;
  for (let x=0; x<aw; x+=50) { ctx.beginPath(); ctx.moveTo(x,ay); ctx.lineTo(x,ay+ah); ctx.stroke(); }
  for (let y=ay; y<ay+ah; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(aw,y); ctx.stroke(); }

  // Arena border
  ctx.strokeStyle = '#1a3a1a'; ctx.lineWidth = 3;
  ctx.strokeRect(2, ay+2, aw-4, ah-4);

  // Danger zone (corners)
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(0, ay, 60, 60);
  ctx.fillRect(aw-60, ay, 60, 60);
  ctx.fillRect(0, ay+ah-60, 60, 60);
  ctx.fillRect(aw-60, ay+ah-60, 60, 60);
  ctx.restore();

  // Round indicator
  ctx.fillStyle = '#1a3a1a';
  ctx.font = '11px "Courier New",monospace'; ctx.textAlign = 'right';
  ctx.fillText(`РАУНД ${Game.round} / ${Game.maxRounds}`, aw-8, ay+18);

  // Enemy count
  ctx.fillStyle = Arena.enemies.length > 0 ? C.danger : C.accent;
  ctx.textAlign = 'left';
  ctx.fillText(`ВРАГОВ: ${Arena.enemies.length}`, 8, ay+18);
}

// ═══════════════════════════════════════════════════════════
//  MAIN ARENA UPDATE LOOP
// ═══════════════════════════════════════════════════════════
function updateArena() {
  Arena.frame++;

  fillRect(0, 0, W, H, '#050a05');
  drawArenaBackground();

  if (!Arena.result) {
    updateRobotMovement();
    updateWeapons();
    updateEnemies();
    updateBullets();
    updatePickups();

    // Check win
    if (Arena.enemies.length === 0 && !Arena.result) {
      Arena.result = 'win';
    }
  }

  // Draw scene
  drawPickups();
  drawBullets();
  drawEnemies();
  drawRobot();

  updateHUD();

  // Result overlay
  if (Arena.result) {
    drawArenaResult();
  }

  drawVignette();
  drawScanlines();
}

function drawArenaResult() {
  const win = Arena.result === 'win';
  ctx.save();
  ctx.globalAlpha = 0.7;
  fillRect(0, 0, W, H, '#000');
  ctx.restore();

  const color = win ? C.accent : C.danger;
  ctx.fillStyle = color;
  ctx.font = 'bold 40px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.fillText(win ? 'РАУНД ПРОЙДЕН' : 'УНИЧТОЖЕН', W/2, H/2 - 30);
  ctx.shadowBlur = 0;

  ctx.fillStyle = C.textDim; ctx.font = '14px "Courier New",monospace';
  if (win) ctx.fillText('Металлолом собран. Выбери трофеи.', W/2, H/2+10);
  else     ctx.fillText('Твоё шасси разнесено в труху.', W/2, H/2+10);

  const btnW = 220, btnH = 38;
  const bx = W/2 - 110, by = H/2+40;
  const hov = isHover(bx, by, btnW, btnH);
  drawButton(win ? '[ ЗАБРАТЬ ТРОФЕИ ]' : '[ ИГРА ОКОНЧЕНА ]', bx, by, btnW, btnH, hov, !win);

  if (isClick(bx, by, btnW, btnH)) {
    ctx.shadowBlur = 0;
    if (win) {
      prepLoot();
      setState(STATE.LOOT);
    } else {
      setState(STATE.GAMEOVER);
    }
  }
}
</script>

<!-- PART 4: ENEMIES + LOOT + ROGUELIKE -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ENEMY DEFINITIONS
// ═══════════════════════════════════════════════════════════
const ENEMY_DEFS = {
  scout: {
    label: 'РАЗВЕДЧИК', color: '#cc4422', borderColor: '#ff6644',
    radius: 14, speed: 1.8, hp: 40, damage: 8,
    fireRate: 70, bulletSpeed: 5, range: 260, shootRange: 220,
    scrapDrop: 5, dropPart: 'gun_basic',
    ai: 'chase',
    desc: 'Быстрый, мало HP. Летит прямо на тебя.'
  },
  gunner: {
    label: 'СТРЕЛОК', color: '#aa3366', borderColor: '#ff55aa',
    radius: 18, speed: 1.3, hp: 80, damage: 14,
    fireRate: 50, bulletSpeed: 4.5, range: 300, shootRange: 280,
    scrapDrop: 8, dropPart: 'sensor_auto',
    ai: 'strafe',
    desc: 'Держит дистанцию, стреляет с флангов.'
  },
  tank_enemy: {
    label: 'ТАНК', color: '#223366', borderColor: '#4488ff',
    radius: 26, speed: 0.9, hp: 180, damage: 28,
    fireRate: 100, bulletSpeed: 6.5, range: 380, shootRange: 350,
    scrapDrop: 15, dropPart: 'armor_heavy',
    ai: 'charge',
    desc: 'Медленный, бронированный, опустошительный.'
  },
  swarm: {
    label: 'РОЙ', color: '#446622', borderColor: '#88cc44',
    radius: 9, speed: 2.2, hp: 20, damage: 5,
    fireRate: 120, bulletSpeed: 4, range: 200, shootRange: 140,
    scrapDrop: 2, dropPart: null,
    ai: 'swarm',
    desc: 'Крошечные, быстрые. Опасны толпой.'
  },
  sniper: {
    label: 'СНАЙПЕР', color: '#333322', borderColor: '#cccc44',
    radius: 15, speed: 1.0, hp: 55, damage: 35,
    fireRate: 140, bulletSpeed: 9, range: 600, shootRange: 500,
    scrapDrop: 10, dropPart: 'laser',
    ai: 'sniper',
    desc: 'Держится далеко, редкие смертоносные выстрелы.'
  },
  bomber: {
    label: 'БОМБАРДИР', color: '#553311', borderColor: '#ff8800',
    radius: 20, speed: 1.8, hp: 100, damage: 45,
    fireRate: 180, bulletSpeed: 3.5, range: 220, shootRange: 200,
    scrapDrop: 12, dropPart: 'shield_gen',
    ai: 'kamikaze',
    desc: 'Врывается в упор и выстреливает очередями.'
  },
};

// ── Wave configs per round
const ROUND_WAVES = [
  // Round 1 — Tutorial
  [ {type:'scout', n:2} ],
  // Round 2
  [ {type:'scout', n:2}, {type:'gunner', n:1} ],
  // Round 3
  [ {type:'gunner', n:2}, {type:'swarm', n:4} ],
  // Round 4
  [ {type:'tank_enemy', n:1}, {type:'scout', n:2} ],
  // Round 5
  [ {type:'sniper', n:2}, {type:'swarm', n:5} ],
  // Round 6
  [ {type:'bomber', n:2}, {type:'gunner', n:2} ],
  // Round 7 — Boss wave
  [ {type:'tank_enemy', n:2}, {type:'sniper', n:2}, {type:'bomber', n:1} ],
];

function spawnEnemiesForRound(round) {
  const wave = ROUND_WAVES[Math.min(round-1, ROUND_WAVES.length-1)];
  const enemies = [];
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  // HP scale with round
  const scale = 1 + (round-1) * 0.18;

  for (const group of wave) {
    const def = ENEMY_DEFS[group.type];
    for (let i = 0; i < group.n; i++) {
      // Spawn on edges, away from player
      let ex, ey;
      const edge = Math.floor(Math.random()*4);
      if (edge===0) { ex=30+Math.random()*(aw-60); ey=ay+30; }
      else if (edge===1) { ex=aw-30; ey=ay+30+Math.random()*(ah-60); }
      else if (edge===2) { ex=30+Math.random()*(aw-60); ey=ay+ah-30; }
      else { ex=30; ey=ay+30+Math.random()*(ah-60); }

      enemies.push({
        type: group.type,
        x: ex, y: ey,
        vx: 0, vy: 0,
        angle: 0,
        hp: Math.ceil(def.hp * scale),
        maxHP: Math.ceil(def.hp * scale),
        radius: def.radius,
        color: def.color,
        borderColor: def.borderColor,
        speed: def.speed,
        damage: def.damage,
        fireRate: def.fireRate,
        bulletSpeed: def.bulletSpeed,
        range: def.range,
        shootRange: def.shootRange,
        ai: def.ai,
        fireCooldown: Math.floor(Math.random()*def.fireRate),
        strafeDir: Math.random()<0.5 ? 1 : -1,
        strafeSwitchTimer: 0,
        dropPart: def.dropPart,
        label: def.label,
      });
    }
  }
  return enemies;
}

// ═══════════════════════════════════════════════════════════
//  ENEMY AI
// ═══════════════════════════════════════════════════════════
function updateEnemies() {
  const R = Arena.robot;
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  for (const e of Arena.enemies) {
    const dx = R.x - e.x, dy = R.y - e.y;
    const dist = Math.hypot(dx, dy);
    const toPlayer = Math.atan2(dy, dx);
    e.angle = toPlayer;

    // ── AI behaviour
    if (e.ai === 'chase') {
      // Rush straight at player
      e.vx += Math.cos(toPlayer) * 0.25;
      e.vy += Math.sin(toPlayer) * 0.25;
    } else if (e.ai === 'strafe') {
      // Keep medium distance, strafe sideways
      const ideal = 220;
      e.strafeSwitchTimer++;
      if (e.strafeSwitchTimer > 120+Math.random()*80) {
        e.strafeDir *= -1; e.strafeSwitchTimer=0;
      }
      const perpAngle = toPlayer + Math.PI/2 * e.strafeDir;
      if (dist > ideal+30) {
        e.vx += Math.cos(toPlayer)*0.15;
        e.vy += Math.sin(toPlayer)*0.15;
      } else if (dist < ideal-30) {
        e.vx -= Math.cos(toPlayer)*0.15;
        e.vy -= Math.sin(toPlayer)*0.15;
      }
      e.vx += Math.cos(perpAngle)*0.2;
      e.vy += Math.sin(perpAngle)*0.2;
    } else if (e.ai === 'charge') {
      // Slow approach, unstoppable
      if (dist > 80) {
        e.vx += Math.cos(toPlayer)*0.12;
        e.vy += Math.sin(toPlayer)*0.12;
      }
    } else if (e.ai === 'swarm') {
      // Fast rush, slight scatter
      const scatter = (Math.random()-0.5)*0.8;
      e.vx += Math.cos(toPlayer+scatter)*0.35;
      e.vy += Math.sin(toPlayer+scatter)*0.35;
    } else if (e.ai === 'sniper') {
      // Stay far, circle slowly
      const ideal = 380;
      e.strafeSwitchTimer++;
      if (e.strafeSwitchTimer > 200) { e.strafeDir*=-1; e.strafeSwitchTimer=0; }
      const perpAngle = toPlayer + Math.PI/2 * e.strafeDir;
      if (dist < ideal-40) {
        e.vx -= Math.cos(toPlayer)*0.1;
        e.vy -= Math.sin(toPlayer)*0.1;
      } else if (dist > ideal+40) {
        e.vx += Math.cos(toPlayer)*0.08;
        e.vy += Math.sin(toPlayer)*0.08;
      }
      e.vx += Math.cos(perpAngle)*0.12;
      e.vy += Math.sin(perpAngle)*0.12;
    } else if (e.ai === 'kamikaze') {
      // Rush in bursts, retreat after shooting
      if (dist > 120) {
        e.vx += Math.cos(toPlayer)*0.22;
        e.vy += Math.sin(toPlayer)*0.22;
      } else {
        e.vx -= Math.cos(toPlayer)*0.1;
        e.vy -= Math.sin(toPlayer)*0.1;
      }
    }

    // Speed cap
    const spd = Math.hypot(e.vx, e.vy);
    if (spd > e.speed) { e.vx *= e.speed/spd; e.vy *= e.speed/spd; }
    e.vx *= 0.86; e.vy *= 0.86;

    e.x += e.vx; e.y += e.vy;
    e.x = Math.max(e.radius, Math.min(aw-e.radius, e.x));
    e.y = Math.max(ay+e.radius, Math.min(ay+ah-e.radius, e.y));

    // ── Robot-enemy hard separation (enemies can't enter robot)
    const sepDist = e.radius + R.radius + 4;
    if (dist < sepDist && dist > 0.1) {
      const overlap = sepDist - dist;
      const nx = dx / dist, ny = dy / dist;
      // Push enemy away from robot
      e.x -= nx * overlap * 0.7;
      e.y -= ny * overlap * 0.7;
      e.vx -= nx * 0.5;
      e.vy -= ny * 0.5;
      // Push robot away a little (unless tank)
      if (!R.knockbackImmune) {
        R.x += nx * overlap * 0.3;
        R.y += ny * overlap * 0.3;
      }
    }

    // Enemy-enemy separation
    for (const o of Arena.enemies) {
      if (o===e) continue;
      const ddx=e.x-o.x, ddy=e.y-o.y, dd=Math.hypot(ddx,ddy);
      if (dd < e.radius+o.radius+2 && dd>0.1) {
        const push = (e.radius+o.radius+2-dd)*0.35/dd;
        e.x += ddx*push; e.y += ddy*push;
      }
    }

    // Shooting
    e.fireCooldown--;
    if (e.fireCooldown <= 0 && dist < e.shootRange) {
      e.fireCooldown = e.fireRate + Math.floor(Math.random()*30-15);
      const bx = e.x + Math.cos(toPlayer)*(e.radius+6);
      const by = e.y + Math.sin(toPlayer)*(e.radius+6);
      // Add slight spread
      const spread = e.ai==='swarm' ? 0.3 : 0.08;
      const shootAngle = toPlayer + (Math.random()-0.5)*spread;
      spawnBullet(bx, by, shootAngle,
        { bulletSpeed: e.bulletSpeed, damage: e.damage, range: e.range }, false);
    }

    // Melee damage on contact
    if (dist < e.radius + R.radius + 2) {
      if (!e._meleeCooldown || e._meleeCooldown <= 0) {
        damageRobot(e.damage * 0.5);
        e._meleeCooldown = 40;
        if (!R.knockbackImmune) {
          R.vx -= Math.cos(toPlayer)*4;
          R.vy -= Math.sin(toPlayer)*4;
        }
      }
    }
    if (e._meleeCooldown > 0) e._meleeCooldown--;
  }
}

// ── Enemy render
function drawEnemies() {
  for (const e of Arena.enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle + Math.PI/2);

    // Body
    ctx.fillStyle = e.color;
    ctx.beginPath();
    const sides = e.ai==='swarm' ? 3 : (e.ai==='tank_enemy'||e.ai==='charge') ? 6 : 4;
    for (let i=0; i<sides; i++) {
      const a = (i/sides)*Math.PI*2 - Math.PI/sides;
      const px = Math.cos(a)*e.radius, py = Math.sin(a)*e.radius;
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = e.borderColor; ctx.lineWidth = 2; ctx.stroke();

    // Barrel
    ctx.fillStyle = '#555';
    ctx.fillRect(-3, -e.radius-6, 6, 10);

    ctx.restore();

    // HP bar
    const barW = e.radius*2;
    const bx2 = e.x - barW/2, by2 = e.y - e.radius - 10;
    fillRect(bx2, by2, barW, 4, '#111');
    fillRect(bx2, by2, barW*(e.hp/e.maxHP), 4, e.hp/e.maxHP > 0.5 ? '#ff6644' : '#ff2222');

    // Label
    ctx.fillStyle = e.borderColor; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText(e.label, e.x, by2-2);
  }
}

// ═══════════════════════════════════════════════════════════
//  LOOT SCREEN
// ═══════════════════════════════════════════════════════════
const Loot = {
  offered: [],    // parts offered
  selected: [],   // selected part ids
  maxPick: 3,
};

// Part rarity table by round
const LOOT_TABLES = [
  ['gun_basic','wheel','armor_light','sensor_auto','sensor_manual'],
  ['gun_rapid','tracks','armor_light','sensor_auto','battery','gun_basic'],
  ['gun_heavy','legs','armor_heavy','shield_gen','sensor_manual','gun_rapid','timer_fast'],
  ['laser','jets','armor_heavy','shield_gen','gun_heavy','tracks','battery'],
  ['laser','jets','legs','shield_gen','gun_heavy','timer_fast','battery'],
  ['laser','gun_heavy','shield_gen','legs','jets','armor_heavy'],
  ['laser','gun_heavy','shield_gen','jets','legs','gun_rapid','armor_heavy'],
];

function prepLoot() {
  Arena._droppedParts = Arena._droppedParts || [];
  Game.round++; // advance round AFTER combat

  const table = LOOT_TABLES[Math.min(Game.round-2, LOOT_TABLES.length-1)];

  // 5-8 random parts from loot table + any dropped in arena
  const pool = [...Arena._droppedParts];
  const n = 5 + Math.floor(Math.random()*4);
  for (let i=0; i<n; i++) {
    const t = table[Math.floor(Math.random()*table.length)];
    pool.push(createPart(t));
  }

  // Shuffle, limit to 8
  for (let i=pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  Loot.offered = pool.slice(0,8);
  Loot.selected = [];
  Arena._droppedParts = [];

  // Put back Assembly parts into inventory (they're on the placed grid, keep them there)
  // Reset placement — robot HP is restored for next round
  Assembly.placed.forEach(p => { p.hp = PART_DEFS[p.type].maxHP; });
}

function updateLoot() {
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  // Title
  ctx.fillStyle = C.accent; ctx.font='bold 20px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('ТРОФЕИ ВОЙНЫ', W/2, 35);
  ctx.fillStyle = C.textDim; ctx.font='12px "Courier New",monospace';
  ctx.fillText(`Выбери до ${Loot.maxPick} деталей · остальное уйдёт в металлолом`, W/2, 56);
  ctx.fillStyle = C.warn;
  ctx.fillText(`МЕТАЛЛОЛОМ: ${Game.scrap}`, W/2, 72);

  // Part cards in grid
  const cols = 4, cardW = 180, cardH = 110;
  const startX = W/2 - (cols*cardW + (cols-1)*12)/2;
  const startY = 90;

  Loot.offered.forEach((part, i) => {
    if (!part) return;
    const def = PART_DEFS[part.type];
    const col = i % cols, row = Math.floor(i / cols);
    const cx2 = startX + col*(cardW+12);
    const cy2 = startY + row*(cardH+12);

    const selected = Loot.selected.includes(part.id);
    const hov = isHover(cx2, cy2, cardW, cardH);

    // Card background
    fillRect(cx2, cy2, cardW, cardH, selected ? '#0f2a0f' : (hov ? '#0d1f0d' : '#090f09'));
    strokeRect(cx2, cy2, cardW, cardH,
      selected ? C.accent : (hov ? '#2a4a2a' : C.border), selected ? 2 : 1);

    // Selected checkmark
    if (selected) {
      ctx.fillStyle = C.accent; ctx.font='16px monospace'; ctx.textAlign='right';
      ctx.fillText('✓', cx2+cardW-6, cy2+20);
    }

    // Icon
    ctx.font=`28px serif`; ctx.textAlign='left';
    ctx.fillText(def.icon, cx2+8, cy2+38);

    // Name + cat
    ctx.fillStyle = def.border; ctx.font='bold 11px "Courier New",monospace';
    ctx.textAlign='left';
    ctx.fillText(def.label, cx2+44, cy2+22);
    const CAT_RU2 = {chassis:'ШАССИ',weapon:'ОРУЖИЕ',sensor:'СЕНСОР',movement:'ДВИЖЕНИЕ',armor:'БРОНЯ',utility:'УТИЛИТА'};
    ctx.fillStyle = C.textDim; ctx.font='9px "Courier New",monospace';
    ctx.fillText(CAT_RU2[def.cat]||def.cat.toUpperCase(), cx2+44, cy2+34);

    // Stats
    ctx.fillStyle = C.text; ctx.font='10px "Courier New",monospace';
    ctx.fillText(`${def.w}×${def.h}  ${def.mass}кг  ${def.energy>0?'-':'+'}${Math.abs(def.energy)}Э`, cx2+8, cy2+55);
    ctx.fillText(`ПЗ: ${def.maxHP}`, cx2+8, cy2+68);

    // Desc
    ctx.fillStyle = C.textDim; ctx.font='9px "Courier New",monospace';
    const words = def.desc.split(' ');
    let line='', ly=cy2+83;
    for (const w of words) {
      if ((line+' '+w).length>24 && line) { ctx.fillText(line, cx2+8, ly); line=w; ly+=11; }
      else line=(line?line+' ':'')+w;
    }
    ctx.fillText(line, cx2+8, ly);

    // Toggle selection
    if (isClick(cx2, cy2, cardW, cardH)) {
      if (selected) {
        Loot.selected = Loot.selected.filter(id => id !== part.id);
      } else if (Loot.selected.length < Loot.maxPick) {
        Loot.selected.push(part.id);
      }
    }
  });

  // Counter
  ctx.fillStyle = C.text; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText(`Выбрано: ${Loot.selected.length} / ${Loot.maxPick}`, W/2, H-60);

  // Scrap value of unselected
  const unselected = Loot.offered.filter(p => p && !Loot.selected.includes(p.id));
  const scrapVal = unselected.reduce((sum, p) => sum + PART_DEFS[p.type].mass*2, 0);
  ctx.fillStyle = C.textDim; ctx.font='11px "Courier New",monospace';
  ctx.fillText(`Отброшено → +${scrapVal} металлолома`, W/2, H-44);

  // Confirm button
  const bx = W/2-110, by = H-34;
  const hov = isHover(bx, by, 220, 28);
  const nextLabel = Game.round > Game.maxRounds ? '[ ФИНАЛЬНАЯ ПОБЕДА ]' : `[ ПРОДОЛЖИТЬ → РАУНД ${Game.round} ]`;
  drawButton(nextLabel, bx, by, 220, 28, hov);

  if (isClick(bx, by, 220, 28)) {
    // Add selected parts to inventory
    for (const part of Loot.offered) {
      if (!part) continue;
      if (Loot.selected.includes(part.id)) {
        Game.inventory.push(part);
      } else {
        // Scrap value
        Game.scrap += PART_DEFS[part.type].mass * 2;
      }
    }
    Loot.offered = []; Loot.selected = [];

    if (Game.round > Game.maxRounds) {
      setState(STATE.WIN);
    } else {
      initAssembly(); // re-init assembly keeping existing placement
      setState(STATE.ASSEMBLY);
    }
  }

  drawVignette();
  drawScanlines();
}

// ── Override placeholder updateLoot (was empty)
