<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRECK PROTOCOL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; font-family: 'Courier New', monospace;
  overflow: hidden; user-select: none;
}
#gameCanvas {
  border: 1px solid #1a2a1a;
  cursor: crosshair;
  image-rendering: pixelated;
}
#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#hud {
  position: absolute; top: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 20px; align-items: center;
  pointer-events: none;
}
.hud-item {
  color: #4eff91; font-size: 13px; letter-spacing: 1px;
  background: rgba(0,0,0,0.7); padding: 4px 10px;
  border: 1px solid #1a3a1a;
}
.hud-item span { color: #fff; }
#tooltip {
  position: absolute; background: rgba(0,0,0,0.9);
  border: 1px solid #4eff91; color: #ccc;
  font-size: 11px; padding: 6px 10px;
  pointer-events: none; display: none;
  max-width: 280px; line-height: 1.5;
}
#instructions {
  position: absolute; bottom: 10px; left: 50%;
  transform: translateX(-50%);
  color: #336633; font-size: 11px; letter-spacing: 1px;
  text-align: center; pointer-events: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud" style="display:none">
    <div class="hud-item">РАУНД <span id="hud-round">1</span>/7</div>
    <div class="hud-item">ПЗ <span id="hud-hp">100</span></div>
    <div class="hud-item">МАССА <span id="hud-energy">10</span> / МП <span id="hud-energy-max">10</span></div>
    <div class="hud-item">ЛОМ <span id="hud-scrap">0</span></div>
  </div>
  <div id="tooltip"></div>
  <div id="instructions"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 650;
canvas.width = W; canvas.height = H;

// User-controlled zoom (Ctrl+scroll)
let _userScale = 1.0;

// Scale canvas to fit window while maintaining aspect ratio
function resizeCanvas() {
  const baseScale = Math.min(window.innerWidth / W, window.innerHeight / H);
  const scale = baseScale * _userScale;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Ctrl+scroll to zoom in/out
window.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  _userScale = Math.max(0.4, Math.min(2.0, _userScale - e.deltaY * 0.0008));
  resizeCanvas();
}, { passive: false });

// ═══════════════════════════════════════════════════════════
//  GAME STATES
// ═══════════════════════════════════════════════════════════
const STATE = { MENU: 0, ASSEMBLY: 1, ARENA: 2, LOOT: 3, GAMEOVER: 4, WIN: 5, MUTATION: 6, CLASS_SELECT: 7, ENCOUNTER: 8 };
let gameState = STATE.MENU;

function setState(s) {
  gameState = s;
  onStateEnter(s);
}

// ═══════════════════════════════════════════════════════════
//  INPUT SYSTEM
// ═══════════════════════════════════════════════════════════
const Keys = {};
const Mouse = { x: 0, y: 0, cx: 0, cy: 0, down: false, clicked: false, rightClicked: false };
const mouseListeners = [];

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY
  };
}

window.addEventListener('keydown', e => {
  if (!Keys[e.code]) {
    Keys[e.code] = true;
    Keys[e.code + '_pressed'] = true;
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { Keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e);
  Mouse.x = p.x; Mouse.y = p.y;
  Mouse.cx = p.x; Mouse.cy = p.y;
});
canvas.addEventListener('mousedown', e => {
  const p = getCanvasPos(e);
  Mouse.x = p.x; Mouse.y = p.y;
  if (e.button === 0) Mouse.down = true;
  if (e.button === 2) Mouse.rightClicked = true;
  e.preventDefault();
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) { Mouse.down = false; Mouse.clicked = true; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

function clearFrameInput() {
  Mouse.clicked = false;
  Mouse.rightClicked = false;
  for (const k in Keys) if (k.endsWith('_pressed')) Keys[k] = false;
}

// ═══════════════════════════════════════════════════════════
//  DRAWING UTILITIES
// ═══════════════════════════════════════════════════════════
const C = {
  bg:       '#0a0a0f',
  panel:    '#0d1a0d',
  border:   '#1a3a1a',
  accent:   '#4eff91',
  accent2:  '#ff6b35',
  accent3:  '#35c5ff',
  dim:      '#1a4a1a',
  text:     '#cce8cc',
  textDim:  '#4a6a4a',
  warn:     '#ffcc00',
  danger:   '#ff3333',
  wire:     '#ffcc44',
  wireActive: '#fff066',
};

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function strokeRect(x, y, w, h, color, lw=1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
}
function text(str, x, y, color='#cce8cc', size=13, align='left') {
  ctx.fillStyle = color; ctx.font = `${size}px "Courier New",monospace`;
  ctx.textAlign = align; ctx.fillText(str, x, y);
}
function textCenter(str, x, y, color, size) { text(str, x, y, color, size, 'center'); }

function drawButton(label, x, y, w, h, hovered, danger=false) {
  const bc = danger ? C.danger : (hovered ? C.accent : C.dim);
  const tc = hovered ? '#000' : C.accent;
  fillRect(x, y, w, h, hovered ? (danger ? C.danger : C.accent) : '#0a140a');
  strokeRect(x, y, w, h, bc, 1);
  textCenter(label, x + w/2, y + h/2 + 5, tc, 13);
}
function isHover(x, y, w, h) {
  return Mouse.x >= x && Mouse.x <= x+w && Mouse.y >= y && Mouse.y <= y+h;
}
function isClick(x, y, w, h) { return isHover(x,y,w,h) && Mouse.clicked; }

function drawGrid(x, y, w, h, step, color='#0f1f0f') {
  ctx.strokeStyle = color; ctx.lineWidth = 1;
  for (let i = x; i <= x+w; i += step) { ctx.beginPath(); ctx.moveTo(i+0.5,y); ctx.lineTo(i+0.5,y+h); ctx.stroke(); }
  for (let j = y; j <= y+h; j += step) { ctx.beginPath(); ctx.moveTo(x,j+0.5); ctx.lineTo(x+w,j+0.5); ctx.stroke(); }
}

function drawPanel(x, y, w, h, title='') {
  fillRect(x, y, w, h, C.panel);
  strokeRect(x, y, w, h, C.border);
  if (title) {
    fillRect(x, y, w, 22, '#0f1f0f');
    text(title, x+8, y+15, C.accent, 11);
    ctx.strokeStyle = C.border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y+22.5); ctx.lineTo(x+w, y+22.5); ctx.stroke();
  }
}

// Scanlines effect
function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) { ctx.fillRect(0, y, W, 1); }
  ctx.restore();
}

// Vignette
function drawVignette() {
  const g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// Flash effect for hits
let flashTimer = 0, flashColor = '#fff';
function triggerFlash(color='#ff3333', dur=8) { flashTimer = dur; flashColor = color; }
function drawFlash() {
  if (flashTimer <= 0) return;
  ctx.save();
  ctx.globalAlpha = flashTimer / 30 * 0.3;
  ctx.fillStyle = flashColor;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  flashTimer--;
}

// Particle system
const particles = [];
function spawnParticles(x, y, color, n=8, speed=3, life=30) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life, maxLife: life, color, size: 2+Math.random()*2 });
  }
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life--;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════════════════
const Game = {
  round: 1,
  maxRounds: 7,
  scrap: 0,
  robot: null,       // assembled robot config
  inventory: [],     // parts in hand
  lootPool: [],      // parts offered after fight
};

// ═══════════════════════════════════════════════════════════
//  MENU SCREEN
// ═══════════════════════════════════════════════════════════
let menuAnim = 0;
let menuSparks = [];

function initMenu() {
  menuSparks = [];
  for (let i = 0; i < 40; i++) menuSparks.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
    life: Math.random()*200, maxLife: 200+Math.random()*200,
    size: 0.5+Math.random()*1.5
  });
}

function updateMenu() {
  menuAnim++;

  // Update sparks
  for (let i = menuSparks.length-1; i >= 0; i--) {
    const s = menuSparks[i];
    s.x += s.vx; s.y += s.vy;
    s.life--;
    if (s.life <= 0) {
      menuSparks[i] = {
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
        life: 100+Math.random()*200, maxLife: 200+Math.random()*200,
        size: 0.5+Math.random()*1.5
      };
    }
  }

  // Draw background
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0c1a0c');

  // Draw sparks
  for (const s of menuSparks) {
    ctx.save();
    ctx.globalAlpha = (s.life / s.maxLife) * 0.6;
    ctx.fillStyle = C.accent;
    ctx.fillRect(s.x, s.y, s.size, s.size);
    ctx.restore();
  }

  // Title
  const pulse = Math.sin(menuAnim * 0.04) * 0.15 + 0.85;
  ctx.save();
  ctx.globalAlpha = pulse;

  // Big title
  ctx.fillStyle = C.accent;
  ctx.font = 'bold 64px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = C.accent;
  ctx.shadowBlur = 20;
  ctx.fillText('WRECK', W/2, H/2 - 90);
  ctx.shadowBlur = 10;
  ctx.fillStyle = C.accent2;
  ctx.fillText('PROTOCOL', W/2, H/2 - 20);
  ctx.restore();

  ctx.fillStyle = C.textDim;
  ctx.font = '13px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText('собирай · подключай · сражайся · мародёрствуй', W/2, H/2 + 18);

  // Buttons
  const btnW = 200, btnH = 38;
  const bx = W/2 - btnW/2;

  const startHover = isHover(bx, H/2+40, btnW, btnH);
  drawButton('[ НАЧАТЬ ЗАБЕГ ]', bx, H/2+40, btnW, btnH, startHover);
  if (isClick(bx, H/2+40, btnW, btnH)) {
    setState(STATE.CLASS_SELECT);
  }

  // Info
  ctx.fillStyle = C.textDim;
  ctx.font = '11px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText('собери робота · подключи провода · выживи в 7 раундах', W/2, H/2+120);
  ctx.fillText('собирай детали с побеждённых врагов', W/2, H/2+138);

  // Version
  ctx.fillStyle = '#1a2a1a';
  ctx.font = '10px "Courier New",monospace';
  ctx.textAlign = 'right';
  ctx.fillText('v0.1 ALPHA', W-10, H-8);

  drawVignette();
  drawScanlines();
}

// ═══════════════════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════════════════
function startNewGame() {
  Game.round = 1;
  Game.scrap = 10;
  Game.mutations = [];

  // Starting parts
  Game.inventory = [
    createPart('chassis'),
    createPart('gun_basic'),
    createPart('wheel'),
    createPart('armor_light'),
  ];

  initAssembly();
}

// ═══════════════════════════════════════════════════════════
//  STATE ENTER HOOKS
// ═══════════════════════════════════════════════════════════
function onStateEnter(s) {
  const hud = document.getElementById('hud');
  const instr = document.getElementById('instructions');
  hud.style.display = (s === STATE.ARENA) ? 'flex' : 'none';

  if (s === STATE.MENU) {
    initMenu();
    instr.textContent = '';
  } else if (s === STATE.ASSEMBLY) {
    instr.textContent = 'СБОРКА: тащи детали на сетку · R вращение · ПКМ убрать деталь · нажми СРАЖАТЬСЯ';
  } else if (s === STATE.ARENA) {
    instr.textContent = 'WASD/стрелки — движение · ПРОБЕЛ — огонь · уничтожь всех врагов!';
  } else if (s === STATE.CLASS_SELECT) {
    instr.textContent = 'Выбери класс — он определит твой стиль игры на весь забег';
  } else if (s === STATE.ENCOUNTER) {
    instr.textContent = 'Случайная встреча — выбери действие';
  } else if (s === STATE.MUTATION) {
    instr.textContent = 'Выбери мутацию · она останется навсегда';
  } else if (s === STATE.LOOT) {
    instr.textContent = 'Выбери до 3 деталей · остальное уйдёт в металлолом';
  } else if (s === STATE.GAMEOVER) {
    instr.textContent = '';
  } else if (s === STATE.WIN) {
    instr.textContent = '';
  }
}

// ═══════════════════════════════════════════════════════════
//  PLACEHOLDER FUNCTIONS (filled in later parts)
// ═══════════════════════════════════════════════════════════
function createPart(type) { return { type }; }  // replaced in Part 2
function initAssembly() {}                        // replaced in Part 2
function updateAssembly() {}                      // replaced in Part 2
function updateArena() {}                         // replaced in Part 4
function updateLoot() {}                          // replaced in Part 5
function updateClassSelect() {}                   // replaced in Part 6
function updateEncounter() {}                     // replaced in Part 6
function updateGameOver() {}
function updateWin() {}

// ═══════════════════════════════════════════════════════════
//  GAME OVER / WIN SCREENS
// ═══════════════════════════════════════════════════════════
let endAnim = 0;
function drawEndScreen(win) {
  endAnim++;
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0c120c');

  const mainColor = win ? C.accent : C.danger;
  const mainText  = win ? 'ЧЕМПИОН' : 'УНИЧТОЖЕН';
  const subText   = win ? 'Арена твоя.' : 'Твой металлолом питает следующего.';

  ctx.save();
  ctx.globalAlpha = Math.min(1, endAnim / 40);
  ctx.fillStyle = mainColor;
  ctx.font = 'bold 56px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = mainColor;
  ctx.shadowBlur = 30;
  ctx.fillText(mainText, W/2, H/2 - 40);
  ctx.restore();

  ctx.fillStyle = C.textDim;
  ctx.font = '16px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText(subText, W/2, H/2 + 10);
  ctx.fillText(`Пройдено раундов: ${Game.round - 1} / ${Game.maxRounds}`, W/2, H/2 + 40);

  const btnW = 200, btnH = 38, bx = W/2 - 100;
  const restart = isHover(bx, H/2+80, btnW, btnH);
  drawButton('[ ИГРАТЬ СНОВА ]', bx, H/2+80, btnW, btnH, restart);
  if (isClick(bx, H/2+80, btnW, btnH)) {
    endAnim = 0;
    setState(STATE.MENU);
  }

  drawVignette();
  drawScanlines();
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  switch(gameState) {
    case STATE.MENU:     updateMenu();             break;
    case STATE.ASSEMBLY: updateAssembly();         break;
    case STATE.ARENA:    updateArena();            break;
    case STATE.LOOT:     updateLoot();             break;
    case STATE.GAMEOVER: drawEndScreen(false);     break;
    case STATE.WIN:      drawEndScreen(true);      break;
    case STATE.MUTATION:      updateMutation();       break;
    case STATE.CLASS_SELECT:  updateClassSelect();    break;
    case STATE.ENCOUNTER:     updateEncounter();      break;
  }

  updateParticles();
  drawFlash();
  clearFrameInput();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initMenu();
setState(STATE.MENU);
requestAnimationFrame(loop);
</script>

// ── Part factory
function createPart(type, rot=0) {
  const def = PART_DEFS[type];
  if (!def) { console.warn('Unknown part:', type); return null; }
  return {
    id: Math.random().toString(36).slice(2),
    type,
    rot,          // 0,1,2,3 (×90°)
    hp: def.maxHP,
    // grid position (set when placed)
    gx: null, gy: null,
  };
}

// Get effective width/height after rotation
function partW(p) {
  const d = PART_DEFS[p.type];
  return (p.rot % 2 === 0) ? d.w : d.h;
}
function partH(p) {
  const d = PART_DEFS[p.type];
  return (p.rot % 2 === 0) ? d.h : d.w;
}

// Get rotated ports
function getRotatedPorts(part) {
  const def = PART_DEFS[part.type];
  return (def.ports || []).map(port => {
    let ox = port.ox, oy = port.oy;
    for (let r = 0; r < part.rot; r++) {
      const tmp = ox; ox = -oy; oy = tmp; // rotate 90° CW
    }
    const sides = ['top','right','bottom','left'];
    const sideIdx = sides.indexOf(port.side);
    const newSide = sides[(sideIdx + part.rot) % 4];
    return { ...port, ox, oy, side: newSide };
  });
}

// ═══════════════════════════════════════════════════════════
//  ASSEMBLY SYSTEM
// ═══════════════════════════════════════════════════════════
const GRID_SIZE = 54;  // было 36, теперь 1.5×
const GRID_COLS = 8;
const GRID_ROWS = 8;

const Assembly = {
  // Grid: array of {part, gx, gy} placements
  placed: [],
  // Part being dragged
  dragging: null,
  dragOffX: 0, dragOffY: 0,
  // Palette scroll
  palScroll: 0,
  // Wires: [{fromId, fromPortIdx, toId, toPortIdx}]
  wires: [],
  // Wire being drawn
  wiringFrom: null,  // {partId, portIdx, px, py}
  // Grid origin on screen
  gridOriginX: 0,
  gridOriginY: 0,
  // Tab: 'parts' | 'wires'
  tab: 'parts',
  // Stats
  totalMass: 0,
  totalEnergy: 0,
  usedEnergy: 0,
};

function initAssembly() {
  const asmW = GRID_COLS * GRID_SIZE;
  const asmH = GRID_ROWS * GRID_SIZE;
  Assembly.gridOriginX = 60;
  Assembly.gridOriginY = (H - asmH) / 2;
  Assembly.placed = [];
  Assembly.wires = [];
  Assembly.wiringFrom = null;
  Assembly.dragging = null;
  Assembly.tab = 'parts';

  // Place chassis at center
  const chassis = createPart('chassis');
  const cx = Math.floor(GRID_COLS/2) - 1;
  const cy = Math.floor(GRID_ROWS/2) - 1;
  placeOnGrid(chassis, cx, cy);
}

function placeOnGrid(part, gx, gy) {
  part.gx = gx; part.gy = gy;
  Assembly.placed.push(part);
  recalcStats();
}

function removePlaced(partId, keepWires=false) {
  const idx = Assembly.placed.findIndex(p => p.id === partId);
  if (idx < 0) return;
  const part = Assembly.placed[idx];
  if (part.type === 'chassis') return; // can't remove chassis
  Assembly.placed.splice(idx, 1);
  // Remove connected wires (unless we're dragging — wires follow the part)
  if (!keepWires) {
    Assembly.wires = Assembly.wires.filter(w => w.fromId !== partId && w.toId !== partId);
  }
  recalcStats();
}

function recalcStats() {
  let mass = 0, capacity = 4, used = 0;
  for (const p of Assembly.placed) {
    const d = PART_DEFS[p.type];
    mass += d.mass;
    if ((d.energy || 0) < 0) capacity += Math.abs(d.energy); // battery adds capacity
    else used += (d.energy || 0);                             // parts consume energy
  }
  Assembly.totalMass   = mass;
  Assembly.usedEnergy  = used;
  Assembly.totalEnergy = capacity; // capacity (for backward compat label)
}

function canPlace(part, gx, gy) {
  const w = partW(part), h = partH(part);
  if (gx < 0 || gy < 0 || gx+w > GRID_COLS || gy+h > GRID_ROWS) return false;
  for (const existing of Assembly.placed) {
    if (existing.id === part.id) continue;
    const ew = partW(existing), eh = partH(existing);
    if (gx < existing.gx+ew && gx+w > existing.gx &&
        gy < existing.gy+eh && gy+h > existing.gy) return false;
  }
  return true;
}

function screenToGrid(sx, sy) {
  return {
    gx: Math.floor((sx - Assembly.gridOriginX) / GRID_SIZE),
    gy: Math.floor((sy - Assembly.gridOriginY) / GRID_SIZE),
  };
}

function gridToScreen(gx, gy) {
  return {
    sx: Assembly.gridOriginX + gx * GRID_SIZE,
    sy: Assembly.gridOriginY + gy * GRID_SIZE,
  };
}

// ── Port screen position
function portScreenPos(part, portIdx) {
  const ports = getRotatedPorts(part);
  const port = ports[portIdx];
  if (!port) return null;
  const { sx, sy } = gridToScreen(part.gx, part.gy);
  const halfW = partW(part) * GRID_SIZE / 2;
  const halfH = partH(part) * GRID_SIZE / 2;
  const INSET = 10; // px from edge — makes ports easier to click
  const dx = port.ox !== 0 ? Math.sign(port.ox) * (halfW - INSET) : 0;
  const dy = port.oy !== 0 ? Math.sign(port.oy) * (halfH - INSET) : 0;
  const cx = sx + halfW + dx;
  const cy = sy + halfH + dy;
  return { x: cx, y: cy, type: port.type };
}

// ── Draw a placed part on the grid
function drawPlacedPart(part, alpha=1) {
  const def = PART_DEFS[part.type];
  const { sx, sy } = gridToScreen(part.gx, part.gy);
  const pw = partW(part) * GRID_SIZE;
  const ph = partH(part) * GRID_SIZE;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Body
  fillRect(sx+1, sy+1, pw-2, ph-2, def.color);
  strokeRect(sx+1, sy+1, pw-2, ph-2, def.border, 2);

  // HP bar (clamped to prevent overflow when hp > maxHP)
  const hpFrac = Math.min(1, Math.max(0, part.hp / def.maxHP));
  const barW = pw - 8;
  fillRect(sx+4, sy+ph-6, barW, 3, '#111');
  fillRect(sx+4, sy+ph-6, barW * hpFrac, 3,
    hpFrac > 0.5 ? '#44ff88' : hpFrac > 0.25 ? '#ffcc00' : '#ff3333');

  // Label
  const fontSize = pw > 60 ? 10 : 8;
  ctx.fillStyle = def.border;
  ctx.font = `${fontSize}px "Courier New",monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(def.label, sx + pw/2, sy + 12);

  // Cat icon area
  if (pw >= GRID_SIZE * 1.5) {
    ctx.font = `${Math.min(pw,ph)*0.4}px serif`;
    ctx.fillText(def.icon, sx + pw/2, sy + ph/2 + 8);
  }

  // Draw ports
  const ports = getRotatedPorts(part);
  ports.forEach((port, i) => {
    const pp = portScreenPos(part, i);
    if (!pp) return;
    const isConnected = Assembly.wires.some(w =>
      (w.fromId===part.id && w.fromPortIdx===i) ||
      (w.toId===part.id   && w.toPortIdx===i));
    const pc = port.type === 'OUT'
      ? (isConnected ? '#ffcc44' : '#886622')
      : (isConnected ? '#44aaff' : '#224466');
    ctx.fillStyle = pc;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  ctx.restore();
}

function drawPalette() {
  drawPanel(PAL_X, 5, PAL_W, PAL_H, 'ИНВЕНТАРЬ');

  const items = Game.inventory;
  const startY = 35;
  const visH = PAL_H - 40;
  const maxScroll = Math.max(0, items.length * PAL_ITEM_H - visH);
  Assembly.palScroll = Math.max(0, Math.min(Assembly.palScroll, maxScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(PAL_X, 28, PAL_W, visH);
  ctx.clip();

  items.forEach((part, i) => {
    if (!part) return;
    const def = PART_DEFS[part.type];
    const iy = startY + i * PAL_ITEM_H - Assembly.palScroll;
    if (iy + PAL_ITEM_H < 28 || iy > H) return;

    const hov = isHover(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4);
    fillRect(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4, hov ? '#152515' : '#0d180d');
    strokeRect(PAL_X+4, iy, PAL_W-8, PAL_ITEM_H-4, def.border, 1);

    ctx.fillStyle = def.border;
    ctx.font = 'bold 13px "Courier New",monospace';
    ctx.textAlign = 'left';
    ctx.fillText(def.icon + ' ' + def.label, PAL_X+8, iy+18);

    ctx.fillStyle = C.textDim;
    ctx.font = '11px "Courier New",monospace';
    const CAT_RU = {chassis:'шасси',weapon:'оружие',sensor:'сенсор',movement:'движение',armor:'броня',utility:'утилита'};
    ctx.fillText(`${def.w}×${def.h} · ${def.mass}кг · ${CAT_RU[def.cat]||def.cat}`, PAL_X+8, iy+33);
    ctx.fillStyle = C.text;
    ctx.font = '11px "Courier New",monospace';
    const words = def.desc.split(' ');
    let ln='', ly=iy+48;
    for (const w of words) {
      const test = ln ? ln+' '+w : w;
      if (test.length > 28 && ln) { ctx.fillText(ln, PAL_X+8, ly); ln=w; ly+=13; }
      else ln=test;
    }
    ctx.fillText(ln, PAL_X+8, ly);

    // Drag start
    if (hov && Mouse.clicked) {
      Assembly.dragging = { part, fromInventory: true, invIdx: i };
      Assembly.dragOffX = 0; Assembly.dragOffY = 0;
    }
  });

  ctx.restore();

  // Stats
  const sy2 = 5 + PAL_H - 80;
  const energyOver = Assembly.usedEnergy > Assembly.totalEnergy;
  const energyColor = energyOver ? C.danger : C.accent;
  const massHeavy = Assembly.totalMass > 20;

  ctx.font = '12px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = massHeavy ? C.warn : C.text;
  ctx.fillText(`МАССА: ${Assembly.totalMass} кг${massHeavy?' ⚠':''}`, PAL_X+8, sy2+16);

  ctx.fillStyle = energyColor;
  ctx.fillText(`ЭНЕРГИЯ: ${Assembly.usedEnergy} / ${Assembly.totalEnergy}${energyOver?' ⚠':''}`, PAL_X+8, sy2+32);
  if (energyOver) {
    ctx.fillStyle = C.danger; ctx.font = '9px "Courier New",monospace';
    ctx.fillText('перегрузка → скорость -30%', PAL_X+8, sy2+43);
  }

  ctx.fillStyle = C.warn; ctx.font = 'bold 13px "Courier New",monospace';
  ctx.fillText(`ЛОМ: ${Game.scrap} ед.`, PAL_X+8, sy2+56);

  // ── Scrap shop buttons
  drawScrapShop();
}

// ── Wire drawing
function drawWires() {
  for (const wire of Assembly.wires) {
    const fromPart = Assembly.placed.find(p => p.id === wire.fromId);
    const toPart   = Assembly.placed.find(p => p.id === wire.toId);
    if (!fromPart || !toPart) continue;
    const fp = portScreenPos(fromPart, wire.fromPortIdx);
    const tp = portScreenPos(toPart,   wire.toPortIdx);
    if (!fp || !tp) continue;

    ctx.save();
    ctx.strokeStyle = C.wire;
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    // Bezier curve
    const mx = (fp.x+tp.x)/2, my = (fp.y+tp.y)/2;
    ctx.quadraticCurveTo(mx, fp.y, tp.x, tp.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Wire being drawn
  if (Assembly.wiringFrom) {
    const fp = Assembly.wiringFrom;
    ctx.save();
    ctx.strokeStyle = '#ffff88';
    ctx.lineWidth = 2;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(fp.px, fp.py);
    ctx.lineTo(Mouse.x, Mouse.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}
