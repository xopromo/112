<!-- PART 8c: PART WEAR SYSTEM -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  PART WEAR — damage distributes to individual parts
//  Worn parts give reduced performance; repair costs scrap
// ═══════════════════════════════════════════════════════════

// Override damageRobot to also wear parts (priority: armor/shield > others > chassis last)
const _wear_origDmgRobot = window.damageRobot;
window.damageRobot = function(dmg) {
  _wear_origDmgRobot(dmg);
  const R = Arena.robot;
  if (!R.parts || R.parts.length === 0) return;

  // Build weighted pool: armor/shield_gen = weight 4, chassis = weight 0.1 (only if alone)
  // Everything else = weight 1
  const nonChassis = R.parts.filter(p => p.type !== 'chassis' && p.hp > 0);
  const chassis    = R.parts.find(p => p.type === 'chassis');

  let pool;
  if (nonChassis.length > 0) {
    // Prefer non-chassis parts; armor/shield much more likely to wear
    pool = [];
    for (const p of nonChassis) {
      const def = PART_DEFS[p.type];
      const w = (def.cat === 'armor' || p.type === 'shield_gen') ? 4 : 1;
      for (let i = 0; i < w; i++) pool.push(p);
    }
  } else if (chassis && chassis.hp > 0) {
    // Only chassis remains — it takes wear
    pool = [chassis];
  } else {
    return;
  }

  const target = pool[Math.floor(Math.random() * pool.length)];
  const def = PART_DEFS[target.type];
  // Armor/shield absorb more wear per hit; others take less
  const wearFactor = (def.cat === 'armor' || target.type === 'shield_gen') ? 0.35 : 0.15;
  target.hp = Math.max(0, target.hp - dmg * wearFactor);
};

// After arena (win or lose): sync R.parts hp back to Assembly.placed
function syncPartsWear() {
  const R = Arena.robot;
  if (!R.parts) return;
  for (const rp of R.parts) {
    const ap = Assembly.placed.find(p => p.id === rp.id);
    if (ap) ap.hp = Math.min(PART_DEFS[ap.type].maxHP, Math.max(0, Math.ceil(rp.hp)));
  }
}

// Hook prepLoot (win path) to sync wear
const _wear_origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  syncPartsWear();
  _wear_origPrepLoot();
};

// Hook into lose → gameover to sync wear
const _wear_origSetState = window.setState;
window.setState = function(s) {
  if (s === STATE.GAMEOVER) syncPartsWear();
  _wear_origSetState(s);
};

// Apply wear effects in startArena: worn parts reduce performance
const _wear_origStartArena = window.startArena;
window.startArena = function() {
  _wear_origStartArena();
  const R = Arena.robot;
  // For each worn part, reduce its weapon/movement performance
  for (const p of R.parts) {
    const def = PART_DEFS[p.type];
    if (!def) continue;
    const hpFrac = p.hp / def.maxHP;
    if (hpFrac >= 0.9) continue; // barely worn, no effect

    const penalty = 1 + (1 - hpFrac) * 0.6; // 0-60% degradation
    if (def.cat === 'weapon') {
      // Find matching weapon and increase fire rate (slower)
      const w = R.weapons.find(w2 => w2.partId === p.id);
      if (w) w.def = { ...w.def, fireRate: Math.round(w.def.fireRate * penalty) };
    }
    if (def.cat === 'movement') {
      // Speed reduction stacks with mass penalty
      R.speed *= Math.max(0.5, 1 - (1 - hpFrac) * 0.4);
    }
  }
};

// Repair shop: make cost dynamic based on actual damage
const _wear_origDrawScrapShop = window.drawScrapShop;
window.drawScrapShop = function() {
  // Patch repair cost before drawing
  const totalDamage = Assembly.placed.reduce((sum, p) => {
    return sum + Math.max(0, PART_DEFS[p.type].maxHP - p.hp);
  }, 0);
  const repairCost = Math.max(5, Math.ceil(totalDamage * 0.12));
  // Temporarily store for shop to use
  window._wear_repairCost = repairCost;
  _wear_origDrawScrapShop();
};

// Hook into shop action to use dynamic repair cost
const _wear_origShopRepair = window.drawDoneButton; // not ideal, patch shop directly
// Actually, override the repair action inside drawScrapShop by modifying the shop array
// We do this by patching the cost check. Best approach: override Assembly.placed.forEach in repair:
// This is done inline — the shop at line ~1011 checks `s.action === 'repair'` and resets hp.
// The cost is hardcoded as 15. Let's add a dynamic repair indicator below the shop.

// Show wear summary in assembly
const _wear_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _wear_origUpdateAssembly();

  // Check if any part is worn
  const worn = Assembly.placed.filter(p => p.hp < PART_DEFS[p.type].maxHP * 0.8);
  if (worn.length === 0) return;

  // Show wear warning near the repair button
  const bx = Assembly.gridOriginX + GRID_COLS * GRID_SIZE / 2 - 80;
  const by = H - 68;
  ctx.fillStyle = '#ff8844'; ctx.font = 'bold 9px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.fillText(`⚠ ${worn.length} деталей повреждены — производительность снижена`, bx + 80, by);
};

console.log('[WRECK PROTOCOL] Part wear system loaded.');
</script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  POST-ROUND COLLECT PAUSE — 3 seconds to pick up parts
// ═══════════════════════════════════════════════════════════
const _pause_origUpdateArena = window.updateArena;
window.updateArena = function() {
  // Run the original first (handles movement, bullets, enemies, pickups, etc.)
  _pause_origUpdateArena();

  // Intercept: if original just set 'win' because enemies are gone,
  // override with collect timer so player has 3 seconds to pick up drops.
  const noEnemies = Arena.enemies && Arena.enemies.length === 0;
  if (noEnemies && Arena.result === 'win' && !Arena._collectTimerDone) {
    // Start countdown on first trigger
    if (!Arena._collectTimer) {
      Arena._collectTimer = 180; // 3 seconds at 60fps
      spawnParticles(Arena.arenaW/2, Arena.arenaY + Arena.arenaH/2, '#4eff91', 20, 4, 60);
    }
    Arena._collectTimer--;
    if (Arena._collectTimer <= 0) {
      Arena._collectTimerDone = true;
      Arena._collectTimer = 0;
      // Auto-collect remaining part pickups so nothing is lost
      if (Arena.pickups) {
        for (let i = Arena.pickups.length - 1; i >= 0; i--) {
          const pk = Arena.pickups[i];
          if (pk.type === 'scrap') {
            Game.scrap += pk.value;
          } else if (pk.type === 'part') {
            Arena._droppedParts = Arena._droppedParts || [];
            Arena._droppedParts.push(createPart(pk.partType));
          }
          Arena.pickups.splice(i, 1);
        }
      }
      // Let the win stand — result stays 'win'
    } else {
      // Suppress win: keep arena running so player can collect
      Arena.result = null;
    }
  }

  // Collect timer overlay (shown while counting down)
  if (!Arena.result && Arena._collectTimer > 0) {
    const sec = Math.ceil(Arena._collectTimer / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, Arena.arenaY, Arena.arenaW, 24);
    ctx.fillStyle = '#4eff91'; ctx.font = 'bold 13px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText(`✓ ПОБЕДА! Собери детали... ${sec}`, Arena.arenaW / 2, Arena.arenaY + 16);
    // Pulse ring on remaining pickups
    if (Arena.pickups) {
      Arena.pickups.forEach(p => {
        const pulse = Math.sin(Arena.frame * 0.2) * 4 + 12;
        ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(p.x, p.y, pulse, 0, Math.PI*2); ctx.stroke();
      });
    }
  }
};

// Reset collect timer when new arena starts
const _pause_origStartArena = window.startArena;
window.startArena = function() {
  Arena._collectTimer = 0;
  Arena._collectTimerDone = false;
  _pause_origStartArena();
};

// ═══════════════════════════════════════════════════════════
//  RANDOM PART STATS — each part gets ±15% stat variation
// ═══════════════════════════════════════════════════════════
const _origCreatePart = window.createPart;
window.createPart = function(type, rot) {
  const part = _origCreatePart(type, rot);
  if (!part) return part;
  const def = PART_DEFS[type];
  if (!def) return part;

  // Only roll stats for meaningful categories
  if (def.cat === 'chassis' || def.cat === 'armor') return part; // no interesting stats

  // Roll ±15% on key stats
  const roll = (range) => 1 + (Math.random() * 2 - 1) * range;
  const r = {};
  if (def.cat === 'weapon') {
    r.damage   = Math.round(roll(0.20) * 10) / 10; // ±20%
    r.fireRate = Math.round(roll(0.15) * 10) / 10; // ±15% (inverse: higher = slower)
    r.range    = Math.round(roll(0.10) * 10) / 10; // ±10%
  } else if (def.cat === 'movement') {
    r.speedMult = Math.round(roll(0.15) * 10) / 10; // ±15%
  } else if (def.cat === 'sensor') {
    r.sensorRange = Math.round(roll(0.15) * 10) / 10;
  } else if (def.cat === 'utility') {
    r.shieldHP = Math.round(roll(0.20) * 10) / 10;
  }
  part._roll = r;
  return part;
};

// Apply roll in startArena (after R.weapons etc are built)
const _roll_origStartArena = window.startArena;
window.startArena = function() {
  _roll_origStartArena();
  const R = Arena.robot;
  // Apply weapon rolls
  for (const w of R.weapons) {
    const placed = R.parts.find(p => p.id === w.partId);
    if (!placed || !placed._roll) continue;
    const r = placed._roll;
    w.def = { ...w.def };
    if (r.damage)   w.def.damage   = Math.round(w.def.damage * r.damage);
    if (r.fireRate) w.def.fireRate  = Math.round(w.def.fireRate * r.fireRate);
    if (r.range)    w.def.range     = Math.round(w.def.range * r.range);
  }
  // Apply movement roll
  for (const p of R.parts) {
    const def = PART_DEFS[p.type];
    if (!p._roll || def.cat !== 'movement') continue;
    R.speed *= (p._roll.speedMult || 1);
  }
};

// Show roll badge on loot cards (overlay after curse/bless layer)
const _roll_origUpdateLoot = window.updateLoot;
window.updateLoot = function() {
  _roll_origUpdateLoot();
  const cols = 4, pad = 12;
  const cardW = Math.floor((W - pad*2 - (cols-1)*10) / cols);
  const startX = pad;
  const startY = 72;
  const availH = H - startY - 80;
  const rows = Math.ceil(Loot.offered.length / cols);
  const cardH = Math.floor((availH - (rows-1)*10) / rows);

  Loot.offered.forEach((part, i) => {
    if (!part || !part._roll) return;
    const def = PART_DEFS[part.type];
    const col = i % cols, row = Math.floor(i / cols);
    const cx2 = startX + col*(cardW+10) + 8;
    const cy2 = startY + row*(cardH+10);

    const r = part._roll;
    const lines = [];
    if (r.damage)     { const pct = Math.round((r.damage-1)*100);     if (pct !== 0) lines.push(`урон ${pct>0?'+':''}${pct}%`); }
    if (r.fireRate)   { const pct = Math.round((r.fireRate-1)*100);   if (pct !== 0) lines.push(`скорость ${pct>0?'+':''}${pct}%`); }
    if (r.speedMult)  { const pct = Math.round((r.speedMult-1)*100);  if (pct !== 0) lines.push(`скорость ${pct>0?'+':''}${pct}%`); }
    if (r.sensorRange){ const pct = Math.round((r.sensorRange-1)*100);if (pct !== 0) lines.push(`обнаруж. ${pct>0?'+':''}${pct}%`); }

    // Draw stat lines at bottom-left, avoid overlapping right-side badges
    lines.forEach((line, li) => {
      const isGood = !line.includes('-');
      ctx.fillStyle = isGood ? '#44ff88' : '#ff6644';
      ctx.font = 'bold 9px "Courier New",monospace'; ctx.textAlign = 'left';
      ctx.fillText(line, cx2 + 4, cy2 + cardH - 8 - (lines.length - 1 - li) * 12);
    });
  });
};

console.log('[WRECK PROTOCOL] Post-round pause + random part stats loaded.');
</script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  SYNERGIES — passive bonuses for specific part combos
// ═══════════════════════════════════════════════════════════
const SYNERGIES = [
  {
    id: 'artillery', label: '⚔ АРТИЛЛЕРИЯ', color: '#ff6b35',
    desc: '3+ оружия → урон всех +25%',
    requires: p => p.filter(x => PART_DEFS[x.type].cat === 'weapon').length >= 3,
    apply: R => { R.weapons.forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 1.25)}; }); }
  },
  {
    id: 'bunker', label: '🛡 БУНКЕР', color: '#888888',
    desc: '2+ брони + гусеницы → урон -25%',
    requires: p => p.filter(x => x.type === 'armor_heavy' || x.type === 'armor_light').length >= 2 && p.some(x => x.type === 'tracks'),
    apply: R => { R._dmgReduction = (R._dmgReduction || 0) + 0.25; }

  {
    id: 'powerplant', label: '💠 СИЛОВОЙ ЩИТ', color: '#4488ff',
    desc: 'Батарея + щит-ген → щит +60, рег. ×2',
    requires: p => p.some(x => x.type === 'battery') && p.some(x => x.type === 'shield_gen'),

  },
  {
    id: 'speedster', label: '🚀 СТРЕМИТЕЛЬНЫЙ', color: '#ff6644',
    desc: 'Реактивы + лёгкая броня → скорость +35%',
    requires: p => p.some(x => x.type === 'jets') && p.some(x => x.type === 'armor_light'),
    apply: R => { R.speed *= 1.35; }
  },
  {
    id: 'autoaim', label: '⚡ АВТОПРИЦЕЛ', color: '#35c5ff',
    desc: 'Лазер + автосенсор → урон лазера +50%',
    requires: p => p.some(x => x.type === 'laser') && p.some(x => x.type === 'sensor_auto'),
    apply: R => { R.weapons.filter(w => w.def.isLaser).forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 1.5)}; }); }
  },
  {
    id: 'ironwall', label: '🔩 ЖЕЛЕЗНАЯ СТЕНА', color: '#cccccc',
    desc: '3+ брони → +100 к макс. ПЗ',
    requires: p => p.filter(x => PART_DEFS[x.type].cat === 'armor').length >= 3,
    apply: R => { R.maxHP += 100; R.hp += 100; }
  },
  {
    id: 'spider_web', label: '🕷 ПАУТИНА', color: '#cc44cc',
    desc: 'Паучьи ноги + 2+ оружия → огонь во все стороны',
    requires: p => p.some(x => x.type === 'legs') && p.filter(x => PART_DEFS[x.type].cat === 'weapon').length >= 2,
    apply: R => { R._omnifire = true; }
  },
  {
    id: 'overclocker', label: '⏱ РАЗГОН', color: '#cccc44',
    desc: 'Таймер + батарея → скорострельность ×1.4',
    requires: p => p.some(x => x.type === 'timer_fast') && p.some(x => x.type === 'battery'),
    apply: R => { R.weapons.forEach(w => { w.def = {...w.def, fireRate: Math.max(6, Math.round(w.def.fireRate / 1.4))}; }); }
  },
];

// Track active synergies on robot
function calcSynergies(placed) {
  return SYNERGIES.filter(s => s.requires(placed));
}

// Override startArena to apply synergies after stat calc
const _syn_origStartArena = window.startArena;
window.startArena = function() {
  _syn_origStartArena();
  const R = Arena.robot;
  const active = calcSynergies(Assembly.placed);
  R._activeSynergies = active.map(s => s.id);
  active.forEach(s => s.apply(R));
  if (active.length > 0) {
    console.log('[Synergies] Active:', active.map(s => s.label).join(', '));
  }
};

// Override damageRobot to apply damage reduction synergy
const _syn_origDamageRobot = window.damageRobot;
window.damageRobot = function(dmg) {
  const R = Arena.robot;
  const reduced = dmg * (1 - (R._dmgReduction || 0));
  _syn_origDamageRobot(reduced);
};

// ── Draw synergy panel in assembly screen (appended below grid)
const _syn_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _syn_origUpdateAssembly();
  if (window.curState !== STATE.ASSEMBLY) return;

  const active = calcSynergies(Assembly.placed);
  const inactive = SYNERGIES.filter(s => !s.requires(Assembly.placed));

  // Synergy panel: right side below palette stats
  const sx = 60 + GRID_COLS * GRID_SIZE + 16;
  const sw = W - sx - 8;
  // Find bottom of palette (approximate)
  const sy = H - 160;

  ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = '#336633';
  ctx.fillText('— СИНЕРГИИ —', sx + 4, sy + 12);

  let row = 0;
  // Active synergies first
  for (const s of active) {
    const ry = sy + 20 + row * 24;
    fillRect(sx + 2, ry, sw - 4, 20, '#0a1a0a');
    strokeRect(sx + 2, ry, sw - 4, 20, s.color, 1);
    ctx.fillStyle = s.color;
    ctx.font = 'bold 9px "Courier New",monospace';
    ctx.fillText('✓ ' + s.label, sx + 6, ry + 13);
    row++;
  }
  // Show 2 nearest inactive as hints
  const hints = inactive.slice(0, 2);
  for (const s of hints) {
    const ry = sy + 20 + row * 24;
    fillRect(sx + 2, ry, sw - 4, 20, '#080808');
    strokeRect(sx + 2, ry, sw - 4, 20, '#1a2a1a', 1);
    ctx.fillStyle = '#2a3a2a';
    ctx.font = '9px "Courier New",monospace';
    ctx.fillText('○ ' + s.desc, sx + 6, ry + 13);
    row++;
  }
};

// Omnifire: if synergy active, weapons fire in all 4 directions
const _syn_origFireWeapon = window.fireWeapon;
window.fireWeapon = function(wi, R) {
  if (!R._omnifire) { _syn_origFireWeapon(wi, R); return; }
  // Fire in 4 cardinal directions
  const origAngle = R.angle;
  for (let d = 0; d < 4; d++) {
    R.angle = origAngle + d * Math.PI / 2;
    _syn_origFireWeapon(wi, R);
  }
  R.angle = origAngle;
};

console.log('[WRECK PROTOCOL] Synergy system loaded. Synergies:', SYNERGIES.length);
</script>

<!-- PART 7b: META-PROGRESSION + RECORDS -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  META-PROGRESSION — saved across runs in localStorage
// ═══════════════════════════════════════════════════════════
const META_KEY = 'wreck_meta_v1';

function metaLoad() {
  try {
    const raw = localStorage.getItem(META_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { runs: 0, wins: 0, bestRound: 0, bestSynergies: 0, history: [] };
}

function metaSave(data) {
  try { localStorage.setItem(META_KEY, JSON.stringify(data)); } catch(e) {}
}

function metaReset() {
  metaSave({ runs: 0, wins: 0, bestRound: 0, bestSynergies: 0, history: [] });
}

// Called at end of each run
function metaRecordRun(win) {
  const data = metaLoad();
  const round = Game.round - 1;
  const synCount = (Arena.robot._activeSynergies || []).length;
  data.runs++;
  if (win) data.wins++;
  if (round > data.bestRound) data.bestRound = round;
  if (synCount > data.bestSynergies) data.bestSynergies = synCount;
  data.history.unshift({ win, round, class: Game._startClass || '?', synCount });
  if (data.history.length > 10) data.history.length = 10; // keep last 10
  metaSave(data);
  return data;
}

// Bonus starting scrap: +5 per win, max +25
function metaBonusScrap() {
  const data = metaLoad();
  return Math.min(data.wins * 5, 25);
}

// ── Override setState to record run on game end
const _meta_origSetState = window.setState;
window.setState = function(s) {
  if (s === STATE.GAMEOVER) metaRecordRun(false);
  if (s === STATE.WIN)      metaRecordRun(true);
  _meta_origSetState(s);
};

// ── Apply bonus scrap at game start (hook into startGameWithClass)
const _meta_origStartGame = window.startGameWithClass;
window.startGameWithClass = function(cls) {
  _meta_origStartGame(cls);
  const bonus = metaBonusScrap();
  if (bonus > 0) {
    Game.scrap += bonus;
    Game._startClass = cls ? cls.id : 'none';
  }
};

// ── Patch menu to show records
const _meta_origUpdateMenu = window.updateMenu;
window.updateMenu = function() {
  _meta_origUpdateMenu();

  const data = metaLoad();
  if (data.runs === 0) return; // first run, nothing to show

  const px = 20, py = H - 130, pw = 220;

  ctx.fillStyle = C.textDim; ctx.font = '11px "Courier New",monospace';
  ctx.fillText(`Забегов: ${data.runs}`, px+8, py+30);
  ctx.fillText(`Побед: ${data.wins}`, px+8, py+44);

  ctx.fillText(`Макс. синергий: ${data.bestSynergies}`, px+8, py+72);

  const bonus = metaBonusScrap();
  if (bonus > 0) {
    ctx.fillStyle = '#4eff91';
    ctx.fillText(`+ ${bonus} лома (бонус за победы)`, px+8, py+88);
  }

<!-- PART 7c: CURSED & BLESSED PARTS -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CURSED PARTS — loot items with risk/reward tradeoffs
// ═══════════════════════════════════════════════════════════
const CURSE_POOL = [
  { id:'c_slow',    badge:'⚠ МЕДЛИТ',   desc:'Скорость -20%', penalty: R => { R.speed *= 0.8; } },
  { id:'c_fragile', badge:'⚠ ХРУПКАЯ',  desc:'ПЗ -30',        penalty: R => { R.maxHP = Math.max(10, R.maxHP - 30); R.hp = Math.min(R.hp, R.maxHP); } },
  { id:'c_hungry',  badge:'⚠ ПРОЖОРЛИВАЯ', desc:'Урон -15%',  penalty: R => { R.weapons.forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 0.85)}; }); } },
  { id:'c_unstable',badge:'⚠ НЕСТАБИЛЬНАЯ', desc:'Огонь -25% скорости', penalty: R => { R.weapons.forEach(w => { w.def = {...w.def, fireRate: Math.round(w.def.fireRate * 1.25)}; }); } },
  { id:'c_heavy',   badge:'⚠ ТЯЖЁЛАЯ',  desc:'Масса +4кг',    penalty: R => { R.mass = (R.mass||0)+4; const pen=Math.max(0.3,1-(R.mass-4)*0.025); R.speed=Math.max(0.5,R.speed*0.88); } },
];

const BLESS_POOL = [
  { id:'b_sharp',   badge:'★ ОСТРАЯ',   desc:'Урон +20%',      bonus: R => { R.weapons.forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 1.2)}; }); } },
  { id:'b_swift',   badge:'★ БЫСТРАЯ',  desc:'Скорость +20%',  bonus: R => { R.speed *= 1.2; } },
  { id:'b_tough',   badge:'★ ПРОЧНАЯ',  desc:'ПЗ +40',         bonus: R => { R.maxHP += 40; R.hp += 40; } },
  { id:'b_regen',   badge:'★ ЖИВАЯ',    desc:'+0.1 ПЗ/кадр роботу в бою (≈6/сек)',   bonus: R => { R._regenRate = (R._regenRate||0) + 0.1; } },
];

// ── Inject curse/bless into loot (override prepLoot)
const _curse_origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  _curse_origPrepLoot();
  // From round 2 onwards, add curses/blessings
  if (Game.round < 2) return;
  Loot.offered.forEach(part => {
    if (!part || part.type === 'chassis') return;
    const roll = Math.random();
    if (roll < 0.25) {
      // Cursed: random penalty
      part._curse = CURSE_POOL[Math.floor(Math.random() * CURSE_POOL.length)];
    } else if (roll < 0.38) {
      // Blessed: random bonus
      part._bless = BLESS_POOL[Math.floor(Math.random() * BLESS_POOL.length)];
    } else if (roll < 0.45) {
      // Cursed AND blessed (high risk high reward)
      part._curse = CURSE_POOL[Math.floor(Math.random() * CURSE_POOL.length)];
      part._bless = BLESS_POOL[Math.floor(Math.random() * BLESS_POOL.length)];
    }
  });
};

// ── Apply curses/blessings from placed parts in startArena
const _curse_origStartArena = window.startArena;
window.startArena = function() {
  _curse_origStartArena();
  const R = Arena.robot;
  // Assembly.placed contains the actual part objects with _curse/_bless set during loot.
  // NOTE: initAssembly uses JSON.parse(JSON.stringify(...)) to preserve parts between rounds,
  // which strips functions. We look up penalty/bonus from CURSE_POOL/BLESS_POOL by id as fallback.
  for (const p of Assembly.placed) {
    if (p._curse) {
      const c = (typeof p._curse.penalty === 'function')
        ? p._curse
        : CURSE_POOL.find(x => x.id === p._curse.id);
      if (c && c.penalty) c.penalty(R);
    }
    if (p._bless) {
      const b = (typeof p._bless.bonus === 'function')
        ? p._bless
        : BLESS_POOL.find(x => x.id === p._bless.id);
      if (b && b.bonus) b.bonus(R);
    }
  }
};

// ── Draw curse/bless badges on loot cards (overlay after original render)
const _curse_origUpdateLoot = window.updateLoot;
window.updateLoot = function() {
  _curse_origUpdateLoot();
  // Re-draw badges on top of each card — match updateLoot layout
  const cols = 4, pad = 12;
  const cardW = Math.floor((W - pad*2 - (cols-1)*10) / cols);
  const startX = pad;
  const startY = 72;
  const availH = H - startY - 80;
  const rows = Math.ceil(Loot.offered.length / cols);
  const cardH = Math.floor((availH - (rows-1)*10) / rows);
  Loot.offered.forEach((part, i) => {
    if (!part) return;
    const col = i % cols, row = Math.floor(i / cols);
    const cx2 = startX + col*(cardW+10);
    const cy2 = startY + row*(cardH+10);

    // All badges on the right side; stack from top
    let badgeOffY = 0;
    if (part._curse) {
      // Red curse badge — top right
      fillRect(cx2+cardW-104, cy2 + badgeOffY, 104, 20, '#2a0808');
      ctx.fillStyle = '#ff4444'; ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'right';
      ctx.fillText(part._curse.badge, cx2+cardW-4, cy2 + badgeOffY + 14);
      badgeOffY += 22;
      // Penalty desc line below badge
      fillRect(cx2+cardW-104, cy2 + badgeOffY, 104, 16, '#1a0000');
      ctx.fillStyle = '#cc2222'; ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'right';
      ctx.fillText('↓ ' + part._curse.desc, cx2+cardW-4, cy2 + badgeOffY + 11);
      badgeOffY += 18;
    }
    if (part._bless) {
      // Gold bless badge — right, below curse if present
      fillRect(cx2+cardW-104, cy2 + badgeOffY, 104, 20, '#1a1a00');
      ctx.fillStyle = '#ffdd44'; ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'right';
      ctx.fillText(part._bless.badge, cx2+cardW-4, cy2 + badgeOffY + 14);
      badgeOffY += 22;
      // Bonus desc line below badge
      fillRect(cx2+cardW-104, cy2 + badgeOffY, 104, 16, '#0d0d00');
      ctx.fillStyle = '#aaaa00'; ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'right';
      ctx.fillText('↑ ' + part._bless.desc, cx2+cardW-4, cy2 + badgeOffY + 11);
    }
  });
};

// Note: curse/bless is stored directly on the part object,
// so it survives Game.inventory → Assembly.placed transfer automatically.

</script>

<!-- PART 8e: PART UPGRADES + UNIQUE PROPERTY DISPLAY -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  PART UPGRADES — merge 2 same-type parts for a stronger one
// ═══════════════════════════════════════════════════════════
// Returns upgradeable pairs: { placed, invIdx, fromPlaced(bool), sacId(if fromPlaced) }
function findUpgradeable() {
  const result = [];
  for (const p of Assembly.placed) {
    if (p.type === 'chassis') continue;
    // Option 1: duplicate in inventory
    const dupIdx = (Game.inventory || []).findIndex(inv => inv && inv.type === p.type);
    if (dupIdx >= 0) result.push({ placed: p, invIdx: dupIdx, fromPlaced: false });
    else {
      // Option 2: another copy placed on grid (pick first duplicate found)
      const dupPlaced = Assembly.placed.find(other => other.id !== p.id && other.type === p.type && other.type !== 'chassis');
      if (dupPlaced && !result.some(r => r.sacId === dupPlaced.id || r.placed.id === dupPlaced.id)) {
        result.push({ placed: p, invIdx: -1, fromPlaced: true, sacId: dupPlaced.id });
      }
    }
  }
  return result;
}

function upgradePart(placed, invIdx, fromPlaced=false, sacId=null) {
  const cost = fromPlaced ? 5 : 10; // cheaper if using placed duplicate
  if (Game.scrap < cost) return false;
  Game.scrap -= cost;

  let sacRoll = null, sacLevel = 1;
  if (!fromPlaced) {
    const sacPart = Game.inventory[invIdx];
    if (sacPart) { sacRoll = sacPart._roll ? {...sacPart._roll} : null; sacLevel = sacPart._level || 1; }
    Game.inventory.splice(invIdx, 1);
  } else {
    // Remove the sacrificed placed part; inherit its accumulated stats
    const sacIdx = Assembly.placed.findIndex(p => p.id === sacId);
    if (sacIdx >= 0) {
      const sacPart = Assembly.placed[sacIdx];
      sacRoll = sacPart._roll ? {...sacPart._roll} : null;
      sacLevel = sacPart._level || 1;
      Assembly.placed.splice(sacIdx, 1);
    }
  }
  // Level = sum of both parts' levels (level 2 + level 3 = level 5)
  placed._level = (placed._level || 1) + sacLevel;
  placed._roll = placed._roll || {};
  const def = PART_DEFS[placed.type];
  // Slightly smaller new-upgrade effect when merging placed+placed
  const mult = fromPlaced ? 0.85 : 1.0;
  if (def.cat === 'weapon') {
    placed._roll.damage   = (placed._roll.damage   || 1) * (1 + 0.20*mult);
    placed._roll.fireRate = (placed._roll.fireRate  || 1) * (1 - 0.10*mult);
    placed._roll.range    = (placed._roll.range     || 1) * (1 + 0.08*mult);
  } else if (def.cat === 'movement') {
    placed._roll.speedMult = (placed._roll.speedMult || 1) * (1 + 0.15*mult);
  } else if (def.cat === 'utility') {
    placed._roll.shieldHP  = (placed._roll.shieldHP  || 1) * (1 + 0.20*mult);
  } else if (def.cat === 'sensor') {
    placed._roll.sensorRange = (placed._roll.sensorRange || 1) * (1 + 0.15*mult);
    placed._roll.triggerRate = (placed._roll.triggerRate || 1) * (1 - 0.12*mult);
  } else if (def.cat === 'armor') {
    placed.hp = Math.min(def.maxHP, placed.hp + Math.floor(def.maxHP * 0.30 * mult));
  }
  if (!fromPlaced) placed.hp = def.maxHP; // full restore only from inventory upgrade

  // Inherit accumulated _roll stats from the sacrificed part (70% efficiency)
  if (sacRoll) {
    const eff = 0.70;
    const r = placed._roll;
    if (sacRoll.damage    && sacRoll.damage    !== 1) r.damage    = (r.damage    || 1) * (1 + (sacRoll.damage    - 1) * eff);
    if (sacRoll.fireRate  && sacRoll.fireRate  !== 1) r.fireRate  = (r.fireRate  || 1) * (1 + (sacRoll.fireRate  - 1) * eff);
    if (sacRoll.range     && sacRoll.range     !== 1) r.range     = (r.range     || 1) * (1 + (sacRoll.range     - 1) * eff);
    if (sacRoll.speedMult && sacRoll.speedMult !== 1) r.speedMult = (r.speedMult || 1) * (1 + (sacRoll.speedMult - 1) * eff);
    if (sacRoll.shieldHP  && sacRoll.shieldHP  !== 1) r.shieldHP  = (r.shieldHP  || 1) * (1 + (sacRoll.shieldHP  - 1) * eff);
    if (sacRoll.sensorRange && sacRoll.sensorRange !== 1) r.sensorRange = (r.sensorRange || 1) * (1 + (sacRoll.sensorRange - 1) * eff);
    if (sacRoll.triggerRate && sacRoll.triggerRate !== 1) r.triggerRate = (r.triggerRate || 1) * (1 + (sacRoll.triggerRate - 1) * eff);
    if (sacRoll.pierce)  r.pierce  = true;
    if (sacRoll.burst)   r.burst   = sacRoll.burst;
    if (sacRoll.regen)   r.regen   = true;
    if (sacRoll.reactive) r.reactive = true;
  }

  recalcStats();
  return true;
}

// ── Show upgrade hint panel in assembly screen (click handling moved to Part 9)
const _upg_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _upg_origUpdateAssembly();

  const upgradeable = findUpgradeable();
  if (upgradeable.length === 0) return;
  if (typeof _upgConfirm !== 'undefined' && _upgConfirm) return; // Part 9 handles this

  // Hint panel above DONE button
  const gx = Assembly.gridOriginX;
  const bw = GRID_COLS * GRID_SIZE;
  const by2 = H - 82;
  const fromPlacedCount = upgradeable.filter(u => u.fromPlaced).length;
  const fromInvCount = upgradeable.filter(u => !u.fromPlaced).length;

  fillRect(gx, by2, bw, 32, '#0a0f0a');
  strokeRect(gx, by2, bw, 32, '#2a5a2a', 1);
  ctx.fillStyle = '#4eff91'; ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillText(`⇧ СЛИЯНИЕ: ${fromInvCount > 0 ? fromInvCount + ' из инвентаря (-10 лома)' : ''}${fromInvCount && fromPlacedCount ? '  ·  ' : ''}${fromPlacedCount > 0 ? fromPlacedCount + ' внутри поля (-5 лома)' : ''}`, gx+8, by2+13);
  ctx.fillStyle = '#336633'; ctx.font = '9px "Courier New",monospace';
  ctx.fillText('Кликни на деталь на поле для апгрейда', gx+8, by2+25);
};

// ── Show level badge on placed parts in grid
const _upg_origDrawPart = window.drawPart;
if (typeof drawPart !== 'undefined') {
  window.drawPart = function(part, sx, sy, pw, ph, alpha) {

// ═══════════════════════════════════════════════════════════

// State for upgrade confirmation overlay
let _upgConfirm = null; // { placed, invIdx, quirk, previewLines }

function _rollUpgradeQuirk(def) {
  const pool = UPGRADE_QUIRKS[def.cat] || [];
  if (!pool.length || Math.random() > 0.65) return null; // 65% chance of quirk
  return pool[Math.floor(Math.random() * pool.length)];
}

function _upgradePreviewLines(placed, invPart, quirk, fromPlaced=false) {
  const def = PART_DEFS[placed.type];
  const roll = placed._roll || {};
  const lines = [];
  const mult = fromPlaced ? 0.85 : 1.0;
  if (def.cat === 'weapon') {
    const dmgBoost = Math.round(0.20 * mult * 100);
    lines.push({ text: `Урон: +${dmgBoost}%`, color: '#44ff88' });
    const frBoost = Math.round(0.10 * mult * 100);
    lines.push({ text: `Скорострельность: +${frBoost}%`, color: '#44ff88' });
  } else if (def.cat === 'movement') {
    const sBoost = Math.round(0.15 * mult * 100);
    lines.push({ text: `Скорость: +${sBoost}%`, color: '#44ff88' });
  } else if (def.cat === 'utility') {
    const shBoost = Math.round(0.20 * mult * 100);
    lines.push({ text: `Щит: +${shBoost}%`, color: '#44ff88' });
  } else if (def.cat === 'sensor') {
    if (def.timerRate) {
      // Timer parts: boost frequency (fire rate), not range
      const trBoost = Math.round(0.25 * mult * 100);
      lines.push({ text: `Частота срабатывания: +${trBoost}%`, color: '#44ff88' });
    } else {
      const srBoost = Math.round(0.15 * mult * 100);
      lines.push({ text: `Дальность сенсора: +${srBoost}%`, color: '#44ff88' });
    }
  } else if (def.cat === 'armor') {
    const hpBoost = Math.round(def.maxHP * 0.30 * mult);
    lines.push({ text: `ПЗ детали: +${hpBoost}`, color: '#44ff88' });
  }
  if (!fromPlaced) {
    lines.push({ text: 'ПЗ: полное восстановление', color: '#44ff88' });
  } else {
    lines.push({ text: '(слияние из поля: ПЗ не восстанавливается)', color: '#888888' });
  }
  return lines;
}

// Override the upgrade panel in assembly to show confirmation dialog
const _p9_origUpgAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _p9_origUpgAssembly();

  // Draw confirmation overlay if active
  if (_upgConfirm) {
    const { placed, invIdx, quirk, previewLines, fromPlaced, sacId } = _upgConfirm;
    const def = PART_DEFS[placed.type];
    const upgCost = fromPlaced ? 5 : 10;
    const ox = W/2 - 220, oy = H/2 - 170, ow = 440, oh = 340;
    fillRect(ox, oy, ow, oh, '#050f05');
    strokeRect(ox, oy, ow, oh, '#4eff91', 2);

    ctx.fillStyle = '#4eff91'; ctx.font = 'bold 14px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText(`⇧ СЛИЯНИЕ: ${def.label}`, W/2, oy + 24);
    ctx.fillStyle = '#888'; ctx.font = '11px "Courier New",monospace';
    const srcLabel = fromPlaced ? 'Источник: дублирующая деталь на поле' : 'Источник: деталь из инвентаря';
    ctx.fillText(`${srcLabel}  ·  Стоимость: ${upgCost} лома`, W/2, oy + 42);

    // Divider
    ctx.strokeStyle = '#1a3a1a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ox+10, oy+50); ctx.lineTo(ox+ow-10, oy+50); ctx.stroke();

    // Preview lines
    previewLines.forEach((ln, i) => {
      ctx.fillStyle = ln.color; ctx.font = '12px "Courier New",monospace'; ctx.textAlign = 'left';
      ctx.fillText(ln.text, ox + 20, oy + 68 + i * 20);
    });

    // Quirk box (detailed)
    if (quirk) {
      const qy = oy + 68 + previewLines.length * 20 + 8;
      fillRect(ox + 10, qy, ow - 20, 52, quirk.good ? '#0a1f0a' : '#1f0a0a');
      strokeRect(ox + 10, qy, ow - 20, 52, quirk.color, 1);
      ctx.fillStyle = quirk.color; ctx.font = 'bold 12px "Courier New",monospace'; ctx.textAlign = 'left';
      ctx.fillText(`КВИРК: ${quirk.label}`, ox + 18, qy + 16);

      ctx.fillStyle = quirk.good ? '#44ff88' : '#ff6644';
      ctx.font = '10px "Courier New",monospace'; ctx.textAlign = 'right';
      ctx.fillText(quirk.good ? '✓ положительный' : '✗ отрицательный', ox + ow - 18, qy + 48);
    }

    const canAfford = Game.scrap >= upgCost;
    const confirmBx = ox + 20, confirmBy = oy + oh - 50;
    const cancelBx  = ox + ow/2 + 10, cancelBy = oy + oh - 50;
    const btnW = ow/2 - 30, btnH = 34;

    const hovC = isHover(confirmBx, confirmBy, btnW, btnH);
    fillRect(confirmBx, confirmBy, btnW, btnH, canAfford && hovC ? '#0f3a0f' : '#0a0f0a');
    strokeRect(confirmBx, confirmBy, btnW, btnH, canAfford ? '#4eff91' : '#333', 1);
    ctx.fillStyle = canAfford ? '#4eff91' : '#336633';
    ctx.font = 'bold 12px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText(canAfford ? `[ УЛУЧШИТЬ (-${upgCost} лома) ]` : `[ НЕТ ЛОМА (нужно ${upgCost}) ]`, confirmBx + btnW/2, confirmBy + 22);

    const hovX = isHover(cancelBx, cancelBy, btnW, btnH);
    fillRect(cancelBx, cancelBy, btnW, btnH, hovX ? '#1a0a0a' : '#0a0a0a');
    strokeRect(cancelBx, cancelBy, btnW, btnH, '#663333', 1);
    ctx.fillStyle = '#cc4444'; ctx.font = 'bold 12px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText('[ ОТМЕНА ]', cancelBx + btnW/2, cancelBy + 22);

    if (Mouse.clicked) {
      if (isHover(confirmBx, confirmBy, btnW, btnH) && canAfford) {
        // Apply upgrade via updated upgradePart function
        upgradePart(placed, invIdx, fromPlaced, sacId);
        if (quirk) quirk.apply(placed);
        delete placed._pendingQuirk; // unlock quirk after confirmed upgrade
        spawnParticles(
          Assembly.gridOriginX + (placed.gx + partW(placed)/2) * GRID_SIZE,
          Assembly.gridOriginY + (placed.gy + partH(placed)/2) * GRID_SIZE,
          quirk && !quirk.good ? '#ff6644' : '#4eff91', 16, 4, 40
        );
        _upgConfirm = null;
      } else if (isHover(cancelBx, cancelBy, btnW, btnH)) {
        // Note: _pendingQuirk stays on placed — same quirk shows if clicked again
        // To get different quirk, player must confirm the upgrade (no exploit possible)
        _upgConfirm = null;

    if (Keys['Escape_pressed']) { _upgConfirm = null; Keys['Escape_pressed'] = false; }

  // Override upgrade click from previous panel: open confirm instead
  const upgradeable = (typeof findUpgradeable === 'function') ? findUpgradeable() : [];
  if (upgradeable.length > 0 && Mouse.clicked && !_upgConfirm) {

    const gox = Assembly.gridOriginX, goy = Assembly.gridOriginY;
    const gcx = Math.floor((mx - gox) / GRID_SIZE);
    const gcy = Math.floor((my - goy) / GRID_SIZE);
    for (const upg of upgradeable) {
      const { placed, invIdx, fromPlaced, sacId } = upg;
      if (gcx >= placed.gx && gcx < placed.gx + partW(placed) &&
          gcy >= placed.gy && gcy < placed.gy + partH(placed)) {

        if (!placed._pendingQuirk) placed._pendingQuirk = _rollUpgradeQuirk(PART_DEFS[placed.type]);

        _upgConfirm = { placed, invIdx, quirk, fromPlaced: !!fromPlaced, sacId: sacId||null,
          previewLines: _upgradePreviewLines(placed, invPart, quirk, !!fromPlaced) };

};

// ═══════════════════════════════════════════════════════════
//  TASK 3: WIRE CONNECTION HINTS
//  Highlight compatible ports; tooltip on port hover
// ═══════════════════════════════════════════════════════════

// Compatible pairs: sensor OUT → weapon IN, chassis OUT → anything IN
const WIRE_COMPAT = {
  sensor:  ['weapon', 'utility'],
  chassis: ['weapon', 'movement', 'sensor', 'utility', 'armor'],
};

const _p9_origUpdateAssemblyWH = window.updateAssembly;
window.updateAssembly = function() {
  _p9_origUpdateAssemblyWH();

  // If wiring active, highlight compatible target ports and show hint
  if (!Assembly.wiringFrom) return;
  const fromPart = Assembly.placed.find(p => p.id === Assembly.wiringFrom.partId);
  if (!fromPart) return;
  const fromPortType = Assembly.wiringFrom.type; // 'OUT' or 'IN'
  const fromCat = PART_DEFS[fromPart.type].cat;
  const compatCats = (fromPortType === 'OUT') ? (WIRE_COMPAT[fromCat] || []) : ['chassis','sensor'];

  Assembly.placed.forEach(part => {
    if (part.id === fromPart.id) return;
    const portsList = getRotatedPorts(part);
    portsList.forEach((port, pi) => {
      // Target must be the opposite type
      if (port.type === fromPortType) return;
      const targetCat = PART_DEFS[part.type].cat;
      const compatible = fromPortType === 'OUT'
        ? compatCats.includes(targetCat)
        : compatCats.includes(fromCat);
      const pp = portScreenPos(part, pi);
      if (!pp) return;

      ctx.save();
      if (compatible) {
        // Pulse ring on compatible port
        const pulse = 5 + Math.sin((Assembly._tipTimer || 0) * 0.15) * 3;
        ctx.strokeStyle = '#44ff88';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, pulse + 4, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#44ff88';
        ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, pulse + 4, 0, Math.PI*2); ctx.fill();
      } else {
        // Dim incompatible ports
        ctx.fillStyle = '#330000';
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 6, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
  });

  // Show port type label near cursor
  const tip = document.getElementById('tooltip');
  if (tip) {
    const fromCatLabel = PART_DEFS[fromPart.type].label;
    tip.style.display = 'block';
    tip.style.left = (Mouse.cx + 14) + 'px';
    tip.style.top  = (Mouse.cy - 12) + 'px';
    const hints = compatCats.length > 0
      ? `<span style="color:#44ff88">→ подходит: ${compatCats.join(', ')}</span>`
      : '<span style="color:#ff4444">нет совместимых портов</span>';
    tip.innerHTML = `<b style="color:#ffff88">Провод от: ${fromCatLabel}</b><br>${hints}`;
  }
};

// ═══════════════════════════════════════════════════════════
//  TASK 8: FONT SETTINGS BUTTON IN ALL GAME STATES
// ═══════════════════════════════════════════════════════════

// Override the game loop to draw a persistent font button
const _p9_origLoop = window.loop || null;
// Instead of patching loop, patch all update* functions with a post-render hook
function _p9_drawFontBtn() {
  if (typeof _showFontSettings === 'undefined') return;
  if (_showFontSettings) { drawFontSettings(); return; }
  const bx = W - 88, by = H - 30;
  const hov = isHover(bx, by, 80, 22);
  ctx.save();
  ctx.globalAlpha = 0.7;
  fillRect(bx, by, 80, 22, '#050f05');
  strokeRect(bx, by, 80, 22, hov ? '#2a4a2a' : '#0f1f0f', 1);
  ctx.fillStyle = hov ? '#7aaa7a' : '#2a4a2a';
  ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.fillText('⚙ ШРИФТ', bx + 40, by + 14);
  ctx.restore();
  if (isClick(bx, by, 80, 22)) _showFontSettings = true;
}

// Inject font button into all game states except MENU (already has it)
['updateAssembly','updateArena','updateLoot','updateMutation','updateEncounter','updateClassSelect'].forEach(fnName => {
  const orig = window[fnName];
  if (!orig) return;
  window[fnName] = function() {
    orig.apply(this, arguments);
    _p9_drawFontBtn();
  };
});

// Also inject into drawEndScreen (win/gameover)
const _p9_origDrawEnd = window.drawEndScreen;
if (_p9_origDrawEnd) {
  window.drawEndScreen = function(win) {
    _p9_origDrawEnd(win);
    _p9_drawFontBtn();
  };
}

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  TASK 9: ASSEMBLY BALANCE BAR
//  Show mass / energy / HP / scrap prominently above grid
// ═══════════════════════════════════════════════════════════
const _p10_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _p10_origUpdateAssembly();

  const gx = Assembly.gridOriginX;
  const gw = GRID_COLS * GRID_SIZE;
  const gy = Assembly.gridOriginY;

  // Total HP of all placed parts
  const totalHP = Assembly.placed.reduce((s, p) => s + Math.ceil(p.hp), 0);
  const totalHPMax = Assembly.placed.reduce((s, p) => s + PART_DEFS[p.type].maxHP, 0);

  // Draw balance bar ABOVE the grid
  const barY = gy - 24;
  const barH = 20;
  fillRect(gx, barY, gw, barH, '#050f05');
  strokeRect(gx, barY, gw, barH, '#1a3a1a', 1);

  const energyOver = Assembly.usedEnergy > Assembly.totalEnergy;
  const massHeavy = Assembly.totalMass > 20;

  ctx.font = 'bold 11px "Courier New",monospace'; ctx.textAlign = 'left';
  const gap = Math.floor(gw / 4);

  ctx.fillStyle = massHeavy ? C.warn : '#88cc88';
  ctx.fillText(`⚖ ${Assembly.totalMass}кг${massHeavy?' ⚠':''}`, gx+6, barY+14);

  ctx.fillStyle = energyOver ? C.danger : '#88cc88';
  ctx.fillText(`⚡ ${Assembly.usedEnergy}/${Assembly.totalEnergy}Э${energyOver?' ⚠':''}`, gx+gap+6, barY+14);

  const hpColor = totalHP < totalHPMax * 0.4 ? C.danger : totalHP < totalHPMax * 0.7 ? C.warn : '#44ff88';
  ctx.fillStyle = hpColor;
  ctx.fillText(`❤ ${totalHP}/${totalHPMax}ПЗ`, gx+gap*2+6, barY+14);

  ctx.fillStyle = C.warn;
  ctx.fillText(`💰 ${Game.scrap} лома`, gx+gap*3+6, barY+14);
};

// ═══════════════════════════════════════════════════════════
//  TASK 7: MINOR REPAIR — any inventory part → small repair
//  Right-click on inventory item while hovering a placed part

          );

// ═══════════════════════════════════════════════════════════
//  TASK 8 FIX: PART DEATH IN COMBAT
//  When a part reaches 0 HP during arena, it is destroyed
//  and removed from the robot (effects disabled)
// ═══════════════════════════════════════════════════════════
const _p10_origDamageRobot = window.damageRobot;
window.damageRobot = function(dmg) {
  _p10_origDamageRobot(dmg);
  const R = Arena.robot;
  if (!R.parts) return;

  // Check for destroyed parts
  let anyDestroyed = false;
  for (let i = R.parts.length - 1; i >= 0; i--) {
    const p = R.parts[i];
    if (p.hp > 0) continue;
    const def = PART_DEFS[p.type];

    if (p.type === 'chassis') {
      // Chassis destroyed = instant game over
      Arena.result = 'lose';
      return;
    }

    // Remove weapon if this was a weapon
    const wIdx = R.weapons.findIndex(w => w.partId === p.id);
    if (wIdx >= 0) R.weapons.splice(wIdx, 1);

    // Remove sensor
    const sIdx = R.sensors.findIndex(s => s.partId === p.id);
    if (sIdx >= 0) R.sensors.splice(sIdx, 1);

    // Remove part
    R.parts.splice(i, 1);
    anyDestroyed = true;

    // Visual feedback
    if (def) {
      const partScreenX = R.x + (Math.random()-0.5)*R.radius;
      const partScreenY = R.y + (Math.random()-0.5)*R.radius;
      spawnParticles(partScreenX, partScreenY, def.border || '#ff4444', 14, 4, 40);
      triggerFlash('#ff8800', 10);
    }
  }

  // Recalculate robot radius if parts changed
  if (anyDestroyed) {
    R.radius = Math.max(14, 14 + Math.sqrt(R.parts.length) * 5);
    updateHUD();
  }
};

// ═══════════════════════════════════════════════════════════
//  TASK 10: ENEMY SCALING BY ROBOT POWER
//  Enemies get stronger based on the robot's total power score
// ═══════════════════════════════════════════════════════════
function calcRobotPowerScore() {
  const placed = Assembly.placed;
  if (!placed || placed.length === 0) return 1;

  let score = 0;
  for (const p of placed) {
    const def = PART_DEFS[p.type];
    // Weapons contribute by damage
    if (def.cat === 'weapon') score += (def.damage || 10) * 0.5;
    // HP contributes directly
    score += (def.maxHP || 10) * 0.05;
    // Movement adds some
    if (def.cat === 'movement') score += 10;
    // Upgrades boost score
    if (p._level) score += (p._level - 1) * 15;
  }
  // Normalize: base robot (chassis + gun + wheel) scores ~30
  return Math.max(1, score / 30);
}

const _p10_origSpawnEnemies = window.spawnEnemiesForRound;
window.spawnEnemiesForRound = function(round) {
  const enemies = _p10_origSpawnEnemies(round);
  const robotPower = calcRobotPowerScore();
  // Blend: 70% round-based, 30% power-based — prevents runaway scaling
  const powerBonus = Math.max(0, (robotPower - 1) * 0.3);
  const roundScale = 1 + (round - 1) * 0.18;
  const finalScale = roundScale + powerBonus;

  for (const e of enemies) {
    if (!e._scaledByPower) {
      // Apply extra power scaling (round scaling already applied in original spawn)
      const extraMult = finalScale / roundScale; // just the power bonus part
      e.hp    = Math.ceil(e.hp * extraMult);
      e.maxHP = e.hp;
      e.damage = Math.ceil(e.damage * Math.sqrt(extraMult)); // damage scales slower
      e._scaledByPower = true;
    }
  }
  return enemies;
};

  let _currentEnemyShieldBust = false;
  window.spawnBullet = function(x, y, angle, def, friendly) {
    _origSB(x, y, angle, def, friendly);
    if (_currentEnemyShieldBust && !friendly) {
      const arr = Arena.enemyBullets;
      if (arr && arr.length > 0) arr[arr.length-1]._shieldBust = true;
    }
  };
  // Помечаем electro_bot как активный перед стрельбой
  const oldEnemies = Arena.enemies;
  if (oldEnemies) {
    for (const e of oldEnemies) {
      if (e._shieldBuster) e._preShieldBust = true;
    }
  }
  _currentEnemyShieldBust = false;
  _p11c_origUpdateEnemies2();
  window.spawnBullet = _origSB;
};

// Применяем _shieldBust в updateBullets через патч damageRobot
const _p11c_origUpdateBullets2 = window.updateBullets;
window.updateBullets = function() {
  // Перехватываем damageRobot чтобы передать opts
  const _origDR = window.damageRobot;
  window.damageRobot = function(dmg) { _origDR(dmg, window._p11c_currentBulletOpts); };

};

<!-- ═══════════════════════════════════════════════════════════════════
     PART 11d: UI — УБЫВАЮЩАЯ ДОХОДНОСТЬ + ЭМП-БАР + ЗНАЧКИ
     ═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── 1. drawPlacedPart: значок ⬇ на дублирующихся орудиях + ★BURST ─────────
const _p11d_origDrawPlaced = window.drawPlacedPart;
window.drawPlacedPart = function(part, alpha) {
  _p11d_origDrawPlaced(part, alpha);
  if (!part || part.type === 'chassis') return;

  const def = PART_DEFS[part.type];
  if (!def) return;

  // Подсчитываем сколько таких же типов на поле
  const sameCount = Assembly.placed.filter(p => p.type === part.type).length;

  // Координаты ячейки через gridToScreen
  if (part.gx === null || part.gy === null) return;
  const { sx, sy } = gridToScreen(part.gx, part.gy);
  const CELL = GRID_SIZE;

  ctx.save();
  ctx.font = 'bold 8px "Courier New",monospace';
  ctx.textAlign = 'left';

  // Убывающая доходность: ⬇ если есть дубликат и это оружие
  if (sameCount >= 2 && def.cat === 'weapon') {
    const idx = Assembly.placed.filter(p => p.type === part.type).indexOf(part);
    if (idx >= 1) {
      ctx.fillStyle = '#ff6644';
      ctx.fillText(idx === 1 ? '▼60%' : '▼40%', sx + 2, sy + def.h * CELL - 3);
    }
  }

  // Мутационный бонус значок
  if (part._mutBonus && part._mutBonus !== 0) {
    ctx.fillStyle = part._mutBonus > 0 ? '#aa44ff' : '#ff4466';
    ctx.textAlign = 'right';
    ctx.fillText((part._mutBonus > 0 ? '+' : '') + part._mutBonus + '🧬', sx + def.w * CELL - 2, sy + 10);
  }

  ctx.restore();
};

// ── 2. drawPalette: значок мутации на инвентарных деталях ─────────────────
const _p11d_origDrawPalette = window.drawPalette;
window.drawPalette = function() {
  _p11d_origDrawPalette();
  const items = Game.inventory;
  const PAL_ITEM_H2 = 76;
  const startY2 = 28 - (Assembly.palScroll || 0);
  items.forEach((part, i) => {
    if (!part || !part._mutBonus || part._mutBonus === 0) return;
    const iy = startY2 + i * PAL_ITEM_H2;
    if (iy + PAL_ITEM_H2 < 28 || iy > H - 170) return;
    ctx.fillStyle = part._mutBonus > 0 ? '#aa44ff' : '#ff4466';
    ctx.font = 'bold 8px "Courier New",monospace'; ctx.textAlign = 'right';
    ctx.fillText((part._mutBonus > 0 ? '+' : '') + part._mutBonus + '🧬', PAL_X + PAL_W - 10, iy + 22);
  });
};

// ── 3. HUD: полоса ЭМП-кулдауна + фазовое ядро ────────────────────────────
const _p11d_origUpdateHUD = window.updateHUD;
window.updateHUD = function() {
  _p11d_origUpdateHUD();
  const R = Arena.robot;
  if (!R) return;

  // Уже есть основной HUD — добавим строку поверх canvas (внизу экрана)
  const barW = 140, barH = 7;
  const barX = Arena.arenaW / 2 - barW / 2;
  const barY = Arena.arenaY + Arena.arenaH + 6;

  // ── ЭМП кулдаун бар
  if (R._hasEMP && R._empCooldown > 0) {
    const pct = 1 - (R._empTimer || 0) / R._empCooldown;
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = pct > 0.9 ? '#44ffbb' : '#226644';
    ctx.fillRect(barX, barY, Math.round(barW * pct), barH);
    ctx.strokeStyle = '#224433'; ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#44ffbb'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ЭМП', barX + barW/2, barY + barH - 1);
  }

  // ── Phase core готовность
  if (R._hasPhaseCore) {
    const cx2 = barX + barW + 6;
    const color = R._phaseCoreUsed ? '#333' : (R._phaseTimer > 0 ? '#8855ff' : '#aa55ff');
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(cx2 + 5, barY + 3, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#551188'; ctx.lineWidth = 1; ctx.stroke();
    if (R._phaseTimer > 0) {
      ctx.fillStyle = '#8855ff'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText('ФАЗ', cx2 + 5, barY + barH + 8);
    }
  }

  // ── Gladiator contract indicator
  if (Game._gladiatorContract) {
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 9px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 8;
    ctx.fillText('⚔ ГЛАДИАТОРСКИЙ КОНТРАКТ АКТИВЕН', Arena.arenaW/2, Arena.arenaY + Arena.arenaH - 10);
    ctx.shadowBlur = 0;
  }
};

// ── 4. drawEnemies: полоска HP + метки особых врагов ─────────────────────
const _p11d_origDrawEnemies = window.drawEnemies;
window.drawEnemies = function() {
  _p11d_origDrawEnemies();
  if (!Arena.enemies) return;
  for (const e of Arena.enemies) {
    if (e._phased) continue; // фазовые уже отрисованы в 11b
    // Метки особых типов
    if (e.type === 'carrier') {
      ctx.fillStyle = '#ffaa22'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('НОСИТЕЛЬ', e.x, e.y - e.radius - 4);
    }
    if (e._enraged) {
      ctx.fillStyle = '#ff2222'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
      ctx.fillText('ЯРОСТЬ', e.x, e.y - e.radius - 4);
    }
    if (e._slowTimer > 0) {
      ctx.fillStyle = '#44ffbb'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText('ЭМП', e.x, e.y - e.radius - 4);
    }
  }
};

// ── 5. Всплывающее сообщение при получении синергии слияния в сборке ──────
const _p11d_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _p11d_origUpdateAssembly();

  // Показываем сколько орудий имеют убывающую доходность (подсказка)
  const wTypeCounts = {};
  for (const p of Assembly.placed) {
    if (PART_DEFS[p.type] && PART_DEFS[p.type].cat === 'weapon') {
      wTypeCounts[p.type] = (wTypeCounts[p.type] || 0) + 1;
    }
  }
  const dimCount = Object.values(wTypeCounts).filter(n => n >= 2).length;
  if (dimCount > 0) {
    ctx.fillStyle = '#ff6644'; ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'left';
    ctx.fillText(`⬇ ×${dimCount} тип(а) орудий дают убыв. доходность`, 8, H - 25);
  }

  // Синергия слияния — подсказка
  const mergedCount = Assembly.placed.filter(p => p._level >= 2).length;
  if (mergedCount > 0) {
    ctx.fillStyle = '#ffdd44'; ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'left';
    ctx.fillText(`★ ×${mergedCount} деталей со слиянием (синергия активна)`, 8, H - 14);
  }
};

console.log('[WRECK PROTOCOL] Part 11d: UI badges, EMP bar, phase core indicator, carrier/enrage labels loaded.');
</script>

<!-- ═══════════════════════════════════════════════════════════════════
     PART 11e: 10 РАУНДОВ + КВЕСТЫ + СЧЁТЧИК УБИЙСТВ + ИСПРАВЛЕНИЯ
     ═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── 1. РАСШИРЯЕМ ДО 10 РАУНДОВ ────────────────────────────────────────────
Game.maxRounds = 10;

// Таблица лута тоже нужна для раундов 8-10
// Патч prepLoot / LOOT_TABLES: добавляем строки если не хватает
const _p11e_origPrepLoot2 = window.prepLoot;
window.prepLoot = function() {
  // Временно расширяем LOOT_TABLES если нужно
  if (typeof LOOT_TABLES !== 'undefined') {
    while (LOOT_TABLES.length < Game.round) {
      LOOT_TABLES.push(LOOT_TABLES[LOOT_TABLES.length - 1]); // копируем последний тир
    }
  }
  _p11e_origPrepLoot2 && _p11e_origPrepLoot2();
};

// ── 2. СЧЁТЧИК УБИЙСТВ ────────────────────────────────────────────────────
Game.totalKills   = Game.totalKills   || 0;
Game.roundKills   = Game.roundKills   || 0;
Game.eliteKills   = Game.eliteKills   || 0; // берсерки, носители

const _p11e_origKillEnemy = window.killEnemy;
window.killEnemy = function(idx) {
  const e = Arena.enemies[idx];
  _p11e_origKillEnemy(idx);
  Game.totalKills++;
  Game.roundKills++;
  if (e && ['berserker','carrier','tank_enemy'].includes(e.type)) Game.eliteKills++;
  // Квест-проверки
  _p11e_checkQuests();
};

// ── 3. КВЕСТОВАЯ СИСТЕМА ──────────────────────────────────────────────────
// Простая система: активный квест, цель, награда
const QUEST_DEFS = [
  { id:'q_kills_10',  label:'Уничтожь 10 врагов',         check:()=>Game.totalKills>=10,  reward:()=>{Game.scrap+=20; return '+20 лома';} },
  { id:'q_elite_3',   label:'Уничтожь 3 элитных врага',   check:()=>Game.eliteKills>=3,   reward:()=>{ const p=createPart(['rocket_launcher','emp_gen','phase_core'][Math.floor(Math.random()*3)]); Game.inventory.push(p); return '+1 редкая деталь';} },
  { id:'q_survive_5', label:'Выживи 5 раундов',           check:()=>Game.round>=6,        reward:()=>{Game.scrap+=50; return '+50 лома';} },
  { id:'q_merge_part',label:'Слей 2 одинаковые детали',   check:()=>Assembly.placed.some(p=>p._level>=2), reward:()=>{Assembly.placed.filter(p=>p._level>=2).forEach(p=>{if(Math.random()<0.5) p._level++;}); return 'Слитые детали +1 ур.';} },
  { id:'q_nokill_dmg',label:'Пройди раунд без урона',     check:()=>Arena._roundNoDmg===true, reward:()=>{Game.scrap+=35; return '+35 лома';} },
];

Game._activeQuest    = Game._activeQuest    || null;
Game._completedQuests= Game._completedQuests|| [];
Game._questRewardMsg = Game._questRewardMsg || null;

function _p11e_pickNewQuest() {
  const available = QUEST_DEFS.filter(q => !Game._completedQuests.includes(q.id));
  if (available.length === 0) return;
  Game._activeQuest = available[Math.floor(Math.random() * available.length)];
}

function _p11e_checkQuests() {
  if (!Game._activeQuest) return;
  const q = QUEST_DEFS.find(d => d.id === Game._activeQuest.id);
  if (!q || !q.check()) return;
  const msg = q.reward();
  Game._completedQuests.push(q.id);
  Game._questRewardMsg = `✅ КВЕСТ: ${q.label} — ${msg}`;
  Game._activeQuest = null;
  // Даём секунду отображения, потом новый квест
  setTimeout(_p11e_pickNewQuest, 2000);
}

// Выбираем первый квест при старте игры
if (!Game._activeQuest && Game._completedQuests.length === 0) {
  _p11e_pickNewQuest();
}

// ── Сброс раундового счётчика убийств + флаг "без урона"
const _p11e_origStartArena2 = window.startArena;
window.startArena = function() {
  _p11e_origStartArena2();
  Game.roundKills = 0;
  Arena._roundNoDmg = true; // будет обнулено при первом уроне
};

// Флаг "получил урон в этом раунде"
const _p11e_origDmgRobot = window.damageRobot;
window.damageRobot = function(dmg) {
  Arena._roundNoDmg = false;
  _p11e_origDmgRobot(dmg);
};

// Подбираем новый квест после каждого раунда
const _p11e_origPrepLoot3 = window.prepLoot;
window.prepLoot = function() {
  _p11e_origPrepLoot3 && _p11e_origPrepLoot3();
  if (!Game._activeQuest) _p11e_pickNewQuest();
};

// ── 4. КВЕСТ В СБОРКЕ: показываем активный квест ──────────────────────────
const _p11e_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _p11e_origUpdateAssembly();

  // Квест вверху экрана
  const q = Game._activeQuest ? QUEST_DEFS.find(d => d.id === Game._activeQuest.id) : null;
  const msgQ = Game._questRewardMsg;
  if (msgQ) {
    ctx.fillStyle = '#44ff88'; ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 8;
    ctx.fillText(msgQ, W/2, 18);
    ctx.shadowBlur = 0;
  } else if (q) {
    const done = q.check();
    ctx.fillStyle = done ? '#44ff88' : '#888888';
    ctx.font = '9px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText(`📋 КВЕСТ: ${q.label}  [${done?'✅':'…'}]`, W/2, 18);
  }

  // Статистика убийств (правый угол)
  ctx.fillStyle = '#444'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
  ctx.fillText(`💀 ${Game.totalKills} | ⚡ ${Game.eliteKills}`, W - 10, 18);
};

// ── 5. КВЕСТ в HUD во время боя ───────────────────────────────────────────
const _p11e_origUpdateHUD2 = window.updateHUD;
window.updateHUD = function() {
  _p11e_origUpdateHUD2();
  const q = Game._activeQuest ? QUEST_DEFS.find(d => d.id === Game._activeQuest.id) : null;
  if (q) {
    const done = q.check();
    ctx.fillStyle = done ? '#44ff88' : '#666666';
    ctx.font = '8px "Courier New",monospace'; ctx.textAlign = 'left';
    ctx.fillText(`📋 ${q.label}`, 8, Arena.arenaY + Arena.arenaH + 20);
  }
  // Награда-флэш
  if (Game._questRewardMsg) {
    ctx.fillStyle = '#44ff88'; ctx.font = 'bold 11px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.shadowColor='#44ff88'; ctx.shadowBlur=10;
    ctx.fillText(Game._questRewardMsg, Arena.arenaW/2, Arena.arenaY + 60);
    ctx.shadowBlur=0;
  }
};

// ── 6. ОЧИСТКА НАГРАД-ФЛЭША ЧЕРЕЗ 3 СЕК ─────────────────────────────────
setInterval(() => { Game._questRewardMsg = null; }, 3000);

// ── 7. ОПИСАНИЕ НОВЫХ ДЕТАЛЕЙ В ТУЛТИПЕ СБОРКИ ────────────────────────────
// Хук на hover-тултип (строка ~1289): добавляем иконку новых свойств
const _p11e_origUpdateAssembly2 = window.updateAssembly;
window.updateAssembly = function() {
  _p11e_origUpdateAssembly2();
  // Показываем подсказки для новых механик
  const hovPart = Assembly._hoveredPart;
  if (!hovPart) return;
  const def = PART_DEFS[hovPart.type];
  if (!def) return;
  const tags = [];
  if (def._isOverclock)   tags.push('⚡ ЧИП РАЗГОНА: +30% к скорострельности ВСЕХ орудий');
  if (def._isEMP)         tags.push('🔋 ЭМП: импульс замедления каждые ~8 сек');
  if (def._isRepairDrone) tags.push('🔧 ДРОН: +25% ПЗ самой повреждённой детали после боя');
  if (def._isSpikeArmor)  tags.push('⚔ ШИПЫ: 20% отражение 50% урона назад');
  if (def._isPhaseCore)   tags.push('🔮 ФАЗА: однажды уходишь в неуязвимость при смерти');
  if (def._isRocket)      tags.push('🚀 РАКЕТА: медленный снаряд, огромный урон');
  if (tags.length === 0) return;

  // Отрисовываем теги под основным тултипом
  const TT_X = 230, TT_Y = 120;
  tags.forEach((tag, i) => {
    ctx.fillStyle = '#44ffbb'; ctx.font = '8px "Courier New",monospace'; ctx.textAlign = 'left';
    ctx.fillText(tag, TT_X, TT_Y + 120 + i * 12);
  });
};

// ── 8. shouldEncounter: увеличиваем шанс на раундах 8-10 (уже добавлено) ─
// Дополнительно: на раунде 4 тоже встречи возможны (было исключено)
const _p11e_origShouldEncounter = window.shouldEncounter;
window.shouldEncounter = function(round) {
  if (round === 4 && Math.random() < 0.30) return true;
  return _p11e_origShouldEncounter(round);
};

console.log('[WRECK PROTOCOL] Part 11e: 10 rounds, quest system, kill counter, new part tooltips, encounter fix loaded.');
console.log('[WRECK PROTOCOL] === PART 11 COMPLETE: new parts×6, enemies×4, encounters×6, battle surprises×5, merge synergy, diminishing returns, quests ===');
</script>
