<!-- PART 5: ARENA MODIFIERS + MUTATION SYSTEM -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ARENA MODIFIERS
// ═══════════════════════════════════════════════════════════
const ARENA_MODIFIERS = {
  none:      { label:'ОБЫЧНЫЙ БОЙ',      color:'#4eff91', desc:'Никаких сюрпризов. Бейся честно.' },
  berserk:   { label:'БЕРСЕРК',           color:'#ff4444', desc:'Враги: ×1.5 урон, ×0.6 HP. Злее, слабее.' },
  slippery:  { label:'СКОЛЬЗКАЯ АРЕНА',   color:'#44aaff', desc:'Трение уменьшено. Все носятся как безумные.' },
  fog:       { label:'ТУМАН ВОЙНЫ',       color:'#888888', desc:'Видишь только ближних врагов.' },
  airdrop:   { label:'ВОЗДУШНЫЙ ДЕСАНТ',  color:'#ffcc44', desc:'Каждые 8 сек ящик с бонусом падает в центр.' },
  acid:      { label:'КИСЛОТНЫЕ ЛУЖИ',    color:'#88ff44', desc:'Зелёные зоны жгут всех кто в них стоит.' },
  vampires:  { label:'ВАМПИРЫ',           color:'#ff44aa', desc:'Враги лечатся от урона по тебе. Добей быстро.' },
  mirror:    { label:'ЗЕРКАЛО',           color:'#aaaaff', desc:'Твои пули рикошетят от стен 1 раз.' },
};

// Random modifier per round (round 1 always none)
function pickModifier(round) {
  if (round === 1) return 'none';
  const keys = Object.keys(ARENA_MODIFIERS);
  return keys[Math.floor(Math.random() * keys.length)];
}

// Acid puddle positions (generated per fight)
let acidPuddles = [];
function genAcidPuddles() {
  acidPuddles = [];
  for (let i = 0; i < 5; i++) {
    acidPuddles.push({
      x: 80 + Math.random() * (Arena.arenaW - 160),
      y: Arena.arenaY + 60 + Math.random() * (Arena.arenaH - 120),
      r: 35 + Math.random() * 25,
    });
  }
}

// Airdrop timer
let airdropTimer = 0;
const AIRDROP_INTERVAL = 480; // 8 sec

function spawnAirdrop() {
  const x = Arena.arenaW/2 + (Math.random()-0.5)*200;
  const y = Arena.arenaY + Arena.arenaH/2 + (Math.random()-0.5)*150;
  // Randomly either scrap or heal or weapon
  const roll = Math.random();
  if (roll < 0.4) {
    Arena.pickups.push({ x, y, type:'scrap', value: 15+Math.floor(Math.random()*15) });
  } else if (roll < 0.7) {
    Arena.pickups.push({ x, y, type:'heal', value: 40 });
  } else {
    const pool = [...SHOP_WEAPON_POOL, ...SHOP_UTIL_POOL];
    Arena.pickups.push({ x, y, type:'part', partType: pool[Math.floor(Math.random()*pool.length)] });
  }
  spawnParticles(x, Arena.arenaY+10, '#ffcc44', 15, 3, 60);
}

// Draw modifier banner (first 2 sec of fight)
function drawModifierBanner() {
  const mod = ARENA_MODIFIERS[Arena.modifier] || ARENA_MODIFIERS.none;
  const alpha = Math.max(0, 1 - Arena.frame / 100);
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  fillRect(0, H/2-50, W, 100, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = mod.color;
  ctx.font = 'bold 28px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = mod.color; ctx.shadowBlur = 20;
  ctx.fillText('⚠ ' + mod.label, W/2, H/2 - 8);
  ctx.shadowBlur = 0;
  ctx.fillStyle = C.textDim; ctx.font = '14px "Courier New",monospace';
  ctx.fillText(mod.desc, W/2, H/2 + 20);
  ctx.restore();
}

function applyModifierToEnemies(enemies) {
  const mod = Arena.modifier;
  if (mod === 'berserk') {
    enemies.forEach(e => { e.damage = Math.round(e.damage * 1.5); e.hp = Math.round(e.hp * 0.6); e.maxHP = e.hp; });
  }
  if (mod === 'vampires') {
    enemies.forEach(e => { e.vampire = true; });
  }
}

// Override startArena to inject modifier
const _origStartArena = window.startArena || function(){};
window.startArena = function() {
  // Pick modifier before starting
  Arena.modifier = pickModifier(Game.round);
  airdropTimer = AIRDROP_INTERVAL;
  acidPuddles = [];
  if (Arena.modifier === 'acid') genAcidPuddles();
  // Call original
  _origStartArena();
  // Apply to enemies after they spawn
  applyModifierToEnemies(Arena.enemies);
};

// Draw acid puddles
function drawAcidPuddles() {
  if (Arena.modifier !== 'acid') return;
  for (const p of acidPuddles) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#44ff44';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#88ff44'; ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function updateModifierEffects() {
  const R = Arena.robot;
  const mod = Arena.modifier;

  // Slippery: increase robot friction (less deceleration = more slide)
  if (mod === 'slippery') {
    R.vx *= 1.04; R.vy *= 1.04; // counteract movement deceleration a bit
    for (const e of Arena.enemies) { e.vx *= 1.04; e.vy *= 1.04; }
  }

  // Fog: no gameplay effect here, handled in draw
  // Acid: damage in puddles
  if (mod === 'acid') {
    for (const p of acidPuddles) {
      if (Math.hypot(R.x-p.x, R.y-p.y) < p.r) {
        if (!(Arena._acidTimer > 0)) { damageRobot(4); Arena._acidTimer = 30; }
      }
      for (const e of Arena.enemies) {
        if (Math.hypot(e.x-p.x, e.y-p.y) < p.r) {
          if (!e._acidTimer || e._acidTimer<=0) { e.hp -= 3; e._acidTimer = 30; if (e.hp<=0) killEnemy(Arena.enemies.indexOf(e)); }
        }
        if (e._acidTimer > 0) e._acidTimer--;
      }
    }
    if (Arena._acidTimer > 0) Arena._acidTimer--;
  }

  // Airdrop: spawn crates
  if (mod === 'airdrop') {
    airdropTimer--;
    if (airdropTimer <= 0) { spawnAirdrop(); airdropTimer = AIRDROP_INTERVAL; }
  }

  // Vampire: enemies heal on melee hit (handled in damageRobot patch below)
}

// Pickup heal type
const _origUpdatePickups = window.updatePickups || function(){};
window.updatePickups = function() {
  const R = Arena.robot;
  for (let i = Arena.pickups.length-1; i >= 0; i--) {
    const p = Arena.pickups[i];
    if (p.type === 'heal' && Math.hypot(p.x-R.x, p.y-R.y) < R.radius + 14) {
      R.hp = Math.min(R.maxHP, R.hp + p.value);
      spawnParticles(p.x, p.y, '#44ff88', 10, 3);
      Arena.pickups.splice(i,1);
      updateHUD();
      continue;
    }
  }
  _origUpdatePickups();
};

// Fog: darken distant enemies in draw
function drawEnemiesFog() {
  if (Arena.modifier !== 'fog') return;
  const R = Arena.robot;
  for (const e of Arena.enemies) {
    const dist = Math.hypot(e.x-R.x, e.y-R.y);
    if (dist > 200) {
      ctx.save();
      const alpha = Math.min(0.95, (dist-200)/150);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C.bg;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+6, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// Mirror bullets: bounce off walls once
function updateMirrorBullets() {
  if (Arena.modifier !== 'mirror') return;
  for (const b of Arena.bullets) {
    if (b._bounced) continue;
    if (b.x < 4)               { b.vx = Math.abs(b.vx); b._bounced = true; }
    if (b.x > Arena.arenaW-4)  { b.vx = -Math.abs(b.vx); b._bounced = true; }
    if (b.y < Arena.arenaY+4)  { b.vy = Math.abs(b.vy); b._bounced = true; }
    if (b.y > Arena.arenaY+Arena.arenaH-4) { b.vy = -Math.abs(b.vy); b._bounced = true; }
  }
}

// Patch updateArena to call modifier hooks
const _origUpdateArena = window.updateArena;
window.updateArena = function() {
  _origUpdateArena();
  // Overlay effects (called after original draw)
  if (!Arena.result) {
    updateModifierEffects();
    updateMirrorBullets();
  }
  drawAcidPuddles();
  drawEnemiesFog();
  drawModifierBanner();
};

// ═══════════════════════════════════════════════════════════
//  MUTATION SYSTEM
// ═══════════════════════════════════════════════════════════
const MUTATIONS_DEF = [
  { id:'speed',      label:'⚡ ФОРСАЖ',         color:'#44aaff', desc:'Базовая скорость +35%' },
  { id:'damage',     label:'💥 ОСТРЫЕ УГЛЫ',    color:'#ff6644', desc:'Урон всего оружия ×1.3' },
  { id:'hp',         label:'🛡 БРОНЕВИК',        color:'#44ff88', desc:'+100 к максимальному ПЗ' },
  { id:'shield',     label:'💠 НАНОЩИТ',         color:'#4488ff', desc:'+60 щита, регенерация ×2' },
  { id:'regen',      label:'🔋 РЕГЕНЕРАЦИЯ',     color:'#44ffcc', desc:'+3 ПЗ/сек автовосстановление' },
  { id:'multishot',  label:'🔫 ОЧЕРЕДЬ',         color:'#ff88ff', desc:'Каждый 4й выстрел — тройной залп' },
  { id:'explosive',  label:'💣 КАССЕТНЫЕ',       color:'#ffcc44', desc:'Пули взрываются при ударе (АоЕ)' },
  { id:'vampire',    label:'🩸 ВАМПИРИЗМ',       color:'#ff4488', desc:'15% нанесённого урона → ПЗ тебе' },
  { id:'magnet',     label:'🧲 МАГНИТ',          color:'#ccaaff', desc:'Автоподбор лома с большого расстояния' },
  { id:'overclock',  label:'🔥 РАЗГОН',          color:'#ffaa44', desc:'Скорострельность ×1.5, но +20% перегрев' },
];

const Mutation = {
  offered: [],   // 3 random mutations shown
  picked: null,
};

// Active mutations on robot (accumulated across rounds)
Game.mutations = Game.mutations || [];

function pickMutations() {
  const available = MUTATIONS_DEF.filter(m => !Game.mutations.includes(m.id));
  const shuffled = available.sort(() => Math.random()-0.5);
  Mutation.offered = shuffled.slice(0, 3);
  Mutation.picked = null;
}

// Apply all active mutations to robot stats after startArena builds robot
function applyMutations(R) {
  for (const id of Game.mutations) {
    if (id === 'speed')     R.speed    *= 1.35;
    if (id === 'hp')        { R.maxHP += 100; R.hp = Math.min(R.hp + 100, R.maxHP); }
    if (id === 'shield')    { R.maxShield = (R.maxShield||0) + 60; R.shield = (R.shield||0) + 60; R.shieldRegen = (R.shieldRegen||0) + 0.6; }
    if (id === 'regen')     R._regenRate = (R._regenRate||0) + 3;
    if (id === 'overclock') R.weapons.forEach(w => { w.def = Object.assign({}, w.def, { fireRate: Math.round(w.def.fireRate / 1.5) }); });
  }
}

// Patch startArena to apply mutations
const _startArenaWithMod = window.startArena;
window.startArena = function() {
  _startArenaWithMod();
  applyMutations(Arena.robot);
};

// Regen tick in movement update
const _origUpdateRobotMovement = window.updateRobotMovement;
window.updateRobotMovement = function() {
  _origUpdateRobotMovement();
  const R = Arena.robot;
  if (R._regenRate && Arena.frame % 60 === 0) {
    R.hp = Math.min(R.maxHP, R.hp + R._regenRate);
    updateHUD();
  }
  // Magnet: auto-collect scrap from far
  if (Game.mutations.includes('magnet')) {
    for (let i = Arena.pickups.length-1; i >= 0; i--) {
      const p = Arena.pickups[i];
      const d = Math.hypot(p.x-R.x, p.y-R.y);
      if (d < 120) { // extra range
        const ang = Math.atan2(R.y-p.y, R.x-p.x);
        p.x += Math.cos(ang)*4; p.y += Math.sin(ang)*4;
      }
    }
  }
};

// Damage mutations: explosive + vampire
const _origDamageEnemy = window.damageEnemy;
window.damageEnemy = function(idx, dmg, bvx=0, bvy=0) {
  _origDamageEnemy(idx, dmg, bvx, bvy);
  const R = Arena.robot;

  // Vampire: heal player
  if (Game.mutations.includes('vampire')) {
    R.hp = Math.min(R.maxHP, R.hp + dmg * 0.15);
    updateHUD();
  }
  // Explosive: AoE splash
  if (Game.mutations.includes('explosive')) {
    const src = Arena.enemies[idx];
    const ex = src ? src.x : R.x + bvx, ey = src ? src.y : R.y + bvy;
    spawnParticles(ex||R.x, ey||R.y, '#ffaa44', 10, 4, 25);
    for (let j = Arena.enemies.length-1; j >= 0; j--) {
      if (j === idx) continue;
      const e2 = Arena.enemies[j];
      if (e2 && Math.hypot(e2.x-(ex||R.x), e2.y-(ey||R.y)) < 55) {
        e2.hp -= dmg * 0.4;
        if (e2.hp <= 0) killEnemy(j);
      }
    }
  }
};

// Multishot counter
let _multishotCounter = 0;
const _origFireWeapon = window.fireWeapon;
window.fireWeapon = function(wi, R) {
  _origFireWeapon(wi, R);
  if (Game.mutations.includes('multishot')) {
    _multishotCounter++;
    if (_multishotCounter >= 4) {
      _multishotCounter = 0;
      // Fire 2 extra bullets with small spread
      const w = R.weapons[wi];
      if (!w) return;
      let angle = R.angle;
      const nearest = Arena.enemies.reduce((best, e) => {
        const d = Math.hypot(e.x-R.x, e.y-R.y);
        return (!best || d < best.d) ? {e, d} : best;
      }, null);
      if (nearest) angle = Math.atan2(nearest.e.y-R.y, nearest.e.x-R.x);
      for (const da of [-0.2, 0.2]) {
        const bx = R.x + Math.cos(angle+da)*(R.radius+4);
        const by = R.y + Math.sin(angle+da)*(R.radius+4);
        spawnBullet(bx, by, angle+da, w.def, true);
      }
    }
  }
};

// ── Mutation screen (STATE.MUTATION = 6)
function updateMutation() {
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  ctx.fillStyle = C.accent; ctx.font='bold 22px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('МУТАЦИЯ ПРОТОКОЛА', W/2, 40);
  ctx.fillStyle = C.textDim; ctx.font='13px "Courier New",monospace';
  ctx.fillText('Выбери одно постоянное улучшение робота', W/2, 64);

  const cardW = 230, cardH = 180, gap = 20;
  const total = Mutation.offered.length * cardW + (Mutation.offered.length-1)*gap;
  const sx = W/2 - total/2;

  Mutation.offered.forEach((m, i) => {
    const cx2 = sx + i*(cardW+gap), cy2 = H/2 - cardH/2 - 20;
    const hov = isHover(cx2, cy2, cardW, cardH);
    const sel = Mutation.picked === m.id;

    fillRect(cx2, cy2, cardW, cardH, sel ? '#0f2a1f' : (hov ? '#0d1f0d' : '#080f08'));
    strokeRect(cx2, cy2, cardW, cardH, sel ? m.color : (hov ? '#2a5a2a' : C.border), sel ? 3 : 1);
    if (sel) {
      ctx.fillStyle = m.color; ctx.font='18px serif'; ctx.textAlign='center';
      ctx.fillText('✓', cx2+cardW-16, cy2+22);
    }
    ctx.save();
    ctx.shadowColor = m.color; ctx.shadowBlur = sel ? 18 : 0;
    ctx.fillStyle = m.color; ctx.font='bold 15px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText(m.label, cx2+cardW/2, cy2+40);
    ctx.restore();

    ctx.fillStyle = C.text; ctx.font='12px "Courier New",monospace'; ctx.textAlign='center';
    // Word wrap desc
    const words = m.desc.split(' ');
    let line='', ly=cy2+70;
    for (const w of words) {
      const t = line ? line+' '+w : w;
      if (t.length > 22 && line) { ctx.fillText(line, cx2+cardW/2, ly); line=w; ly+=18; }
      else line=t;
    }
    ctx.fillText(line, cx2+cardW/2, ly);

    // Effect preview
    ctx.fillStyle = C.textDim; ctx.font='11px "Courier New",monospace';
    ctx.fillText('ПОСТОЯННО', cx2+cardW/2, cy2+cardH-14);

    if (isClick(cx2, cy2, cardW, cardH)) Mutation.picked = m.id;
  });

  // Confirm / skip
  const bw2 = 220, bh2 = 36;
  const bx2 = W/2 - bw2/2, by2 = H/2 + cardH/2 + 20;
  const canConfirm = !!Mutation.picked;
  const hov2 = isHover(bx2, by2, bw2, bh2);
  drawButton(canConfirm ? `[ ПРИНЯТЬ МУТАЦИЮ ]` : `[ ВЫБЕРИ МУТАЦИЮ ]`, bx2, by2, bw2, bh2, hov2 && canConfirm);

  const skipX = W/2-60, skipY = by2+46;
  const hovSkip = isHover(skipX, skipY, 120, 24);
  ctx.fillStyle = hovSkip ? C.textDim : '#1a2a1a'; ctx.font='11px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('[ пропустить ]', W/2, skipY+16);

  if (canConfirm && hov2 && Mouse.clicked) {
    Game.mutations.push(Mutation.picked);
    Mutation.picked = null;
    initAssembly();
    setState(STATE.ASSEMBLY);
  }
  if (hovSkip && Mouse.clicked) {
    initAssembly();
    setState(STATE.ASSEMBLY);
  }

  drawVignette();
  drawScanlines();
}

// ── Patch prepLoot to go mutation→assembly instead of direct assembly
const _origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  _origPrepLoot();
  // After loot, show mutation screen (not assembly directly)
};

// ── Patch loot confirm: after confirming loot go to MUTATION
// Patch inside updateLoot — find the setState(STATE.ASSEMBLY) call
// We do this by patching the flow in the loot click handler:
const _origUpdateLoot = window.updateLoot;
window.updateLoot = function() {
  // Temporarily swap setState so ASSEMBLY→MUTATION
  const _origSetState = window.setState;
  window.setState = function(s) {
    if (s === STATE.ASSEMBLY) {
      window.setState = _origSetState;
      pickMutations();
      _origSetState(STATE.MUTATION);
    } else {
      _origSetState(s);
    }
  };
  _origUpdateLoot();
  // If setState wasn't triggered this frame, restore
  if (window.setState !== _origSetState) window.setState = _origSetState;
};

console.log('[WRECK PROTOCOL] Modifiers + Mutations loaded.');
</script>

      const def=PART_DEFS[pt]; if(!def)return;

    });

    // Button
    const btnY=cy2+cardH-38+bob;

}

<script>
'use strict';

Arena.pillars=[];

function genPillars(round){
  Arena.pillars=[];
  if(round<=1)return;
  const count=Math.min(2+Math.floor(round*0.7),7);
  const cx=Arena.arenaW/2, cy=Arena.arenaY+Arena.arenaH/2;
  for(let i=0;i<count;i++){
    let x,y,tries=0;
    do{
      x=70+Math.random()*(Arena.arenaW-140);
      y=Arena.arenaY+70+Math.random()*(Arena.arenaH-140);
      tries++;
    }while(tries<40&&Math.hypot(x-cx,y-cy)<110);
    Arena.pillars.push({x,y,r:16+Math.random()*14});
  }
}

function drawPillars(){
  for(const p of Arena.pillars){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(p.x+4,p.y+5,p.r,p.r*0.6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a2a1a';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a5a3a'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#4a7a4a'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(p.x-p.r*0.2,p.y-p.r*0.25,p.r*0.55,Math.PI,Math.PI*1.55); ctx.stroke();
    ctx.fillStyle='#2a5a2a';
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  }
}

function pillarHit(x,y,r){
  for(const p of Arena.pillars)
    if(Math.hypot(x-p.x,y-p.y)<p.r+r) return true;
  return false;
}

function pushOutPillar(obj,rad){
  for(const p of Arena.pillars){
    const dx=obj.x-p.x,dy=obj.y-p.y,dist=Math.hypot(dx,dy);
    const min=p.r+rad+1;
    if(dist<min&&dist>0.1){
      obj.x+=dx/dist*(min-dist);
      obj.y+=dy/dist*(min-dist);
      if(obj.vx!==undefined){
        const dot=obj.vx*(dx/dist)+obj.vy*(dy/dist);
        if(dot<0){obj.vx-=dot*(dx/dist)*0.8;obj.vy-=dot*(dy/dist)*0.8;}
      }
    }
  }
}

// Hook into startArena chain
const _saP=window.startArena;
window.startArena=function(){_saP();genPillars(Game.round);};

// Each frame: remove bullets hitting pillars, push robots out
function applyPillarPhysics(){
  for(let i=Arena.bullets.length-1;i>=0;i--){
    const b=Arena.bullets[i];
    if(pillarHit(b.x,b.y,b.r)){spawnParticles(b.x,b.y,'#4a8a4a',4,1.5,10);Arena.bullets.splice(i,1);}
  }
  for(let i=Arena.enemyBullets.length-1;i>=0;i--){
    const b=Arena.enemyBullets[i];
    if(pillarHit(b.x,b.y,b.r)){Arena.enemyBullets.splice(i,1);}
  }
  const R=Arena.robot;
  pushOutPillar(R,R.radius);
  for(const e of Arena.enemies) pushOutPillar(e,e.radius);
}

// Draw pillars on top of floor but below robots — inject after drawArenaBackground
const _uaP=window.updateArena;
window.updateArena=function(){
  _uaP();
  drawPillars();
  applyPillarPhysics();
};
</script>

<script>
'use strict';

// ── Boss spawns on rounds 4 and 7 instead of normal wave
function isBossRound(round){ return round===4||round===7; }

function spawnBossForRound(round){
  const cx=Arena.arenaW/2, cy=Arena.arenaY+Arena.arenaH/2;
  if(round===4) return [makeKuznetsBoss(cx,cy)];
  if(round===7) return [makeProtocolBoss(cx,cy)];
  return [];
}

function makeKuznetsBoss(x,y){
  return {
    type:'boss_kuznetс',
    label:'КУЗНЕЦ',
    x,y,vx:0,vy:0,angle:0,
    hp:500,maxHP:500,
    radius:38,
    color:'#2a3a5a',borderColor:'#ff8800',
    speed:1.1,damage:22,
    fireRate:55,bulletSpeed:5,range:500,shootRange:480,
    ai:'boss_kuznetс',
    fireCooldown:60,
    strafeDir:1,strafeSwitchTimer:0,
    dropPart:'gun_heavy',
    // Boss-specific
    phase:1,         // 1=normal, 2=enraged (<40% HP)
    droneSpawnTimer:0,
    shield:120,maxShield:120,
    _meleeCooldown:0,
  };
}

function makeProtocolBoss(x,y){
  return {
    type:'boss_protocol',
    label:'ПРОТОКОЛ-0',
    x,y,vx:0,vy:0,angle:0,
    hp:800,maxHP:800,
    radius:50,
    color:'#1a0a2a',borderColor:'#cc44ff',
    speed:1.4,damage:30,
    fireRate:35,bulletSpeed:7,range:600,shootRange:560,
    ai:'boss_protocol',
    fireCooldown:40,
    strafeDir:1,strafeSwitchTimer:0,
    dropPart:'laser',
    // Boss-specific
    teleportTimer:0,
    copyMutation:null,   // copies one player mutation
    burstMode:false,
    burstCount:0,
    _meleeCooldown:0,
  };
}

// ── Boss AI (injected into updateEnemies via type check)
function updateBossAI(e, R){
  const dx=R.x-e.x, dy=R.y-e.y;
  const dist=Math.hypot(dx,dy);
  const toPlayer=Math.atan2(dy,dx);
  e.angle=toPlayer;

  if(e.ai==='boss_kuznetс'){
    // Phase transition
    if(e.phase===1&&e.hp/e.maxHP<0.4){
      e.phase=2; e.speed=1.8; e.fireRate=30;
      spawnParticles(e.x,e.y,'#ff8800',30,5,60);
      triggerFlash('#ff8800',15);
    }
    // Shield blocks damage until drones dead
    if(e.shield>0&&Arena.frame%120===0) e.shield=Math.min(e.maxShield,e.shield+8);
    // Strafe + approach
    e.strafeSwitchTimer++;
    if(e.strafeSwitchTimer>90){e.strafeDir*=-1;e.strafeSwitchTimer=0;}
    const perp=toPlayer+Math.PI/2*e.strafeDir;
    const ideal=180;
    if(dist>ideal+40){e.vx+=Math.cos(toPlayer)*0.18;e.vy+=Math.sin(toPlayer)*0.18;}
    else if(dist<ideal-40){e.vx-=Math.cos(toPlayer)*0.12;e.vy-=Math.sin(toPlayer)*0.12;}
    e.vx+=Math.cos(perp)*0.15; e.vy+=Math.sin(perp)*0.15;
    // Drone spawn every 8 sec (only 2 drones max)
    e.droneSpawnTimer++;
    if(e.droneSpawnTimer>=480&&Arena.enemies.filter(x=>x.type==='drone').length<2){
      e.droneSpawnTimer=0;
      const a=Math.random()*Math.PI*2;
      const ne={...ENEMY_DEFS.swarm,type:'drone',label:'ДРОН',
        x:e.x+Math.cos(a)*70,y:e.y+Math.sin(a)*70,
        vx:0,vy:0,angle:0,
        hp:35,maxHP:35,radius:11,
        color:'#3a3a1a',borderColor:'#ffaa22',
        fireCooldown:80,strafeDir:1,strafeSwitchTimer:0,
        dropPart:null,_meleeCooldown:0};
      Arena.enemies.push(ne);
      spawnParticles(ne.x,ne.y,'#ffaa22',8,3,25);
    }
  }

  if(e.ai==='boss_protocol'){
    // Teleport every 5 sec
    e.teleportTimer++;
    if(e.teleportTimer>=300){
      e.teleportTimer=0;
      const ay=Arena.arenaY,ah=Arena.arenaH,aw=Arena.arenaW;
      e.x=80+Math.random()*(aw-160);
      e.y=ay+80+Math.random()*(ah-160);
      spawnParticles(e.x,e.y,'#cc44ff',20,4,40);
      triggerFlash('#cc44ff',8);
    }
    // Burst mode: 5-shot spread at 50% HP
    if(!e.burstMode&&e.hp/e.maxHP<0.5){
      e.burstMode=true;
      spawnParticles(e.x,e.y,'#cc44ff',25,5,50);
    }
    // Orbit player
    e.strafeSwitchTimer++;
    if(e.strafeSwitchTimer>150){e.strafeDir*=-1;e.strafeSwitchTimer=0;}
    const ideal2=220;
    const perp2=toPlayer+Math.PI/2*e.strafeDir;
    if(dist>ideal2+40){e.vx+=Math.cos(toPlayer)*0.2;e.vy+=Math.sin(toPlayer)*0.2;}
    else if(dist<ideal2-40){e.vx-=Math.cos(toPlayer)*0.15;e.vy-=Math.sin(toPlayer)*0.15;}
    e.vx+=Math.cos(perp2)*0.2; e.vy+=Math.sin(perp2)*0.2;
  }

  // Speed cap + friction
  const spd=Math.hypot(e.vx,e.vy);
  if(spd>e.speed){e.vx*=e.speed/spd;e.vy*=e.speed/spd;}
  e.vx*=0.88;e.vy*=0.88;
}

// ── Boss fire override
function bossFire(e,R){
  const toPlayer=Math.atan2(R.y-e.y,R.x-e.x);
  const bx=e.x+Math.cos(toPlayer)*(e.radius+8);
  const by=e.y+Math.sin(toPlayer)*(e.radius+8);

  if(e.ai==='boss_kuznetс'){
    // Triple spread in phase 2
    const shots=e.phase===2?3:1;
    for(let s=0;s<shots;s++){
      const ang=toPlayer+(s-1)*0.22;
      spawnBullet(bx,by,ang,{bulletSpeed:e.bulletSpeed,damage:e.damage,range:e.range},false);
    }
  }
  if(e.ai==='boss_protocol'){
    if(e.burstMode){
      // 5-way spread
      for(let s=0;s<5;s++){
        const ang=toPlayer+(s-2)*0.28;
        spawnBullet(bx,by,ang,{bulletSpeed:e.bulletSpeed,damage:e.damage*0.7,range:e.range},false);
      }
    } else {
      spawnBullet(bx,by,toPlayer,{bulletSpeed:e.bulletSpeed,damage:e.damage,range:e.range},false);
    }
  }
}

// ── Boss draw
function drawBoss(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.rotate(e.angle+Math.PI/2);

  // Glow aura
  ctx.save();
  ctx.globalAlpha=0.18+Math.sin(Arena.frame*0.05)*0.07;
  ctx.fillStyle=e.borderColor;
  ctx.beginPath(); ctx.arc(0,0,e.radius+12,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body (octagon for bosses)
  ctx.fillStyle=e.color;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    i===0?ctx.moveTo(Math.cos(a)*e.radius,Math.sin(a)*e.radius)
         :ctx.lineTo(Math.cos(a)*e.radius,Math.sin(a)*e.radius);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=e.borderColor; ctx.lineWidth=3; ctx.stroke();

  // Shield ring
  if(e.shield>0){
    ctx.save();
    ctx.globalAlpha=(e.shield/e.maxShield)*0.6;
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(0,0,e.radius+6,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Barrel
  ctx.fillStyle='#666';
  ctx.fillRect(-5,-e.radius-10,10,16);

  ctx.restore();

  // HP bar (wide, below boss)
  const bw=e.radius*3, bx2=e.x-bw/2, by2=e.y+e.radius+8;
  fillRect(bx2,by2,bw,8,'#111');
  fillRect(bx2,by2,bw*(e.hp/e.maxHP),8,e.hp/e.maxHP>0.4?e.borderColor:'#ff3333');
  if(e.maxShield){
    fillRect(bx2,by2-9,bw,6,'#112244');
    fillRect(bx2,by2-9,bw*(e.shield/e.maxShield),6,'#4488ff');
  }

  // Name + phase
  ctx.fillStyle=e.borderColor; ctx.font='bold 12px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('⚠ '+e.label+(e.phase===2?' [БЕРСЕРК]':''),e.x,e.y-e.radius-14);
}

// Override damageEnemy for boss shield
const _origDE=window.damageEnemy;
window.damageEnemy=function(idx,dmg,bvx,bvy){
  const e=Arena.enemies[idx];
  if(e&&e.shield>0){
    const absorbed=Math.min(e.shield,dmg);
    e.shield-=absorbed;
    dmg-=absorbed;
    spawnParticles(e.x,e.y,'#4488ff',4,2,12);
    if(dmg<=0){spawnParticles(e.x,e.y,'#ff8800',3,1.5,8);return;}
  }
  _origDE(idx,dmg,bvx,bvy);
};

// Hook boss AI into enemy update — patch spawnEnemiesForRound
const _origSpawn=window.spawnEnemiesForRound;
window.spawnEnemiesForRound=function(round){
  if(isBossRound(round)) return spawnBossForRound(round);
  return _origSpawn(round);
};

// Hook boss draw + AI into drawEnemies / updateEnemies
const _origDrawEnemies=window.drawEnemies;
window.drawEnemies=function(){
  for(const e of Arena.enemies){
    if(e.ai&&e.ai.startsWith('boss_')) drawBoss(e);
  }
  _origDrawEnemies();
};

const _origUpdateEnemies=window.updateEnemies;
window.updateEnemies=function(){
  const R=Arena.robot;
  for(const e of Arena.enemies){
    if(!e.ai||!e.ai.startsWith('boss_')) continue;
    updateBossAI(e,R);
    e.x=Math.max(e.radius,Math.min(Arena.arenaW-e.radius,e.x));
    e.y=Math.max(Arena.arenaY+e.radius,Math.min(Arena.arenaY+Arena.arenaH-e.radius,e.y));
    e.fireCooldown--;
    const dist=Math.hypot(R.x-e.x,R.y-e.y);
    if(e.fireCooldown<=0&&dist<e.shootRange){
      e.fireCooldown=e.fireRate+Math.floor(Math.random()*20-10);
      bossFire(e,R);
    }
    const sep=e.radius+R.radius+4;
    if(dist<sep&&dist>0.1){
      const nx=(R.x-e.x)/dist,ny=(R.y-e.y)/dist;
      const overlap=sep-dist;
      e.x-=nx*overlap*0.3; e.y-=ny*overlap*0.3;
      if(!R.knockbackImmune){R.x+=nx*overlap*0.7;R.y+=ny*overlap*0.7;}
      if(!e._meleeCooldown||e._meleeCooldown<=0){
        damageRobot(e.damage*0.6); e._meleeCooldown=50;
      }
    }
    if(e._meleeCooldown>0)e._meleeCooldown--;
  }
  _origUpdateEnemies();
};
</script>

function applyEncounterAction(action){
  const allParts=Object.keys(PART_DEFS).filter(k=>k!=='chassis');
  const rareParts=['laser','gun_heavy','shield_gen','legs','jets','timer_fast'];
  switch(action){

      for(let i=0;i<2;i++) Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));

    case 'search_deep':

    case 'trade':
      if(Game.inventory.length>=2){

        for(let i=0;i<3;i++) Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));
      } break;

      Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));
      break;
    case 'leave': break;
    case 'repair_full':
      Assembly.placed.forEach(p=>{p.hp=PART_DEFS[p.type].maxHP;}); break;
    case 'charge_scrap': Game.scrap+=50; break;
    case 'destroy_station':
      Game.inventory.push(createPart(rareParts[Math.floor(Math.random()*rareParts.length)])); break;
  }
}

function updateEncounter(){
  const enc=Encounter.current;
  if(!enc){setState(STATE.ASSEMBLY);return;}

  fillRect(0,0,W,H,C.bg);
  drawGrid(0,0,W,H,40,'#0b150b');

  // Header
  fillRect(0,0,W,90,'rgba(0,0,0,0.6)');
  ctx.fillStyle=enc.color; ctx.font='bold 22px "Courier New",monospace'; ctx.textAlign='center';
  ctx.shadowColor=enc.color; ctx.shadowBlur=15;
  ctx.fillText(enc.title,W/2,38); ctx.shadowBlur=0;
  ctx.fillStyle=C.textDim; ctx.font='11px "Courier New",monospace';
  ctx.fillText(`РАУНД ${Game.round-1} → ${Game.round} · СЛУЧАЙНАЯ ВСТРЕЧА`,W/2,58);

  // Description panel
  const px=W/2-310,py=105,pw=620,ph=100;
  fillRect(px,py,pw,ph,'#080e08');
  strokeRect(px,py,pw,ph,enc.color,1);
  ctx.fillStyle=C.text; ctx.font='13px "Courier New",monospace'; ctx.textAlign='left';
  let ly=py+22;
  for(const line of enc.desc.split('\n')){ctx.fillText(line,px+16,ly);ly+=20;}

  // Options
  const optX=W/2-280, optW=560;
  enc.options.forEach((opt,i)=>{
    const oy=220+i*70;
    const hov=isHover(optX,oy,optW,58);
    fillRect(optX,oy,optW,58,hov?'#0f2010':'#080f08');
    strokeRect(optX,oy,optW,58,hov?enc.color:'#1a3a1a',hov?2:1);

    // Option number
    ctx.fillStyle=hov?enc.color:C.textDim;
    ctx.font='bold 18px "Courier New",monospace'; ctx.textAlign='left';
    ctx.fillText(`${i+1}.`,optX+12,oy+36);

    // Label (word wrap)
    ctx.fillStyle=hov?C.text:C.textDim;
    ctx.font='13px "Courier New",monospace';
    const words=opt.label.split(' '); let line='', lx=optX+38, lly=oy+24;
    for(const w of words){
      const t=line?line+' '+w:w;
      if(t.length>52&&line){ctx.fillText(line,lx,lly);line=w;lly+=17;}
      else line=t;
    }
    ctx.fillText(line,lx,lly);

    if(hov&&Mouse.clicked){
      applyEncounterAction(opt.action);
      Encounter.current=null;
      initAssembly();
      setState(STATE.ASSEMBLY);
    }
  });

  // Skip
  const sy=H-50;
  const shov=isHover(W/2-80,sy,160,28);
  ctx.fillStyle=shov?C.textDim:'#1a2a1a';
  ctx.font='11px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('[ пропустить встречу ]',W/2,sy+18);
  if(shov&&Mouse.clicked){
    Encounter.current=null; initAssembly(); setState(STATE.ASSEMBLY);
  }

  drawVignette(); drawScanlines();
}

// Hook into loot flow: after loot→mutation, before assembly check encounter
const _origUpdateLoot2=window.updateLoot;

  for (let d = 0; d < 4; d++) {

};

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  META-PROGRESSION — saved across runs in localStorage
// ═══════════════════════════════════════════════════════════
const META_KEY = 'wreck_meta_v1';

function metaLoad() {
  try {
    const raw = localStorage.getItem(META_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { runs: 0, wins: 0, bestRound: 0, bestSynergies: 0, history: [] };
}

function metaSave(data) {
  try { localStorage.setItem(META_KEY, JSON.stringify(data)); } catch(e) {}
}

function metaReset() {
  metaSave({ runs: 0, wins: 0, bestRound: 0, bestSynergies: 0, history: [] });
}

// Called at end of each run
function metaRecordRun(win) {
  const data = metaLoad();
  const round = Game.round - 1;
  const synCount = (Arena.robot._activeSynergies || []).length;
  data.runs++;
  if (win) data.wins++;
  if (round > data.bestRound) data.bestRound = round;
  if (synCount > data.bestSynergies) data.bestSynergies = synCount;
  data.history.unshift({ win, round, class: Game._startClass || '?', synCount });
  if (data.history.length > 10) data.history.length = 10; // keep last 10
  metaSave(data);
  return data;
}

// Bonus starting scrap: +5 per win, max +25
function metaBonusScrap() {
  const data = metaLoad();
  return Math.min(data.wins * 5, 25);
}

// ── Override setState to record run on game end
const _meta_origSetState = window.setState;
window.setState = function(s) {
  if (s === STATE.GAMEOVER) metaRecordRun(false);
  if (s === STATE.WIN)      metaRecordRun(true);
  _meta_origSetState(s);
};

// ── Apply bonus scrap at game start (hook into startGameWithClass)
const _meta_origStartGame = window.startGameWithClass;
window.startGameWithClass = function(cls) {
  _meta_origStartGame(cls);
  const bonus = metaBonusScrap();
  if (bonus > 0) {
    Game.scrap += bonus;
    Game._startClass = cls ? cls.id : 'none';
  }
};

// ── Patch menu to show records
const _meta_origUpdateMenu = window.updateMenu;
window.updateMenu = function() {
  _meta_origUpdateMenu();

  if (data.runs === 0) return; // first run, nothing to show

  ctx.textAlign = 'left';
  ctx.fillText('— СТАТИСТИКА —', px+8, py+14);

  ctx.fillStyle = C.textDim; ctx.font = '11px "Courier New",monospace';
  ctx.fillText(`Забегов: ${data.runs}`, px+8, py+30);
  ctx.fillText(`Побед: ${data.wins}`, px+8, py+44);
  ctx.fillText(`Лучший раунд: ${data.bestRound}/7`, px+8, py+58);
  ctx.fillText(`Макс. синергий: ${data.bestSynergies}`, px+8, py+72);

  const bonus = metaBonusScrap();
  if (bonus > 0) {
    ctx.fillStyle = '#4eff91';
    ctx.fillText(`+ ${bonus} лома (бонус за победы)`, px+8, py+88);
  }

  // Last 3 runs mini-history
  const recent = data.history.slice(0, 3);
  let hy = py + 102;
  ctx.font = '9px "Courier New",monospace';
  for (const r of recent) {
    ctx.fillStyle = r.win ? '#4eff91' : '#ff4444';
    ctx.fillText(`${r.win ? '✓' : '✗'} Раунд ${r.round}/7  класс:${r.class}`, px+8, hy);
    hy += 12;
  }

  // Reset hint
  ctx.fillStyle = '#1a2a1a'; ctx.font = '9px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Del — сбросить рекорды', px + pw/2, py + 118);

  if (Keys['Delete_pressed']) {
    metaReset();
    Keys['Delete_pressed'] = false;
  }
};

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CURSED PARTS — loot items with risk/reward tradeoffs
// ═══════════════════════════════════════════════════════════
const CURSE_POOL = [
  { id:'c_slow',    badge:'⚠ МЕДЛИТ',   desc:'Скорость -20%', penalty: R => { R.speed *= 0.8; } },
  { id:'c_fragile', badge:'⚠ ХРУПКАЯ',  desc:'ПЗ -30',        penalty: R => { R.maxHP = Math.max(10, R.maxHP - 30); R.hp = Math.min(R.hp, R.maxHP); } },
  { id:'c_hungry',  badge:'⚠ ПРОЖОРЛИВАЯ', desc:'Урон -15%',  penalty: R => { R.weapons.forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 0.85)}; }); } },
  { id:'c_unstable',badge:'⚠ НЕСТАБИЛЬНАЯ', desc:'Огонь -25% скорости', penalty: R => { R.weapons.forEach(w => { w.def = {...w.def, fireRate: Math.round(w.def.fireRate * 1.25)}; }); } },
  { id:'c_heavy',   badge:'⚠ ТЯЖЁЛАЯ',  desc:'Масса +4кг',    penalty: R => { R.mass = (R.mass||0)+4; const pen=Math.max(0.3,1-(R.mass-4)*0.025); R.speed=Math.max(0.5,R.speed*0.88); } },
];

const BLESS_POOL = [
  { id:'b_sharp',   badge:'★ ОСТРАЯ',   desc:'Урон +20%',      bonus: R => { R.weapons.forEach(w => { w.def = {...w.def, damage: Math.round(w.def.damage * 1.2)}; }); } },
  { id:'b_swift',   badge:'★ БЫСТРАЯ',  desc:'Скорость +20%',  bonus: R => { R.speed *= 1.2; } },
  { id:'b_tough',   badge:'★ ПРОЧНАЯ',  desc:'ПЗ +40',         bonus: R => { R.maxHP += 40; R.hp += 40; } },
  { id:'b_regen',   badge:'★ ЖИВАЯ',    desc:'Реген 0.1/фр',   bonus: R => { R._regenRate = (R._regenRate||0) + 0.1; } },
];

// ── Inject curse/bless into loot (override prepLoot)
const _curse_origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  _curse_origPrepLoot();
  // From round 2 onwards, add curses/blessings
  if (Game.round < 2) return;
  Loot.offered.forEach(part => {
    if (!part || part.type === 'chassis') return;
    const roll = Math.random();
    if (roll < 0.25) {
      // Cursed: random penalty
      part._curse = CURSE_POOL[Math.floor(Math.random() * CURSE_POOL.length)];
    } else if (roll < 0.38) {
      // Blessed: random bonus
      part._bless = BLESS_POOL[Math.floor(Math.random() * BLESS_POOL.length)];
    } else if (roll < 0.45) {
      // Cursed AND blessed (high risk high reward)
      part._curse = CURSE_POOL[Math.floor(Math.random() * CURSE_POOL.length)];
      part._bless = BLESS_POOL[Math.floor(Math.random() * BLESS_POOL.length)];
    }
  });
};

const _curse_origStartArena = window.startArena;
window.startArena = function() {
  _curse_origStartArena();

  // Assembly.placed contains the actual part objects with _curse/_bless set during loot

  const startY = 90;
  Loot.offered.forEach((part, i) => {
    if (!part) return;
    const col = i % cols, row = Math.floor(i / cols);
    const cx2 = startX + col*(cardW+12);
    const cy2 = startY + row*(cardH+12);

    if (part._curse) {

      ctx.fillText('↓ ' + part._curse.desc, cx2+8, cy2+cardH-4);
    }
    if (part._bless) {
      // Gold bless badge top-left (or shift if curse present)

      ctx.fillStyle = '#ffdd44'; ctx.font = 'bold 8px "Courier New",monospace'; ctx.textAlign = 'center';
      ctx.fillText(part._bless.badge, bx2+40, cy2+(part._curse?28:11));
      ctx.fillStyle = '#aaaa00'; ctx.font = '8px "Courier New",monospace'; ctx.textAlign = 'left';
      ctx.fillText('↑ ' + part._bless.desc, cx2+8, cy2+cardH-14);
    }
  });
};

// Note: curse/bless is stored directly on the part object,
// so it survives Game.inventory → Assembly.placed transfer automatically.

console.log('[WRECK PROTOCOL] Cursed/Blessed parts system loaded.');
</script>

<!-- PART 7d: ROUND CHALLENGES -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CHALLENGE SYSTEM — optional hard modifier per round with bonus reward
// ═══════════════════════════════════════════════════════════
const CHALLENGE_DEFS = [
  {
    id: 'marathon', label: '⚔ МАРАФОН', color: '#ff6b35',
    desc: 'На 3 врага больше в этом раунде.',
    reward: 'Выбор +1 трофей',
    apply: () => { Game._challengeMarathon = true; },
    reward_fn: () => { Loot.maxPick = Math.min(Loot.maxPick + 1, 5); }
  },
  {
    id: 'fragile', label: '💔 ХРУПКОСТЬ', color: '#ff3344',
    desc: 'Входящий урон ×1.5.',
    reward: '+35 металлолома',
    apply: () => { Game._challengeFragile = true; },
    reward_fn: () => { Game.scrap += 35; }
  },
  {
    id: 'berserk', label: '⚡ БЕРСЕРК', color: '#ffaa00',
    desc: 'Враги быстрее на 40%.',
    reward: '+25 металлолома',
    apply: () => { Game._challengeBerserk = true; },
    reward_fn: () => { Game.scrap += 25; }
  },
  {
    id: 'acid_rain', label: '☣ КИСЛОТНЫЙ ДОЖДЬ', color: '#44ff88',
    desc: 'Постоянный кислотный урон по арене.',
    reward: '+30 металлолома',
    apply: () => { Game._challengeAcid = true; },
    reward_fn: () => { Game.scrap += 30; }
  },
  {
    id: 'blind', label: '👁 СЛЕПОТА', color: '#8844ff',
    desc: 'Враги невидимы. Стреляй по наитию.',
    reward: '+40 металлолома + деталь',
    apply: () => { Game._challengeBlind = true; },
    reward_fn: () => {
      Game.scrap += 40;
      const t = ['gun_rapid','armor_light','sensor_auto','battery'][Math.floor(Math.random()*4)];
      Game.inventory.push(createPart(t));
    }
  },
];

function rollChallenge() {
  // 40% chance of a challenge each round (not round 1)
  if (Game.round <= 1 || Math.random() > 0.40) return null;
  return CHALLENGE_DEFS[Math.floor(Math.random() * CHALLENGE_DEFS.length)];
}

function clearChallenge() {
  Game._challengeMarathon = false;
  Game._challengeFragile  = false;
  Game._challengeBerserk  = false;
  Game._challengeAcid     = false;
  Game._challengeBlind    = false;
  Game._activeChallenge   = null;
}

// ── Roll challenge when assembly starts (before each round)
const _ch_origInitAssembly = window.initAssembly;
window.initAssembly = function() {
  _ch_origInitAssembly();
  clearChallenge();
  const ch = rollChallenge();
  if (ch) { Game._activeChallenge = ch; ch.apply(); }
};

// ── Marathon: spawn extra enemies
const _ch_origSpawn = window.spawnEnemiesForRound;
window.spawnEnemiesForRound = function(round) {
  const enemies = _ch_origSpawn(round);
  if (Game._challengeMarathon) {
    const types = ['scout','gunner','swarm'];
    for (let i = 0; i < 3; i++) {
      const def = ENEMY_DEFS[types[i % types.length]];
      enemies.push({
        ...def, type: types[i % types.length],
        x: 60 + i * 90, y: Arena.arenaY + 60,
        vx: 0, vy: 0, angle: 0,
        hp: def.hp, maxHP: def.hp, fireCooldown: 60,
        strafeDir: 1, strafeSwitchTimer: 0, dropPart: null, _meleeCooldown: 0
      });
    }
  }
  return enemies;
};

// ── Fragile: extra damage on robot
const _ch_origDmgRobot2 = window.damageRobot;
window.damageRobot = function(dmg) {
  const extra = Game._challengeFragile ? dmg * 0.5 : 0;
  _ch_origDmgRobot2(dmg + extra);
};

// ── Berserk: enemy speed boost (applied in updateArena hook)
// ── Acid rain: periodic damage (applied in updateArena hook)
// ── Blind: skip drawEnemies
const _ch_origUpdateArena = window.updateArena;
window.updateArena = function() {
  // Berserk: temporarily boost enemy speed each frame
  if (Game._challengeBerserk && Arena.enemies) {
    Arena.enemies.forEach(e => { e._origSpeed = e._origSpeed || e.speed; e.speed = e._origSpeed * 1.4; });
  }
  // Acid rain: every 90 frames damage robot
  if (Game._challengeAcid && Arena.frame > 0 && Arena.frame % 90 === 0 && !Arena.result) {
    window.damageRobot(6);
    triggerFlash('#44ff88', 4);
  }
  _ch_origUpdateArena();
};

// ── Blind: don't draw enemies (override drawEnemies)
const _ch_origDrawEnemies = window.drawEnemies;
window.drawEnemies = function() {
  if (Game._challengeBlind) {
    // Only draw a small ??? indicator at each enemy position
    if (Arena.enemies) {
      Arena.enemies.forEach(e => {
        ctx.fillStyle = 'rgba(136,68,255,0.25)';
        ctx.font = '14px monospace'; ctx.textAlign = 'center';
        ctx.fillText('?', e.x, e.y + 5);
      });
    }
    return;
  }
  _ch_origDrawEnemies();
};

// ── Apply reward on round win (hook into prepLoot)
const _ch_origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  if (Game._activeChallenge) {
    Game._activeChallenge.reward_fn();
    // Reset maxPick after marathon
    if (Game._activeChallenge.id === 'marathon') {
      // will be reset naturally next initAssembly
    }
    const ch = Game._activeChallenge;
    Game._lastChallengeReward = ch.reward;
  }
  _ch_origPrepLoot();
};

// ── Show challenge in assembly screen
const _ch_origUpdateAssembly = window.updateAssembly;
window.updateAssembly = function() {
  _ch_origUpdateAssembly();
  if (!Game._activeChallenge) return;
  const ch = Game._activeChallenge;
  // Banner below title
  const bw = 340, bh = 36, bx = W/2 - bw/2, by = 6;
  fillRect(bx, by, bw, bh, '#0a0a0a');
  strokeRect(bx, by, bw, bh, ch.color, 1);
  ctx.fillStyle = ch.color; ctx.font = 'bold 11px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.fillText(`ИСПЫТАНИЕ: ${ch.label} — ${ch.desc}`, W/2, by + 16);
  ctx.fillStyle = '#888888'; ctx.font = '9px "Courier New",monospace';
  ctx.fillText(`Победи → ${ch.reward}`, W/2, by + 28);
};

// ── Show challenge in arena HUD (top banner)
const _ch_origUpdateArena2 = window.updateArena;
window.updateArena = function() {
  _ch_origUpdateArena2();
  if (!Game._activeChallenge || Arena.result) return;
  const ch = Game._activeChallenge;
  ctx.fillStyle = ch.color + '99'; ctx.font = 'bold 10px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.fillText(`⚠ ИСПЫТАНИЕ: ${ch.label}`, W/2, Arena.arenaY - 2);
};

console.log('[WRECK PROTOCOL] Challenge system loaded.');
</script>

</body>
