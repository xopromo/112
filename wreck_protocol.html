// ── Main assembly update
function updateAssembly() {
  // Background
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  // Grid area
  const gx0 = Assembly.gridOriginX, gy0 = Assembly.gridOriginY;
  const gw = GRID_COLS * GRID_SIZE, gh = GRID_ROWS * GRID_SIZE;
  fillRect(gx0, gy0, gw, gh, '#080e08');
  drawGrid(gx0, gy0, gw, gh, GRID_SIZE, '#0f1f0f');
  strokeRect(gx0, gy0, gw, gh, C.border, 1);

  // Title
  ctx.fillStyle = C.accent; ctx.font = '14px "Courier New",monospace'; ctx.textAlign = 'left';
  ctx.fillText(`СБОРКА — РАУНД ${Game.round}`, gx0, gy0-10);

  // Draw placed parts
  for (const part of Assembly.placed) drawPlacedPart(part);

  // Draw wires
  drawWires();

  // Dragging ghost
  if (Assembly.dragging) {
    const { part } = Assembly.dragging;
    const def = PART_DEFS[part.type];
    const { gx, gy } = screenToGrid(Mouse.x, Mouse.y);
    const valid = canPlace(part, gx, gy);

    // Ghost on grid
    if (gx >= 0 && gy >= 0 && gx < GRID_COLS && gy < GRID_ROWS) {
      const { sx, sy } = gridToScreen(gx, gy);
      ctx.save();
      ctx.globalAlpha = 0.5;
      fillRect(sx+1, sy+1, partW(part)*GRID_SIZE-2, partH(part)*GRID_SIZE-2,
        valid ? def.color : '#3a0000');
      strokeRect(sx+1, sy+1, partW(part)*GRID_SIZE-2, partH(part)*GRID_SIZE-2,
        valid ? def.border : C.danger, 2);
      ctx.restore();
    }

    // Floating icon at cursor
    ctx.fillStyle = def.border;
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.icon, Mouse.x, Mouse.y - 10);

    // Rotate key
    if (Keys['KeyR'] || Keys['KeyR_pressed']) {
      part.rot = (part.rot + 1) % 4;
      Keys['KeyR_pressed'] = false;
    }

    // Drop on left click
    if (Mouse.clicked) {
      if (valid) {
        if (Assembly.dragging.fromInventory) {
          Game.inventory.splice(Assembly.dragging.invIdx, 1);
          placeOnGrid(part, gx, gy);
        } else {
          // Move already placed part — re-add wires that were saved
          placeOnGrid(part, gx, gy);
          if (Assembly.dragging.savedWires) {
            for (const w of Assembly.dragging.savedWires) {
              const fromOk = Assembly.placed.some(p => p.id === w.fromId);
              const toOk   = Assembly.placed.some(p => p.id === w.toId);
              if (fromOk && toOk) Assembly.wires.push(w);
            }
          }
        }
      } else if (!Assembly.dragging.fromInventory) {
        // Couldn't drop — put back in original position
        placeOnGrid(part, Assembly.dragging.origGx, Assembly.dragging.origGy);
        if (Assembly.dragging.savedWires) {
          for (const w of Assembly.dragging.savedWires) Assembly.wires.push(w);
        }
      }
      Assembly.dragging = null;
    }
    // Right click = cancel drag
    if (Mouse.rightClicked) Assembly.dragging = null;
  } else {
    // Right click on placed part = remove
    if (Mouse.rightClicked) {
      for (const part of [...Assembly.placed]) {
        if (part.type === 'chassis') continue;
        const { sx, sy } = gridToScreen(part.gx, part.gy);
        if (Mouse.x >= sx && Mouse.x <= sx + partW(part)*GRID_SIZE &&
            Mouse.y >= sy && Mouse.y <= sy + partH(part)*GRID_SIZE) {
          Game.inventory.push(part);
          removePlaced(part.id);
          break;
        }
      }
    }

    if (Mouse.clicked) {
      if (Assembly.wiringFrom) {
        // ── FINISH or CANCEL wiring
        let connected = false;
        for (const part of Assembly.placed) {
          if (connected) break;
          const ports = getRotatedPorts(part);
          ports.forEach((port, pi) => {
            if (connected) return;
            const pp = portScreenPos(part, pi);
            if (pp && Math.hypot(Mouse.x-pp.x, Mouse.y-pp.y) < 10) {
              const from = Assembly.wiringFrom;
              if (part.id !== from.partId) {
                const fromPart = Assembly.placed.find(p => p.id === from.partId);
                const fromPort = getRotatedPorts(fromPart)[from.portIdx];
                if (fromPort.type === 'OUT' && port.type === 'IN') {
                  Assembly.wires = Assembly.wires.filter(w => !(w.toId===part.id && w.toPortIdx===pi));
                  Assembly.wires.push({ fromId:from.partId, fromPortIdx:from.portIdx, toId:part.id, toPortIdx:pi });
                  connected = true;
                } else if (fromPort.type === 'IN' && port.type === 'OUT') {
                  Assembly.wires = Assembly.wires.filter(w => !(w.toId===from.partId && w.toPortIdx===from.portIdx));
                  Assembly.wires.push({ fromId:part.id, fromPortIdx:pi, toId:from.partId, toPortIdx:from.portIdx });
                  connected = true;
                }
              }
            }
          });
        }
        Assembly.wiringFrom = null; // always clear after click
      } else {
        // ── START wire or drag
        let handled = false;
        for (const part of [...Assembly.placed]) {
          if (handled) break;
          if (part.type === 'chassis') continue;
          const { sx, sy } = gridToScreen(part.gx, part.gy);
          if (Mouse.x >= sx && Mouse.x <= sx + partW(part)*GRID_SIZE &&
              Mouse.y >= sy && Mouse.y <= sy + partH(part)*GRID_SIZE) {
            // Check ports first
            let onPort = false;
            const ports = getRotatedPorts(part);
            ports.forEach((port, pi) => {
              if (onPort) return;
              const pp = portScreenPos(part, pi);
              if (pp && Math.hypot(Mouse.x-pp.x, Mouse.y-pp.y) < 10) {
                onPort = true;
                Assembly.wiringFrom = { partId: part.id, portIdx: pi, px: pp.x, py: pp.y, type: port.type };
              }
            });
            if (!onPort) {
              const savedWires = Assembly.wires.filter(w => w.fromId === part.id || w.toId === part.id);
              const origGx = part.gx, origGy = part.gy;
              removePlaced(part.id, true); // keepWires=true — wires survive the lift
              Assembly.dragging = { part, fromInventory: false, savedWires, origGx, origGy };
            }
            handled = true;
          }
        }
      }
    }

    // Tooltip with delay (no tooltips while wiring)
    const tip = document.getElementById('tooltip');
    let shown = false;
    if (!Assembly.wiringFrom) {
      let hovPart = null;
      for (const part of Assembly.placed) {
        const { sx, sy } = gridToScreen(part.gx, part.gy);
        if (Mouse.x >= sx && Mouse.x <= sx+partW(part)*GRID_SIZE &&
            Mouse.y >= sy && Mouse.y <= sy+partH(part)*GRID_SIZE) {
          hovPart = part; break;
        }
      }
      if (hovPart) {
        if (Assembly._tipTarget !== hovPart.id) {
          Assembly._tipTarget = hovPart.id;
          Assembly._tipTimer  = 0;
        }
        Assembly._tipTimer = (Assembly._tipTimer || 0) + 1;
        if (Assembly._tipTimer >= 22) { // ~0.35s delay
          const def = PART_DEFS[hovPart.type];
          const clampedHP = Math.min(hovPart.hp, def.maxHP);
          const hpPct = Math.round(clampedHP / def.maxHP * 100);
          const hpColor = hpPct > 70 ? '#44ff88' : hpPct > 35 ? '#ffcc00' : '#ff4444';
          const lvl = hovPart._level ? ` <span style="color:#ffdd44">★Ур.${hovPart._level}</span>` : '';
          const curse = hovPart._curse ? `<br><span style="color:#ff4444">↓ ${hovPart._curse.desc}</span>` : '';
          const bless = hovPart._bless ? `<br><span style="color:#ffdd44">↑ ${hovPart._bless.desc}</span>` : '';
          // Build roll effects list
          let rollHtml = '';
          if (hovPart._roll) {
            const r = hovPart._roll;
            const rl = [];
            if (r.damage    && r.damage    !== 1) { const p=Math.round((r.damage-1)*100);    if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Урон ${p>0?'+':''}${p}%</span>`); }
            if (r.fireRate  && r.fireRate  !== 1) { const p=Math.round((1-r.fireRate)*100);  if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Скорость ${p>0?'+':''}${p}%</span>`); }
            if (r.range     && r.range     !== 1) { const p=Math.round((r.range-1)*100);     if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Дальность ${p>0?'+':''}${p}%</span>`); }
            if (r.speedMult && r.speedMult !== 1) { const p=Math.round((r.speedMult-1)*100); if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Скорость ${p>0?'+':''}${p}%</span>`); }
            if (r.shieldHP  && r.shieldHP  !== 1) { const p=Math.round((r.shieldHP-1)*100);  if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Щит ${p>0?'+':''}${p}%</span>`); }
            if (r.sensorRange && r.sensorRange !== 1) { const p=Math.round((r.sensorRange-1)*100); if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Обнаружение ${p>0?'+':''}${p}%</span>`); }
            if (r.triggerRate && r.triggerRate !== 1) { const p=Math.round((1-r.triggerRate)*100); if(p) rl.push(`<span style="color:${p>0?'#44ff88':'#ff6644'}">→ Частота ${p>0?'+':''}${p}%</span>`); }
            if (r.pierce)   rl.push(`<span style="color:#ff8844">→ БРОНЕБОЙНЫЙ</span>`);
            if (r.burst)    rl.push(`<span style="color:#ffcc44">→ ОЧЕРЕДЬ×${r.burst}</span>`);
            if (r.regen)    rl.push(`<span style="color:#44ff88">→ САМОРЕМОНТ</span>`);
            if (r.reactive) rl.push(`<span style="color:#44ff88">→ РЕАКТИВНАЯ</span>`);
            if (rl.length) rollHtml = '<br>' + rl.join('<br>');
          }
          tip.style.display = 'block';
          tip.style.left = (Mouse.cx+14)+'px';
          tip.style.top  = (Mouse.cy-12)+'px';
          tip.innerHTML = `<b style="color:${def.border}">${def.label}</b>${lvl}<br>${def.desc}<br>
            <span style="color:#888">${def.mass}кг · ${def.energy}Э · ПЗ:<span style="color:${hpColor}">${clampedHP}/${def.maxHP}</span></span>${rollHtml}${curse}${bless}`;
          shown = true;
        }
      } else {
        Assembly._tipTarget = null;
        Assembly._tipTimer  = 0;
      }
    } else {
      Assembly._tipTarget = null;
      Assembly._tipTimer  = 0;
    }

    // Hint when wiring is active
    if (Assembly.wiringFrom) {
      ctx.fillStyle = '#ffff88'; ctx.font='11px "Courier New",monospace'; ctx.textAlign='center';
      ctx.fillText('Кликни на порт другой детали для подключения · ПКМ отмена', W/2, Assembly.gridOriginY - 4);
    }
    if (!shown) { tip.style.display = 'none'; }
  }

  drawPalette();
  drawDoneButton();
  drawRotateHint();
  drawVignette();
  drawScanlines();
}
</script>

<!-- PART 3: ARENA COMBAT -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ARENA STATE
// ═══════════════════════════════════════════════════════════
const Arena = {
  // Player robot
  robot: {
    x: W/2, y: H/2,
    vx: 0, vy: 0,
    angle: 0,           // facing direction (radians)
    hp: 0, maxHP: 0,
    shield: 0, maxShield: 0, shieldRegen: 0,
    speed: 0,           // base speed from movement part
    turnSpeed: 0,
    controlType: 'wheel',
    mass: 1,
    parts: [],          // active placed parts (from Assembly)
    wires: [],
    weapons: [],        // {partId, def, cooldown, angle}
    sensors: [],        // {partId, def, timer}
    knockbackImmune: false,
    radius: 22,
  },
  bullets: [],          // player bullets
  enemyBullets: [],     // enemy bullets
  enemies: [],
  pickups: [],          // scrap/part drops
  frame: 0,
  paused: false,
  arenaW: W,
  arenaH: H - 60,
  arenaY: 30,
  // Camera offset (for future large arenas — keep 0 for now)
  camX: 0, camY: 0,
  result: null,         // 'win' | 'lose'
};

// ── Build arena robot from Assembly
function startArena() {
  const R = Arena.robot;
  R.parts = JSON.parse(JSON.stringify(Assembly.placed)); // deep copy
  R.wires = JSON.parse(JSON.stringify(Assembly.wires));

  // Calculate stats from parts
  let hp = 0, mass = 0, speed = 3.0, turn = 0.055, energy = 4;
  let shield = 0, shieldRegen = 0;
  R.weapons = [];
  R.sensors = [];
  R.controlType = 'wheel'; // default
  R.knockbackImmune = false;

  for (const p of R.parts) {
    const def = PART_DEFS[p.type];
    hp     += def.maxHP;
    mass   += def.mass;
    energy += -(def.energy || 0);

    if (def.cat === 'movement') {
      R.controlType = def.controlType;
      speed *= (def.speedMult || 1);
      turn  *= (def.turnMult  || 1);
      if (def.controlType === 'tank') R.knockbackImmune = true;
    }
    if (def.cat === 'weapon') {
      R.weapons.push({ partId: p.id, def, cooldown: 0, angle: 0 });
    }
    if (def.cat === 'sensor') {
      R.sensors.push({ partId: p.id, def, timer: 0 });
    }
    if (def.shieldHP) {
      shield     += def.shieldHP;
      shieldRegen += def.shieldRegen || 0;
    }
  }

  // Mass penalty
  const massPenalty = Math.max(0.3, 1 - (mass - 4) * 0.025);
  // Energy overload penalty: consuming more than capacity → speed -30%
  const energyUsed = Assembly.usedEnergy || 0;
  const energyCap  = Assembly.totalEnergy || 4;
  const energyPenalty = (energyUsed > energyCap) ? 0.7 : 1.0;
  R.speed     = speed * massPenalty * energyPenalty;
  R.turnSpeed = turn;
  R.maxHP     = hp;
  R.hp        = hp;
  R.maxShield = shield;
  R.shield    = shield;
  R.shieldRegen = shieldRegen;
  R.mass      = mass;
  R.x = Arena.arenaW / 2;
  R.y = Arena.arenaH / 2 + Arena.arenaY;
  R.vx = 0; R.vy = 0;
  R.angle = -Math.PI/2; // face up

  // Compute robot visual radius from part count
  R.radius = 14 + Math.sqrt(R.parts.length) * 5;

  // Arena enemies for this round
  Arena.bullets = [];
  Arena.enemyBullets = [];
  Arena.pickups = [];
  Arena.frame = 0;
  Arena.result = null;
  Arena.enemies = spawnEnemiesForRound(Game.round);

  // Weapon wire links: which sensors trigger which weapons
  R._wireTriggers = buildWireTriggers(R.parts, R.wires, R.sensors, R.weapons);

  setState(STATE.ARENA);
  updateHUD();
}

// ── Wire trigger map: sensorPartId → [weaponIdx, ...]
function buildWireTriggers(parts, wires, sensors, weapons) {
  const map = {}; // sensorPartId → weaponIdx[]
  for (const wire of wires) {
    const fromPart = parts.find(p => p.id === wire.fromId);
    const toPart   = parts.find(p => p.id === wire.toId);
    if (!fromPart || !toPart) continue;
    const fromDef = PART_DEFS[fromPart.type];
    const toDef   = PART_DEFS[toPart.type];
    if (fromDef.cat === 'sensor' && toDef.cat === 'weapon') {
      if (!map[fromPart.id]) map[fromPart.id] = [];
      const wi = weapons.findIndex(w => w.partId === toPart.id);
      if (wi >= 0 && !map[fromPart.id].includes(wi)) map[fromPart.id].push(wi);
    }
  }
  return map;
}

// ═══════════════════════════════════════════════════════════
//  BULLET SYSTEM
// ═══════════════════════════════════════════════════════════
function spawnBullet(x, y, angle, def, friendly=true) {
  const arr = friendly ? Arena.bullets : Arena.enemyBullets;
  arr.push({
    x, y,
    vx: Math.cos(angle) * def.bulletSpeed,
    vy: Math.sin(angle) * def.bulletSpeed,
    damage: def.damage,
    life: Math.ceil(def.range / def.bulletSpeed),
    isLaser: def.isLaser || false,
    r: def.isLaser ? 3 : 4,
    color: friendly ? '#ffcc44' : '#ff4444',
  });
}

function updateBullets() {
  // Player bullets
  for (let i = Arena.bullets.length-1; i >= 0; i--) {
    const b = Arena.bullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if (b.life <= 0 || isOutOfArena(b.x, b.y)) { Arena.bullets.splice(i,1); continue; }

    // Hit enemies
    let hit = false;
    for (let j = Arena.enemies.length-1; j >= 0; j--) {
      const e = Arena.enemies[j];
      if (Math.hypot(b.x-e.x, b.y-e.y) < e.radius + b.r) {
        damageEnemy(j, b.damage, b.vx, b.vy);
        spawnParticles(b.x, b.y, '#ff8844', 5, 2);
        Arena.bullets.splice(i,1);
        hit = true; break;
      }
    }
  }

  // Enemy bullets
  for (let i = Arena.enemyBullets.length-1; i >= 0; i--) {
    const b = Arena.enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if (b.life <= 0 || isOutOfArena(b.x, b.y)) { Arena.enemyBullets.splice(i,1); continue; }

    const R = Arena.robot;
    if (Math.hypot(b.x-R.x, b.y-R.y) < R.radius + b.r) {
      damageRobot(b.damage);
      spawnParticles(b.x, b.y, '#ff2222', 6, 2);
      Arena.enemyBullets.splice(i,1);
    }
  }
}

function isOutOfArena(x, y) {
  return x < 0 || x > Arena.arenaW || y < Arena.arenaY || y > Arena.arenaH + Arena.arenaY;
}

function damageRobot(dmg) {
  const R = Arena.robot;
  if (R.shield > 0) {
    R.shield = Math.max(0, R.shield - dmg);
    triggerFlash('#4488ff', 5);
  } else {
    R.hp = Math.max(0, R.hp - dmg);
    triggerFlash('#ff3333', 8);
    if (R.hp <= 0) Arena.result = 'lose';
  }
  updateHUD();
}

function damageEnemy(idx, dmg, bvx=0, bvy=0) {
  const e = Arena.enemies[idx];
  e.hp -= dmg;
  // Knockback from bullet velocity
  const bspd = Math.hypot(bvx, bvy);
  if (bspd > 0) {
    const kb = (dmg / 20) * 2.5;
    e.vx += (bvx / bspd) * kb;
    e.vy += (bvy / bspd) * kb;
  }
  if (e.hp <= 0) killEnemy(idx);
}

function killEnemy(idx) {
  const e = Arena.enemies[idx];
  spawnParticles(e.x, e.y, e.color, 20, 4, 50);
  spawnParticles(e.x, e.y, '#ffcc44', 8, 2, 30);
  // Drop loot
  if (Math.random() < 0.6) {
    Arena.pickups.push({ x: e.x, y: e.y, type: 'scrap', value: 3+Math.floor(Math.random()*5) });
  }
  if (e.dropPart && Math.random() < 0.4) {
    Arena.pickups.push({ x: e.x+20, y: e.y, type: 'part', partType: e.dropPart });
  }
  Arena.enemies.splice(idx, 1);
  triggerFlash('#ffcc44', 4);
}

// ═══════════════════════════════════════════════════════════
//  ROBOT MOVEMENT
// ═══════════════════════════════════════════════════════════
function updateRobotMovement() {
  const R = Arena.robot;
  const up    = Keys['ArrowUp']    || Keys['KeyW'];
  const down  = Keys['ArrowDown']  || Keys['KeyS'];
  const left  = Keys['ArrowLeft']  || Keys['KeyA'];
  const right = Keys['ArrowRight'] || Keys['KeyD'];

  const ct = R.controlType;

  if (ct === 'wheel' || ct === 'tank') {
    // Tank/wheel: rotate then forward
    if (left)  R.angle -= R.turnSpeed;
    if (right) R.angle += R.turnSpeed;
    if (up)    { R.vx += Math.cos(R.angle) * 0.4; R.vy += Math.sin(R.angle) * 0.4; }
    if (down)  { R.vx -= Math.cos(R.angle) * 0.25; R.vy -= Math.sin(R.angle) * 0.25; }
    R.vx *= 0.82; R.vy *= 0.82;
  } else if (ct === '8way') {
    // Spider: 8-directional, aim with mouse
    const tx = Mouse.x - R.x, ty = Mouse.y - R.y;
    R.angle = Math.atan2(ty, tx);
    if (up)    R.vy -= 0.5;
    if (down)  R.vy += 0.5;
    if (left)  R.vx -= 0.5;
    if (right) R.vx += 0.5;
    R.vx *= 0.78; R.vy *= 0.78;
  } else if (ct === 'jet') {
    // Jets: momentum, rotate to aim mouse
    const tx = Mouse.x - R.x, ty = Mouse.y - R.y;
    R.angle = Math.atan2(ty, tx);
    if (up)    { R.vx += Math.cos(R.angle) * 0.7; R.vy += Math.sin(R.angle) * 0.7; }
    if (down)  { R.vx *= 0.92; R.vy *= 0.92; }
    if (left)  { R.vx -= Math.cos(R.angle+Math.PI/2)*0.3; R.vy -= Math.sin(R.angle+Math.PI/2)*0.3; }
    if (right) { R.vx += Math.cos(R.angle+Math.PI/2)*0.3; R.vy += Math.sin(R.angle+Math.PI/2)*0.3; }
    R.vx *= 0.96; R.vy *= 0.96;
  } else {
    // Fallback: wheel
    if (left)  R.angle -= R.turnSpeed;
    if (right) R.angle += R.turnSpeed;
    if (up)    { R.vx += Math.cos(R.angle) * 0.4; R.vy += Math.sin(R.angle) * 0.4; }
    R.vx *= 0.82; R.vy *= 0.82;
  }

  // Speed cap
  const spd = Math.hypot(R.vx, R.vy);
  if (spd > R.speed) { R.vx *= R.speed/spd; R.vy *= R.speed/spd; }

  R.x += R.vx; R.y += R.vy;

  // Arena bounds
  const ay = Arena.arenaY, ah = Arena.arenaH;
  R.x = Math.max(R.radius, Math.min(Arena.arenaW - R.radius, R.x));
  R.y = Math.max(ay + R.radius, Math.min(ay + ah - R.radius, R.y));

  // Shield regen
  if (R.maxShield > 0) {
    R.shield = Math.min(R.maxShield, R.shield + R.shieldRegen * 0.016);
  }
}

// ═══════════════════════════════════════════════════════════
//  WEAPON SYSTEM (sensors + wires + firing)
// ═══════════════════════════════════════════════════════════
function updateWeapons() {
  const R = Arena.robot;
  const triggers = R._wireTriggers || {};

  // SPACE = ручной огонь по всем оружиям (всегда работает)
  if (Keys['Space_pressed'] || Keys['Space']) {
    for (let wi = 0; wi < R.weapons.length; wi++) fireWeapon(wi, R);
    Keys['Space_pressed'] = false;
  }

  // Автоматика сенсоров (дополнительно к ручному огню)
  for (const sensor of R.sensors) {
    const def = sensor.def;
    sensor.timer++;

    // Автосенсор: враг в зоне обнаружения
    if (def.sensorRange) {
      const inRange = Arena.enemies.some(e => Math.hypot(e.x-R.x, e.y-R.y) < def.sensorRange);
      if (inRange && sensor.timer >= (def.triggerRate || 30)) {
        sensor.timer = 0;
        fireSensorWires(sensor, triggers, R);
      }
    }
    // Таймер: импульс по расписанию
    if (def.timerRate && sensor.timer >= def.timerRate) {
      sensor.timer = 0;
      fireSensorWires(sensor, triggers, R);
    }
  }

  // Cooldown weapons
  for (const w of R.weapons) { if (w.cooldown > 0) w.cooldown--; }
}

function fireSensorWires(sensor, triggers, R) {
  const wis = triggers[sensor.partId];
  if (!wis || wis.length === 0) return;
  for (const wi of wis) fireWeapon(wi, R);
}

function fireWeapon(wi, R) {
  const w = R.weapons[wi];
  if (!w || w.cooldown > 0) return;
  w.cooldown = w.def.fireRate;

  // Aim at nearest enemy
  let angle = R.angle;
  let nearest = null, nearDist = Infinity;
  for (const e of Arena.enemies) {
    const d = Math.hypot(e.x-R.x, e.y-R.y);
    if (d < nearDist) { nearDist = d; nearest = e; }
  }
  if (nearest) angle = Math.atan2(nearest.y - R.y, nearest.x - R.x);

  // Spawn bullet: offset capped so it never passes through a close enemy
  const nearDist2 = nearest ? Math.hypot(nearest.x-R.x, nearest.y-R.y) : 999;
  const spawnOffset = Math.min(R.radius + 6, nearDist2 * 0.4 + 4);
  const bx = R.x + Math.cos(angle) * spawnOffset;
  const by = R.y + Math.sin(angle) * spawnOffset;
  spawnBullet(bx, by, angle, w.def, true);
  spawnParticles(bx, by, '#ffcc44', 3, 2, 10);
}

// ═══════════════════════════════════════════════════════════
//  PICKUPS
// ═══════════════════════════════════════════════════════════
function updatePickups() {
  const R = Arena.robot;
  for (let i = Arena.pickups.length-1; i >= 0; i--) {
    const p = Arena.pickups[i];
    if (Math.hypot(p.x-R.x, p.y-R.y) < R.radius + 12) {
      if (p.type === 'scrap') {
        Game.scrap += p.value;
        spawnParticles(p.x, p.y, '#44ff88', 5, 2);
      } else if (p.type === 'part') {
        // Add to loot pool for after combat
        Arena._droppedParts = Arena._droppedParts || [];
        Arena._droppedParts.push(createPart(p.partType));
        spawnParticles(p.x, p.y, '#ffcc44', 8, 3);
      }
      Arena.pickups.splice(i,1);
      updateHUD();
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER ROBOT
// ═══════════════════════════════════════════════════════════
function drawRobot() {
  const R = Arena.robot;
  ctx.save();
  ctx.translate(R.x, R.y);
  ctx.rotate(R.angle + Math.PI/2);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3, 3, R.radius, R.radius*0.7, 0, 0, Math.PI*2);
  ctx.fill();

  // Body — color by control type
  const bodyColors = { wheel:'#2a4a2a', tank:'#1a2a3a', '8way':'#3a1a3a', jet:'#3a2a1a' };
  const borderColors= { wheel:'#4eff91', tank:'#4488ff', '8way':'#cc44cc', jet:'#ff6644' };
  const bc = bodyColors[R.controlType] || '#2a4a2a';
  const bb = borderColors[R.controlType] || '#4eff91';

  // Hex body
  ctx.fillStyle = bc;
  ctx.beginPath();
  for (let i=0; i<6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/6;
    const px = Math.cos(a)*R.radius*0.9, py = Math.sin(a)*R.radius*0.9;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = bb; ctx.lineWidth = 2;
  ctx.stroke();

  // Cannon barrel (points "up" in local space = forward)
  ctx.fillStyle = '#888';
  ctx.fillRect(-4, -R.radius-8, 8, 14);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
  ctx.strokeRect(-4, -R.radius-8, 8, 14);

  // Shield ring
  if (R.maxShield > 0 && R.shield > 0) {
    ctx.save();
    ctx.globalAlpha = (R.shield / R.maxShield) * 0.5;
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, R.radius + 5, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  // HP bar above robot
  const barW = R.radius * 2;
  const bx2 = R.x - barW/2, by2 = R.y - R.radius - 14;
  fillRect(bx2, by2, barW, 5, '#111');
  const hpFrac = R.hp / R.maxHP;
  fillRect(bx2, by2, barW * hpFrac, 5,
    hpFrac > 0.5 ? '#44ff88' : hpFrac > 0.25 ? '#ffcc00' : '#ff3333');
  if (R.maxShield > 0) {
    fillRect(bx2, by2-6, barW, 4, '#112244');
    fillRect(bx2, by2-6, barW*(R.shield/R.maxShield), 4, '#4488ff');
  }
}

// ── Pickups render
function drawPickups() {
  for (const p of Arena.pickups) {
    const bob = Math.sin(Arena.frame * 0.08) * 2;
    if (p.type === 'scrap') {
      ctx.fillStyle = '#44ff88';
      ctx.fillRect(p.x-5, p.y-5+bob, 10, 10);
      ctx.strokeStyle = '#22aa44'; ctx.lineWidth = 1;
      ctx.strokeRect(p.x-5, p.y-5+bob, 10, 10);
      ctx.fillStyle = '#000'; ctx.font = '9px monospace'; ctx.textAlign='center';
      ctx.fillText('S', p.x, p.y+4+bob);
    } else {
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(p.x, p.y+bob, 7, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#000'; ctx.font = '9px monospace'; ctx.textAlign='center';
      ctx.fillText('P', p.x, p.y+4+bob);
    }
  }
}

// ── Bullets render
function drawBullets() {
  for (const b of Arena.bullets) {
    ctx.fillStyle = b.isLaser ? '#88ffff' : '#ffcc44';
    ctx.shadowColor = b.isLaser ? '#00ffff' : '#ff8800';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  for (const b of Arena.enemyBullets) {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  const R = Arena.robot;
  document.getElementById('hud-round').textContent = Game.round;
  document.getElementById('hud-hp').textContent = Math.ceil(R.hp);
  document.getElementById('hud-energy').textContent = R.mass || 0;
  document.getElementById('hud-energy-max').textContent = R.maxHP || 0;
  document.getElementById('hud-scrap').textContent = Game.scrap;
}

// ═══════════════════════════════════════════════════════════
//  ARENA BACKGROUND
// ═══════════════════════════════════════════════════════════
function drawArenaBackground() {
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  // Floor
  fillRect(0, ay, aw, ah, '#07100a');

  // Arena grid
  ctx.strokeStyle = '#0c1a0c'; ctx.lineWidth = 1;
  for (let x=0; x<aw; x+=50) { ctx.beginPath(); ctx.moveTo(x,ay); ctx.lineTo(x,ay+ah); ctx.stroke(); }
  for (let y=ay; y<ay+ah; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(aw,y); ctx.stroke(); }

  // Arena border
  ctx.strokeStyle = '#1a3a1a'; ctx.lineWidth = 3;
  ctx.strokeRect(2, ay+2, aw-4, ah-4);

  // Danger zone (corners)
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(0, ay, 60, 60);
  ctx.fillRect(aw-60, ay, 60, 60);
  ctx.fillRect(0, ay+ah-60, 60, 60);
  ctx.fillRect(aw-60, ay+ah-60, 60, 60);
  ctx.restore();

  // Round indicator
  ctx.fillStyle = '#1a3a1a';
  ctx.font = '11px "Courier New",monospace'; ctx.textAlign = 'right';
  ctx.fillText(`РАУНД ${Game.round} / ${Game.maxRounds}`, aw-8, ay+18);

  // Enemy count
  ctx.fillStyle = Arena.enemies.length > 0 ? C.danger : C.accent;
  ctx.textAlign = 'left';
  ctx.fillText(`ВРАГОВ: ${Arena.enemies.length}`, 8, ay+18);
}

// ═══════════════════════════════════════════════════════════
//  MAIN ARENA UPDATE LOOP
// ═══════════════════════════════════════════════════════════
function updateArena() {
  Arena.frame++;

  fillRect(0, 0, W, H, '#050a05');
  drawArenaBackground();

  if (!Arena.result) {
    updateRobotMovement();
    updateWeapons();
    updateEnemies();
    updateBullets();
    updatePickups();

    // Check win
    if (Arena.enemies.length === 0 && !Arena.result) {
      Arena.result = 'win';
    }
  }

  // Draw scene
  drawPickups();
  drawBullets();
  drawEnemies();
  drawRobot();

  updateHUD();

  // Result overlay
  if (Arena.result) {
    drawArenaResult();
  }

  drawVignette();
  drawScanlines();
}

function drawArenaResult() {
  const win = Arena.result === 'win';
  ctx.save();
  ctx.globalAlpha = 0.7;
  fillRect(0, 0, W, H, '#000');
  ctx.restore();

  const color = win ? C.accent : C.danger;
  ctx.fillStyle = color;
  ctx.font = 'bold 40px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.fillText(win ? 'РАУНД ПРОЙДЕН' : 'УНИЧТОЖЕН', W/2, H/2 - 30);
  ctx.shadowBlur = 0;

  ctx.fillStyle = C.textDim; ctx.font = '14px "Courier New",monospace';
  if (win) ctx.fillText('Металлолом собран. Выбери трофеи.', W/2, H/2+10);
  else     ctx.fillText('Твоё шасси разнесено в труху.', W/2, H/2+10);

  const btnW = 220, btnH = 38;
  const bx = W/2 - 110, by = H/2+40;
  const hov = isHover(bx, by, btnW, btnH);
  drawButton(win ? '[ ЗАБРАТЬ ТРОФЕИ ]' : '[ ИГРА ОКОНЧЕНА ]', bx, by, btnW, btnH, hov, !win);

  if (isClick(bx, by, btnW, btnH)) {
    ctx.shadowBlur = 0;
    if (win) {
      prepLoot();
      setState(STATE.LOOT);
    } else {
      setState(STATE.GAMEOVER);
    }
  }
}
</script>

<!-- PART 4: ENEMIES + LOOT + ROGUELIKE -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ENEMY DEFINITIONS
// ═══════════════════════════════════════════════════════════
const ENEMY_DEFS = {
  scout: {
    label: 'РАЗВЕДЧИК', color: '#cc4422', borderColor: '#ff6644',
    radius: 14, speed: 1.8, hp: 40, damage: 8,
    fireRate: 70, bulletSpeed: 5, range: 260, shootRange: 220,
    scrapDrop: 5, dropPart: 'gun_basic',
    ai: 'chase',
    desc: 'Быстрый, мало HP. Летит прямо на тебя.'
  },
  gunner: {
    label: 'СТРЕЛОК', color: '#aa3366', borderColor: '#ff55aa',
    radius: 18, speed: 1.3, hp: 80, damage: 14,
    fireRate: 50, bulletSpeed: 4.5, range: 300, shootRange: 280,
    scrapDrop: 8, dropPart: 'sensor_auto',
    ai: 'strafe',
    desc: 'Держит дистанцию, стреляет с флангов.'
  },
  tank_enemy: {
    label: 'ТАНК', color: '#223366', borderColor: '#4488ff',
    radius: 26, speed: 0.9, hp: 180, damage: 28,
    fireRate: 100, bulletSpeed: 6.5, range: 380, shootRange: 350,
    scrapDrop: 15, dropPart: 'armor_heavy',
    ai: 'charge',
    desc: 'Медленный, бронированный, опустошительный.'
  },
  swarm: {
    label: 'РОЙ', color: '#446622', borderColor: '#88cc44',
    radius: 9, speed: 2.2, hp: 20, damage: 5,
    fireRate: 120, bulletSpeed: 4, range: 200, shootRange: 140,
    scrapDrop: 2, dropPart: null,
    ai: 'swarm',
    desc: 'Крошечные, быстрые. Опасны толпой.'
  },
  sniper: {
    label: 'СНАЙПЕР', color: '#333322', borderColor: '#cccc44',
    radius: 15, speed: 1.0, hp: 55, damage: 35,
    fireRate: 140, bulletSpeed: 9, range: 600, shootRange: 500,
    scrapDrop: 10, dropPart: 'laser',
    ai: 'sniper',
    desc: 'Держится далеко, редкие смертоносные выстрелы.'
  },
  bomber: {
    label: 'БОМБАРДИР', color: '#553311', borderColor: '#ff8800',
    radius: 20, speed: 1.8, hp: 100, damage: 45,
    fireRate: 180, bulletSpeed: 3.5, range: 220, shootRange: 200,
    scrapDrop: 12, dropPart: 'shield_gen',
    ai: 'kamikaze',
    desc: 'Врывается в упор и выстреливает очередями.'
  },
};

// ── Wave configs per round
const ROUND_WAVES = [
  // Round 1 — Tutorial
  [ {type:'scout', n:2} ],
  // Round 2
  [ {type:'scout', n:2}, {type:'gunner', n:1} ],
  // Round 3
  [ {type:'gunner', n:2}, {type:'swarm', n:4} ],
  // Round 4
  [ {type:'tank_enemy', n:1}, {type:'scout', n:2} ],
  // Round 5
  [ {type:'sniper', n:2}, {type:'swarm', n:5} ],
  // Round 6
  [ {type:'bomber', n:2}, {type:'gunner', n:2} ],
  // Round 7 — Boss wave
  [ {type:'tank_enemy', n:2}, {type:'sniper', n:2}, {type:'bomber', n:1} ],
];

function spawnEnemiesForRound(round) {
  const wave = ROUND_WAVES[Math.min(round-1, ROUND_WAVES.length-1)];
  const enemies = [];
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  // HP scale with round
  const scale = 1 + (round-1) * 0.18;

  for (const group of wave) {
    const def = ENEMY_DEFS[group.type];
    for (let i = 0; i < group.n; i++) {
      // Spawn on edges, away from player
      let ex, ey;
      const edge = Math.floor(Math.random()*4);
      if (edge===0) { ex=30+Math.random()*(aw-60); ey=ay+30; }
      else if (edge===1) { ex=aw-30; ey=ay+30+Math.random()*(ah-60); }
      else if (edge===2) { ex=30+Math.random()*(aw-60); ey=ay+ah-30; }
      else { ex=30; ey=ay+30+Math.random()*(ah-60); }

      enemies.push({
        type: group.type,
        x: ex, y: ey,
        vx: 0, vy: 0,
        angle: 0,
        hp: Math.ceil(def.hp * scale),
        maxHP: Math.ceil(def.hp * scale),
        radius: def.radius,
        color: def.color,
        borderColor: def.borderColor,
        speed: def.speed,
        damage: def.damage,
        fireRate: def.fireRate,
        bulletSpeed: def.bulletSpeed,
        range: def.range,
        shootRange: def.shootRange,
        ai: def.ai,
        fireCooldown: Math.floor(Math.random()*def.fireRate),
        strafeDir: Math.random()<0.5 ? 1 : -1,
        strafeSwitchTimer: 0,
        dropPart: def.dropPart,
        label: def.label,
      });
    }
  }
  return enemies;
}

// ═══════════════════════════════════════════════════════════
//  ENEMY AI
// ═══════════════════════════════════════════════════════════
function updateEnemies() {
  const R = Arena.robot;
  const ay = Arena.arenaY, ah = Arena.arenaH, aw = Arena.arenaW;

  for (const e of Arena.enemies) {
    const dx = R.x - e.x, dy = R.y - e.y;
    const dist = Math.hypot(dx, dy);
    const toPlayer = Math.atan2(dy, dx);
    e.angle = toPlayer;

    // ── AI behaviour
    if (e.ai === 'chase') {
      // Rush straight at player
      e.vx += Math.cos(toPlayer) * 0.25;
      e.vy += Math.sin(toPlayer) * 0.25;
    } else if (e.ai === 'strafe') {
      // Keep medium distance, strafe sideways
      const ideal = 220;
      e.strafeSwitchTimer++;
      if (e.strafeSwitchTimer > 120+Math.random()*80) {
        e.strafeDir *= -1; e.strafeSwitchTimer=0;
      }
      const perpAngle = toPlayer + Math.PI/2 * e.strafeDir;
      if (dist > ideal+30) {
        e.vx += Math.cos(toPlayer)*0.15;
        e.vy += Math.sin(toPlayer)*0.15;
      } else if (dist < ideal-30) {
        e.vx -= Math.cos(toPlayer)*0.15;
        e.vy -= Math.sin(toPlayer)*0.15;
      }
      e.vx += Math.cos(perpAngle)*0.2;
      e.vy += Math.sin(perpAngle)*0.2;
    } else if (e.ai === 'charge') {
      // Slow approach, unstoppable
      if (dist > 80) {
        e.vx += Math.cos(toPlayer)*0.12;
        e.vy += Math.sin(toPlayer)*0.12;
      }
    } else if (e.ai === 'swarm') {
      // Fast rush, slight scatter
      const scatter = (Math.random()-0.5)*0.8;
      e.vx += Math.cos(toPlayer+scatter)*0.35;
      e.vy += Math.sin(toPlayer+scatter)*0.35;
    } else if (e.ai === 'sniper') {
      // Stay far, circle slowly
      const ideal = 380;
      e.strafeSwitchTimer++;
      if (e.strafeSwitchTimer > 200) { e.strafeDir*=-1; e.strafeSwitchTimer=0; }
      const perpAngle = toPlayer + Math.PI/2 * e.strafeDir;
      if (dist < ideal-40) {
        e.vx -= Math.cos(toPlayer)*0.1;
        e.vy -= Math.sin(toPlayer)*0.1;
      } else if (dist > ideal+40) {
        e.vx += Math.cos(toPlayer)*0.08;
        e.vy += Math.sin(toPlayer)*0.08;
      }
      e.vx += Math.cos(perpAngle)*0.12;
      e.vy += Math.sin(perpAngle)*0.12;
    } else if (e.ai === 'kamikaze') {
      // Rush in bursts, retreat after shooting
      if (dist > 120) {
        e.vx += Math.cos(toPlayer)*0.22;
        e.vy += Math.sin(toPlayer)*0.22;
      } else {
        e.vx -= Math.cos(toPlayer)*0.1;
        e.vy -= Math.sin(toPlayer)*0.1;
      }
    }

    // Speed cap
    const spd = Math.hypot(e.vx, e.vy);
    if (spd > e.speed) { e.vx *= e.speed/spd; e.vy *= e.speed/spd; }
    e.vx *= 0.86; e.vy *= 0.86;

    e.x += e.vx; e.y += e.vy;
    e.x = Math.max(e.radius, Math.min(aw-e.radius, e.x));
    e.y = Math.max(ay+e.radius, Math.min(ay+ah-e.radius, e.y));

    // ── Robot-enemy hard separation (enemies can't enter robot)
    const sepDist = e.radius + R.radius + 4;
    if (dist < sepDist && dist > 0.1) {
      const overlap = sepDist - dist;
      const nx = dx / dist, ny = dy / dist;
      // Push enemy away from robot
      e.x -= nx * overlap * 0.7;
      e.y -= ny * overlap * 0.7;
      e.vx -= nx * 0.5;
      e.vy -= ny * 0.5;
      // Push robot away a little (unless tank)
      if (!R.knockbackImmune) {
        R.x += nx * overlap * 0.3;
        R.y += ny * overlap * 0.3;
      }
    }

    // Enemy-enemy separation
    for (const o of Arena.enemies) {
      if (o===e) continue;
      const ddx=e.x-o.x, ddy=e.y-o.y, dd=Math.hypot(ddx,ddy);
      if (dd < e.radius+o.radius+2 && dd>0.1) {
        const push = (e.radius+o.radius+2-dd)*0.35/dd;
        e.x += ddx*push; e.y += ddy*push;
      }
    }

    // Shooting
    e.fireCooldown--;
    if (e.fireCooldown <= 0 && dist < e.shootRange) {
      e.fireCooldown = e.fireRate + Math.floor(Math.random()*30-15);
      const bx = e.x + Math.cos(toPlayer)*(e.radius+6);
      const by = e.y + Math.sin(toPlayer)*(e.radius+6);
      // Add slight spread
      const spread = e.ai==='swarm' ? 0.3 : 0.08;
      const shootAngle = toPlayer + (Math.random()-0.5)*spread;
      spawnBullet(bx, by, shootAngle,
        { bulletSpeed: e.bulletSpeed, damage: e.damage, range: e.range }, false);
    }

    // Melee damage on contact
    if (dist < e.radius + R.radius + 2) {
      if (!e._meleeCooldown || e._meleeCooldown <= 0) {
        damageRobot(e.damage * 0.5);
        e._meleeCooldown = 40;
        if (!R.knockbackImmune) {
          R.vx -= Math.cos(toPlayer)*4;
          R.vy -= Math.sin(toPlayer)*4;
        }
      }
    }
    if (e._meleeCooldown > 0) e._meleeCooldown--;
  }
}

// ── Enemy render
function drawEnemies() {
  for (const e of Arena.enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle + Math.PI/2);

    // Body
    ctx.fillStyle = e.color;
    ctx.beginPath();
    const sides = e.ai==='swarm' ? 3 : (e.ai==='tank_enemy'||e.ai==='charge') ? 6 : 4;
    for (let i=0; i<sides; i++) {
      const a = (i/sides)*Math.PI*2 - Math.PI/sides;
      const px = Math.cos(a)*e.radius, py = Math.sin(a)*e.radius;
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = e.borderColor; ctx.lineWidth = 2; ctx.stroke();

    // Barrel
    ctx.fillStyle = '#555';
    ctx.fillRect(-3, -e.radius-6, 6, 10);

    ctx.restore();

    // HP bar
    const barW = e.radius*2;
    const bx2 = e.x - barW/2, by2 = e.y - e.radius - 10;
    fillRect(bx2, by2, barW, 4, '#111');
    fillRect(bx2, by2, barW*(e.hp/e.maxHP), 4, e.hp/e.maxHP > 0.5 ? '#ff6644' : '#ff2222');

    // Label
    ctx.fillStyle = e.borderColor; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText(e.label, e.x, by2-2);
  }
}

// ═══════════════════════════════════════════════════════════
//  LOOT SCREEN
// ═══════════════════════════════════════════════════════════
const Loot = {
  offered: [],    // parts offered
  selected: [],   // selected part ids
  maxPick: 3,
};

// Part rarity table by round
const LOOT_TABLES = [
  ['gun_basic','wheel','armor_light','sensor_auto','sensor_manual'],
  ['gun_rapid','tracks','armor_light','sensor_auto','battery','gun_basic'],
  ['gun_heavy','legs','armor_heavy','shield_gen','sensor_manual','gun_rapid','timer_fast'],
  ['laser','jets','armor_heavy','shield_gen','gun_heavy','tracks','battery'],
  ['laser','jets','legs','shield_gen','gun_heavy','timer_fast','battery'],
  ['laser','gun_heavy','shield_gen','legs','jets','armor_heavy'],
  ['laser','gun_heavy','shield_gen','jets','legs','gun_rapid','armor_heavy'],
];

function prepLoot() {
  Arena._droppedParts = Arena._droppedParts || [];
  Game.round++; // advance round AFTER combat

  const table = LOOT_TABLES[Math.min(Game.round-2, LOOT_TABLES.length-1)];

  // 5-8 random parts from loot table + any dropped in arena
  const pool = [...Arena._droppedParts];
  const n = 5 + Math.floor(Math.random()*4);
  for (let i=0; i<n; i++) {
    const t = table[Math.floor(Math.random()*table.length)];
    pool.push(createPart(t));
  }

  // Shuffle, limit to 8
  for (let i=pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  Loot.offered = pool.slice(0,8);
  Loot.selected = [];
  Arena._droppedParts = [];

  // NOTE: Parts keep their worn HP between rounds — repair via shop or encounter.
  // (HP is NOT reset here — wear persists as intended)
}

function updateLoot() {
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  // Title
  ctx.fillStyle = C.accent; ctx.font='bold 20px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('ТРОФЕИ ВОЙНЫ', W/2, 28);
  ctx.fillStyle = C.textDim; ctx.font='12px "Courier New",monospace';
  ctx.fillText(`Выбери до ${Loot.maxPick} деталей · остальное уйдёт в металлолом`, W/2, 46);
  ctx.fillStyle = C.warn;
  ctx.fillText(`МЕТАЛЛОЛОМ: ${Game.scrap}`, W/2, 62);

  // Part cards — fill the screen
  const cols = 4;
  const pad = 12;
  const cardW = Math.floor((W - pad*2 - (cols-1)*10) / cols); // ~214px
  const startX = pad;
  const startY = 72;
  const availH = H - startY - 80; // leave room for counter+button
  const rows = Math.ceil(Loot.offered.length / cols);
  const cardH = Math.floor((availH - (rows-1)*10) / rows);

  const CAT_RU2 = {chassis:'ШАССИ',weapon:'ОРУЖИЕ',sensor:'СЕНСОР',movement:'ДВИЖЕНИЕ',armor:'БРОНЯ',utility:'УТИЛИТА'};

  Loot.offered.forEach((part, i) => {
    if (!part) return;
    const def = PART_DEFS[part.type];
    const col = i % cols, row = Math.floor(i / cols);
    const cx2 = startX + col*(cardW+10);
    const cy2 = startY + row*(cardH+10);

    const selected = Loot.selected.includes(part.id);
    const hov = isHover(cx2, cy2, cardW, cardH);

    // Card background
    fillRect(cx2, cy2, cardW, cardH, selected ? '#0f2a0f' : (hov ? '#0d1f0d' : '#090f09'));
    strokeRect(cx2, cy2, cardW, cardH,
      selected ? C.accent : (hov ? '#2a4a2a' : C.border), selected ? 2 : 1);

    // Selected checkmark
    if (selected) {
      ctx.fillStyle = C.accent; ctx.font='18px monospace'; ctx.textAlign='right';
      ctx.fillText('✓', cx2+cardW-8, cy2+22);
    }

    // Icon (larger)
    ctx.font=`34px serif`; ctx.textAlign='left';
    ctx.fillText(def.icon, cx2+10, cy2+42);

    // Name + cat
    ctx.fillStyle = def.border; ctx.font='bold 13px "Courier New",monospace';
    ctx.textAlign='left';
    ctx.fillText(def.label, cx2+52, cy2+22);
    ctx.fillStyle = C.textDim; ctx.font='10px "Courier New",monospace';
    ctx.fillText(CAT_RU2[def.cat]||def.cat.toUpperCase(), cx2+52, cy2+36);

    // Stats row
    const statY = cy2+56;
    ctx.fillStyle = C.text; ctx.font='11px "Courier New",monospace';
    ctx.fillText(`${def.w}×${def.h}  ${def.mass}кг  ${def.energy>0?'-':'+'}${Math.abs(def.energy)}Э  ПЗ:${def.maxHP}`, cx2+10, statY);

    // HP bar of part (if worn)
    if (part.hp < def.maxHP) {
      const hpFrac = Math.min(1, Math.max(0, part.hp / def.maxHP));
      const barW = cardW - 20;
      fillRect(cx2+10, statY+6, barW, 4, '#111');
      fillRect(cx2+10, statY+6, barW*hpFrac, 4, hpFrac>0.5?'#44ff88':hpFrac>0.25?'#ffcc00':'#ff3333');
    }

    // Desc (word wrap, more room now)
    ctx.fillStyle = C.textDim; ctx.font='11px "Courier New",monospace';
    const descWords = def.desc.split(' ');
    let line='', ly=cy2+76;
    const maxDescW = cardW - 20;
    for (const w of descWords) {
      const test = line ? line+' '+w : w;
      if (ctx.measureText(test).width > maxDescW && line) { ctx.fillText(line, cx2+10, ly); line=w; ly+=14; }
      else line=test;
    }
    ctx.fillText(line, cx2+10, ly);

    // Toggle selection
    if (isClick(cx2, cy2, cardW, cardH)) {
      if (selected) {
        Loot.selected = Loot.selected.filter(id => id !== part.id);
      } else if (Loot.selected.length < Loot.maxPick) {
        Loot.selected.push(part.id);
      }
    }
  });

  // Counter + scrap
  const unselected = Loot.offered.filter(p => p && !Loot.selected.includes(p.id));
  const scrapVal = unselected.reduce((sum, p) => sum + PART_DEFS[p.type].mass*2, 0);
  ctx.fillStyle = C.text; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText(`Выбрано: ${Loot.selected.length} / ${Loot.maxPick}   ·   Отброшено → +${scrapVal} лома`, W/2, H-52);

  // Confirm button
  const bx = W/2-130, by = H-36;
  const hov = isHover(bx, by, 260, 30);
  const nextLabel = Game.round > Game.maxRounds ? '[ ФИНАЛЬНАЯ ПОБЕДА ]' : `[ ПРОДОЛЖИТЬ → РАУНД ${Game.round} ]`;
  drawButton(nextLabel, bx, by, 260, 30, hov);

  if (isClick(bx, by, 220, 28)) {
    // Add selected parts to inventory
    for (const part of Loot.offered) {
      if (!part) continue;
      if (Loot.selected.includes(part.id)) {
        Game.inventory.push(part);
      } else {
        // Scrap value
        Game.scrap += PART_DEFS[part.type].mass * 2;
      }
    }
    Loot.offered = []; Loot.selected = [];

    if (Game.round > Game.maxRounds) {
      setState(STATE.WIN);
    } else {
      initAssembly(); // re-init assembly keeping existing placement
      setState(STATE.ASSEMBLY);
    }
  }

  drawVignette();
  drawScanlines();
}

// ── Override placeholder updateLoot (was empty)
// already defined above — JS just overwrites the earlier stub.

// ═══════════════════════════════════════════════════════════
//  PATCH: initAssembly preserves placed parts between rounds
// ═══════════════════════════════════════════════════════════
window.initAssembly = function() {
  const prevPlaced = (Assembly.placed && Assembly.placed.length > 0)
    ? JSON.parse(JSON.stringify(Assembly.placed)) : null;
  const prevWires  = (Assembly.wires && Assembly.wires.length > 0)
    ? JSON.parse(JSON.stringify(Assembly.wires)) : null;

  Assembly.placed = [];
  Assembly.wires = [];
  Assembly.wiringFrom = null;
  Assembly.dragging = null;
  Assembly.tab = 'parts';
  Assembly.palScroll = 0;

  const asmH = GRID_ROWS * GRID_SIZE;
  Assembly.gridOriginX = 60;
  Assembly.gridOriginY = (H - asmH) / 2;

  if (prevPlaced && prevPlaced.length > 0) {
    Assembly.placed = prevPlaced;
    Assembly.wires  = prevWires || [];
    recalcStats();
  } else {
    const chassis = createPart('chassis');
    const cx = Math.floor(GRID_COLS/2) - 1;
    const cy = Math.floor(GRID_ROWS/2) - 1;
    placeOnGrid(chassis, cx, cy);
  }
};

// ═══════════════════════════════════════════════════════════
//  FINAL BOOT PATCH
//  Re-expose createPart properly (was a stub in Part 1)
// ═══════════════════════════════════════════════════════════
// createPart is already properly defined in Part 2 — the stub in Part 1
// gets overwritten because JS parses all scripts top-to-bottom, and the
// real definition in Part 2 redefines it. Nothing to patch here.

console.log('[WRECK PROTOCOL] All systems loaded.');
</script>

<!-- PART 5: ARENA MODIFIERS + MUTATION SYSTEM -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  ARENA MODIFIERS
// ═══════════════════════════════════════════════════════════
const ARENA_MODIFIERS = {
  none:      { label:'ОБЫЧНЫЙ БОЙ',      color:'#4eff91', desc:'Никаких сюрпризов. Бейся честно.' },
  berserk:   { label:'БЕРСЕРК',           color:'#ff4444', desc:'Враги: ×1.5 урон, ×0.6 HP. Злее, слабее.' },
  slippery:  { label:'СКОЛЬЗКАЯ АРЕНА',   color:'#44aaff', desc:'Трение уменьшено. Все носятся как безумные.' },
  fog:       { label:'ТУМАН ВОЙНЫ',       color:'#888888', desc:'Видишь только ближних врагов.' },
  airdrop:   { label:'ВОЗДУШНЫЙ ДЕСАНТ',  color:'#ffcc44', desc:'Каждые 8 сек ящик с бонусом падает в центр.' },
  acid:      { label:'КИСЛОТНЫЕ ЛУЖИ',    color:'#88ff44', desc:'Зелёные зоны жгут всех кто в них стоит.' },
  vampires:  { label:'ВАМПИРЫ',           color:'#ff44aa', desc:'Враги лечатся от урона по тебе. Добей быстро.' },
  mirror:    { label:'ЗЕРКАЛО',           color:'#aaaaff', desc:'Твои пули рикошетят от стен 1 раз.' },
};

// Random modifier per round (round 1 always none)
function pickModifier(round) {
  if (round === 1) return 'none';
  const keys = Object.keys(ARENA_MODIFIERS);
  return keys[Math.floor(Math.random() * keys.length)];
}

// Acid puddle positions (generated per fight)
let acidPuddles = [];
function genAcidPuddles() {
  acidPuddles = [];
  for (let i = 0; i < 5; i++) {
    acidPuddles.push({
      x: 80 + Math.random() * (Arena.arenaW - 160),
      y: Arena.arenaY + 60 + Math.random() * (Arena.arenaH - 120),
      r: 35 + Math.random() * 25,
    });
  }
}

// Airdrop timer
let airdropTimer = 0;
const AIRDROP_INTERVAL = 480; // 8 sec

function spawnAirdrop() {
  const x = Arena.arenaW/2 + (Math.random()-0.5)*200;
  const y = Arena.arenaY + Arena.arenaH/2 + (Math.random()-0.5)*150;
  // Randomly either scrap or heal or weapon
  const roll = Math.random();
  if (roll < 0.4) {
    Arena.pickups.push({ x, y, type:'scrap', value: 15+Math.floor(Math.random()*15) });
  } else if (roll < 0.7) {
    Arena.pickups.push({ x, y, type:'heal', value: 40 });
  } else {
    const pool = [...SHOP_WEAPON_POOL, ...SHOP_UTIL_POOL];
    Arena.pickups.push({ x, y, type:'part', partType: pool[Math.floor(Math.random()*pool.length)] });
  }
  spawnParticles(x, Arena.arenaY+10, '#ffcc44', 15, 3, 60);
}

// Draw modifier banner (first 2 sec of fight)
function drawModifierBanner() {
  const mod = ARENA_MODIFIERS[Arena.modifier] || ARENA_MODIFIERS.none;
  const alpha = Math.max(0, 1 - Arena.frame / 100);
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  fillRect(0, H/2-50, W, 100, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = mod.color;
  ctx.font = 'bold 28px "Courier New",monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = mod.color; ctx.shadowBlur = 20;
  ctx.fillText('⚠ ' + mod.label, W/2, H/2 - 8);
  ctx.shadowBlur = 0;
  ctx.fillStyle = C.textDim; ctx.font = '14px "Courier New",monospace';
  ctx.fillText(mod.desc, W/2, H/2 + 20);
  ctx.restore();
}

function applyModifierToEnemies(enemies) {
  const mod = Arena.modifier;
  if (mod === 'berserk') {
    enemies.forEach(e => { e.damage = Math.round(e.damage * 1.5); e.hp = Math.round(e.hp * 0.6); e.maxHP = e.hp; });
  }
  if (mod === 'vampires') {
    enemies.forEach(e => { e.vampire = true; });
  }
}

// Override startArena to inject modifier
const _origStartArena = window.startArena || function(){};
window.startArena = function() {
  // Pick modifier before starting
  Arena.modifier = pickModifier(Game.round);
  airdropTimer = AIRDROP_INTERVAL;
  acidPuddles = [];
  if (Arena.modifier === 'acid') genAcidPuddles();
  // Call original
  _origStartArena();
  // Apply to enemies after they spawn
  applyModifierToEnemies(Arena.enemies);
};

// Draw acid puddles
function drawAcidPuddles() {
  if (Arena.modifier !== 'acid') return;
  for (const p of acidPuddles) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#44ff44';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#88ff44'; ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function updateModifierEffects() {
  const R = Arena.robot;
  const mod = Arena.modifier;

  // Slippery: increase robot friction (less deceleration = more slide)
  if (mod === 'slippery') {
    R.vx *= 1.04; R.vy *= 1.04; // counteract movement deceleration a bit
    for (const e of Arena.enemies) { e.vx *= 1.04; e.vy *= 1.04; }
  }

  // Fog: no gameplay effect here, handled in draw
  // Acid: damage in puddles
  if (mod === 'acid') {
    for (const p of acidPuddles) {
      if (Math.hypot(R.x-p.x, R.y-p.y) < p.r) {
        if (!(Arena._acidTimer > 0)) { damageRobot(4); Arena._acidTimer = 30; }
      }
      for (const e of Arena.enemies) {
        if (Math.hypot(e.x-p.x, e.y-p.y) < p.r) {
          if (!e._acidTimer || e._acidTimer<=0) { e.hp -= 3; e._acidTimer = 30; if (e.hp<=0) killEnemy(Arena.enemies.indexOf(e)); }
        }
        if (e._acidTimer > 0) e._acidTimer--;
      }
    }
    if (Arena._acidTimer > 0) Arena._acidTimer--;
  }

  // Airdrop: spawn crates
  if (mod === 'airdrop') {
    airdropTimer--;
    if (airdropTimer <= 0) { spawnAirdrop(); airdropTimer = AIRDROP_INTERVAL; }
  }

  // Vampire: enemies heal on melee hit (handled in damageRobot patch below)
}

// Pickup heal type
const _origUpdatePickups = window.updatePickups || function(){};
window.updatePickups = function() {
  const R = Arena.robot;
  for (let i = Arena.pickups.length-1; i >= 0; i--) {
    const p = Arena.pickups[i];
    if (p.type === 'heal' && Math.hypot(p.x-R.x, p.y-R.y) < R.radius + 14) {
      R.hp = Math.min(R.maxHP, R.hp + p.value);
      spawnParticles(p.x, p.y, '#44ff88', 10, 3);
      Arena.pickups.splice(i,1);
      updateHUD();
      continue;
    }
  }
  _origUpdatePickups();
};

// Fog: darken distant enemies in draw
function drawEnemiesFog() {
  if (Arena.modifier !== 'fog') return;
  const R = Arena.robot;
  for (const e of Arena.enemies) {
    const dist = Math.hypot(e.x-R.x, e.y-R.y);
    if (dist > 200) {
      ctx.save();
      const alpha = Math.min(0.95, (dist-200)/150);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C.bg;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+6, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// Mirror bullets: bounce off walls once
function updateMirrorBullets() {
  if (Arena.modifier !== 'mirror') return;
  for (const b of Arena.bullets) {
    if (b._bounced) continue;
    if (b.x < 4)               { b.vx = Math.abs(b.vx); b._bounced = true; }
    if (b.x > Arena.arenaW-4)  { b.vx = -Math.abs(b.vx); b._bounced = true; }
    if (b.y < Arena.arenaY+4)  { b.vy = Math.abs(b.vy); b._bounced = true; }
    if (b.y > Arena.arenaY+Arena.arenaH-4) { b.vy = -Math.abs(b.vy); b._bounced = true; }
  }
}

// Patch updateArena to call modifier hooks
const _origUpdateArena = window.updateArena;
window.updateArena = function() {
  _origUpdateArena();
  // Overlay effects (called after original draw)
  if (!Arena.result) {
    updateModifierEffects();
    updateMirrorBullets();
  }
  drawAcidPuddles();
  drawEnemiesFog();
  drawModifierBanner();
};

// ═══════════════════════════════════════════════════════════
//  MUTATION SYSTEM
// ═══════════════════════════════════════════════════════════
const MUTATIONS_DEF = [
  { id:'speed',      label:'⚡ ФОРСАЖ',         color:'#44aaff', desc:'Базовая скорость +35%' },
  { id:'damage',     label:'💥 ОСТРЫЕ УГЛЫ',    color:'#ff6644', desc:'Урон всего оружия ×1.3' },
  { id:'hp',         label:'🛡 БРОНЕВИК',        color:'#44ff88', desc:'+100 к максимальному ПЗ' },
  { id:'shield',     label:'💠 НАНОЩИТ',         color:'#4488ff', desc:'+60 щита, регенерация ×2' },
  { id:'regen',      label:'🔋 РЕГЕНЕРАЦИЯ',     color:'#44ffcc', desc:'+3 ПЗ/сек автовосстановление' },
  { id:'multishot',  label:'🔫 ОЧЕРЕДЬ',         color:'#ff88ff', desc:'Каждый 4й выстрел — тройной залп' },
  { id:'explosive',  label:'💣 КАССЕТНЫЕ',       color:'#ffcc44', desc:'Пули взрываются при ударе (АоЕ)' },
  { id:'vampire',    label:'🩸 ВАМПИРИЗМ',       color:'#ff4488', desc:'15% нанесённого урона → ПЗ тебе' },
  { id:'magnet',     label:'🧲 МАГНИТ',          color:'#ccaaff', desc:'Автоподбор лома с большого расстояния' },
  { id:'overclock',  label:'🔥 РАЗГОН',          color:'#ffaa44', desc:'Скорострельность ×1.5, но +20% перегрев' },
];

const Mutation = {
  offered: [],   // 3 random mutations shown
  picked: null,
};

// Active mutations on robot (accumulated across rounds)
Game.mutations = Game.mutations || [];

function pickMutations() {
  const available = MUTATIONS_DEF.filter(m => !Game.mutations.includes(m.id));
  const shuffled = available.sort(() => Math.random()-0.5);
  Mutation.offered = shuffled.slice(0, 3);
  Mutation.picked = null;
}

// Apply all active mutations to robot stats after startArena builds robot
function applyMutations(R) {
  for (const id of Game.mutations) {
    if (id === 'speed')     R.speed    *= 1.35;
    if (id === 'hp')        { R.maxHP += 100; R.hp = Math.min(R.hp + 100, R.maxHP); }
    if (id === 'shield')    { R.maxShield = (R.maxShield||0) + 60; R.shield = (R.shield||0) + 60; R.shieldRegen = (R.shieldRegen||0) + 0.6; }
    if (id === 'regen')     R._regenRate = (R._regenRate||0) + 3;
    if (id === 'overclock') R.weapons.forEach(w => { w.def = Object.assign({}, w.def, { fireRate: Math.round(w.def.fireRate / 1.5) }); });
  }
}

// Patch startArena to apply mutations
const _startArenaWithMod = window.startArena;
window.startArena = function() {
  _startArenaWithMod();
  applyMutations(Arena.robot);
};

// Regen tick in movement update
const _origUpdateRobotMovement = window.updateRobotMovement;
window.updateRobotMovement = function() {
  _origUpdateRobotMovement();
  const R = Arena.robot;
  if (R._regenRate && Arena.frame % 60 === 0) {
    R.hp = Math.min(R.maxHP, R.hp + R._regenRate);
    updateHUD();
  }
  // Magnet: auto-collect scrap from far
  if (Game.mutations.includes('magnet')) {
    for (let i = Arena.pickups.length-1; i >= 0; i--) {
      const p = Arena.pickups[i];
      const d = Math.hypot(p.x-R.x, p.y-R.y);
      if (d < 120) { // extra range
        const ang = Math.atan2(R.y-p.y, R.x-p.x);
        p.x += Math.cos(ang)*4; p.y += Math.sin(ang)*4;
      }
    }
  }
};

// Damage mutations: explosive + vampire
const _origDamageEnemy = window.damageEnemy;
window.damageEnemy = function(idx, dmg, bvx=0, bvy=0) {
  _origDamageEnemy(idx, dmg, bvx, bvy);
  const R = Arena.robot;

  // Vampire: heal player
  if (Game.mutations.includes('vampire')) {
    R.hp = Math.min(R.maxHP, R.hp + dmg * 0.15);
    updateHUD();
  }
  // Explosive: AoE splash
  if (Game.mutations.includes('explosive')) {
    const src = Arena.enemies[idx];
    const ex = src ? src.x : R.x + bvx, ey = src ? src.y : R.y + bvy;
    spawnParticles(ex||R.x, ey||R.y, '#ffaa44', 10, 4, 25);
    for (let j = Arena.enemies.length-1; j >= 0; j--) {
      if (j === idx) continue;
      const e2 = Arena.enemies[j];
      if (e2 && Math.hypot(e2.x-(ex||R.x), e2.y-(ey||R.y)) < 55) {
        e2.hp -= dmg * 0.4;
        if (e2.hp <= 0) killEnemy(j);
      }
    }
  }
};

// Multishot counter
let _multishotCounter = 0;
const _origFireWeapon = window.fireWeapon;
window.fireWeapon = function(wi, R) {
  _origFireWeapon(wi, R);
  if (Game.mutations.includes('multishot')) {
    _multishotCounter++;
    if (_multishotCounter >= 4) {
      _multishotCounter = 0;
      // Fire 2 extra bullets with small spread
      const w = R.weapons[wi];
      if (!w) return;
      let angle = R.angle;
      const nearest = Arena.enemies.reduce((best, e) => {
        const d = Math.hypot(e.x-R.x, e.y-R.y);
        return (!best || d < best.d) ? {e, d} : best;
      }, null);
      if (nearest) angle = Math.atan2(nearest.e.y-R.y, nearest.e.x-R.x);
      for (const da of [-0.2, 0.2]) {
        const bx = R.x + Math.cos(angle+da)*(R.radius+4);
        const by = R.y + Math.sin(angle+da)*(R.radius+4);
        spawnBullet(bx, by, angle+da, w.def, true);
      }
    }
  }
};

// ── Mutation screen (STATE.MUTATION = 6)
function updateMutation() {
  fillRect(0, 0, W, H, C.bg);
  drawGrid(0, 0, W, H, 40, '#0b150b');

  ctx.fillStyle = C.accent; ctx.font='bold 22px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('МУТАЦИЯ ПРОТОКОЛА', W/2, 40);
  ctx.fillStyle = C.textDim; ctx.font='13px "Courier New",monospace';
  ctx.fillText('Выбери одно постоянное улучшение робота', W/2, 64);

  const cardW = 230, cardH = 180, gap = 20;
  const total = Mutation.offered.length * cardW + (Mutation.offered.length-1)*gap;
  const sx = W/2 - total/2;

  Mutation.offered.forEach((m, i) => {
    const cx2 = sx + i*(cardW+gap), cy2 = H/2 - cardH/2 - 20;
    const hov = isHover(cx2, cy2, cardW, cardH);
    const sel = Mutation.picked === m.id;

    fillRect(cx2, cy2, cardW, cardH, sel ? '#0f2a1f' : (hov ? '#0d1f0d' : '#080f08'));
    strokeRect(cx2, cy2, cardW, cardH, sel ? m.color : (hov ? '#2a5a2a' : C.border), sel ? 3 : 1);
    if (sel) {
      ctx.fillStyle = m.color; ctx.font='18px serif'; ctx.textAlign='center';
      ctx.fillText('✓', cx2+cardW-16, cy2+22);
    }
    ctx.save();
    ctx.shadowColor = m.color; ctx.shadowBlur = sel ? 18 : 0;
    ctx.fillStyle = m.color; ctx.font='bold 15px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText(m.label, cx2+cardW/2, cy2+40);
    ctx.restore();

    ctx.fillStyle = C.text; ctx.font='12px "Courier New",monospace'; ctx.textAlign='center';
    // Word wrap desc
    const words = m.desc.split(' ');
    let line='', ly=cy2+70;
    for (const w of words) {
      const t = line ? line+' '+w : w;
      if (t.length > 22 && line) { ctx.fillText(line, cx2+cardW/2, ly); line=w; ly+=18; }
      else line=t;
    }
    ctx.fillText(line, cx2+cardW/2, ly);

    // Effect preview
    ctx.fillStyle = C.textDim; ctx.font='11px "Courier New",monospace';
    ctx.fillText('ПОСТОЯННО', cx2+cardW/2, cy2+cardH-14);

    if (isClick(cx2, cy2, cardW, cardH)) Mutation.picked = m.id;
  });

  // Confirm / skip
  const bw2 = 220, bh2 = 36;
  const bx2 = W/2 - bw2/2, by2 = H/2 + cardH/2 + 20;
  const canConfirm = !!Mutation.picked;
  const hov2 = isHover(bx2, by2, bw2, bh2);
  drawButton(canConfirm ? `[ ПРИНЯТЬ МУТАЦИЮ ]` : `[ ВЫБЕРИ МУТАЦИЮ ]`, bx2, by2, bw2, bh2, hov2 && canConfirm);

  const skipX = W/2-60, skipY = by2+46;
  const hovSkip = isHover(skipX, skipY, 120, 24);
  ctx.fillStyle = hovSkip ? C.textDim : '#1a2a1a'; ctx.font='11px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('[ пропустить ]', W/2, skipY+16);

  if (canConfirm && hov2 && Mouse.clicked) {
    Game.mutations.push(Mutation.picked);
    Mutation.picked = null;
    initAssembly();
    setState(STATE.ASSEMBLY);
  }
  if (hovSkip && Mouse.clicked) {
    initAssembly();
    setState(STATE.ASSEMBLY);
  }

  drawVignette();
  drawScanlines();
}

// ── Patch prepLoot to go mutation→assembly instead of direct assembly
const _origPrepLoot = window.prepLoot;
window.prepLoot = function() {
  _origPrepLoot();
  // After loot, show mutation screen (not assembly directly)
};

// ── Patch loot confirm: after confirming loot go to MUTATION
// Patch inside updateLoot — find the setState(STATE.ASSEMBLY) call
// We do this by patching the flow in the loot click handler:
const _origUpdateLoot = window.updateLoot;
window.updateLoot = function() {
  // Temporarily swap setState so ASSEMBLY→MUTATION
  const _origSetState = window.setState;
  window.setState = function(s) {
    if (s === STATE.ASSEMBLY) {
      window.setState = _origSetState;
      pickMutations();
      _origSetState(STATE.MUTATION);
    } else {
      _origSetState(s);
    }
  };
  _origUpdateLoot();
  // If setState wasn't triggered this frame, restore
  if (window.setState !== _origSetState) window.setState = _origSetState;
};

<script>
'use strict';

Arena.pillars=[];

function genPillars(round){
  Arena.pillars=[];
  if(round<=1)return;
  const count=Math.min(2+Math.floor(round*0.7),7);
  const cx=Arena.arenaW/2, cy=Arena.arenaY+Arena.arenaH/2;
  for(let i=0;i<count;i++){
    let x,y,tries=0;
    do{
      x=70+Math.random()*(Arena.arenaW-140);
      y=Arena.arenaY+70+Math.random()*(Arena.arenaH-140);
      tries++;
    }while(tries<40&&Math.hypot(x-cx,y-cy)<110);
    Arena.pillars.push({x,y,r:16+Math.random()*14});
  }
}

function drawPillars(){
  for(const p of Arena.pillars){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(p.x+4,p.y+5,p.r,p.r*0.6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a2a1a';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a5a3a'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#4a7a4a'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(p.x-p.r*0.2,p.y-p.r*0.25,p.r*0.55,Math.PI,Math.PI*1.55); ctx.stroke();
    ctx.fillStyle='#2a5a2a';
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  }
}

function pillarHit(x,y,r){
  for(const p of Arena.pillars)
    if(Math.hypot(x-p.x,y-p.y)<p.r+r) return true;
  return false;
}

function pushOutPillar(obj,rad){
  for(const p of Arena.pillars){
    const dx=obj.x-p.x,dy=obj.y-p.y,dist=Math.hypot(dx,dy);
    const min=p.r+rad+1;
    if(dist<min&&dist>0.1){
      obj.x+=dx/dist*(min-dist);
      obj.y+=dy/dist*(min-dist);
      if(obj.vx!==undefined){
        const dot=obj.vx*(dx/dist)+obj.vy*(dy/dist);
        if(dot<0){obj.vx-=dot*(dx/dist)*0.8;obj.vy-=dot*(dy/dist)*0.8;}
      }
    }
  }
}

// Hook into startArena chain
const _saP=window.startArena;
window.startArena=function(){_saP();genPillars(Game.round);};

// Each frame: remove bullets hitting pillars, push robots out
function applyPillarPhysics(){
  for(let i=Arena.bullets.length-1;i>=0;i--){
    const b=Arena.bullets[i];
    if(pillarHit(b.x,b.y,b.r)){spawnParticles(b.x,b.y,'#4a8a4a',4,1.5,10);Arena.bullets.splice(i,1);}
  }
  for(let i=Arena.enemyBullets.length-1;i>=0;i--){
    const b=Arena.enemyBullets[i];
    if(pillarHit(b.x,b.y,b.r)){Arena.enemyBullets.splice(i,1);}
  }
  const R=Arena.robot;
  pushOutPillar(R,R.radius);
  for(const e of Arena.enemies) pushOutPillar(e,e.radius);
}

// Draw pillars on top of floor but below robots — inject after drawArenaBackground
const _uaP=window.updateArena;
window.updateArena=function(){
  _uaP();
  drawPillars();
  applyPillarPhysics();
};
</script>

<script>
'use strict';

// ── Boss spawns on rounds 4 and 7 instead of normal wave
function isBossRound(round){ return round===4||round===7; }

function spawnBossForRound(round){
  const cx=Arena.arenaW/2, cy=Arena.arenaY+Arena.arenaH/2;
  if(round===4) return [makeKuznetsBoss(cx,cy)];
  if(round===7) return [makeProtocolBoss(cx,cy)];
  return [];
}

function makeKuznetsBoss(x,y){
  return {
    type:'boss_kuznetс',
    label:'КУЗНЕЦ',
    x,y,vx:0,vy:0,angle:0,
    hp:500,maxHP:500,
    radius:38,
    color:'#2a3a5a',borderColor:'#ff8800',
    speed:1.1,damage:22,
    fireRate:55,bulletSpeed:5,range:500,shootRange:480,
    ai:'boss_kuznetс',
    fireCooldown:60,
    strafeDir:1,strafeSwitchTimer:0,
    dropPart:'gun_heavy',
    // Boss-specific
    phase:1,         // 1=normal, 2=enraged (<40% HP)
    droneSpawnTimer:0,
    shield:120,maxShield:120,
    _meleeCooldown:0,
  };
}

function makeProtocolBoss(x,y){
  return {
    type:'boss_protocol',
    label:'ПРОТОКОЛ-0',
    x,y,vx:0,vy:0,angle:0,
    hp:800,maxHP:800,
    radius:50,
    color:'#1a0a2a',borderColor:'#cc44ff',
    speed:1.4,damage:30,
    fireRate:35,bulletSpeed:7,range:600,shootRange:560,
    ai:'boss_protocol',
    fireCooldown:40,
    strafeDir:1,strafeSwitchTimer:0,
    dropPart:'laser',
    // Boss-specific
    teleportTimer:0,
    copyMutation:null,   // copies one player mutation
    burstMode:false,
    burstCount:0,
    _meleeCooldown:0,
  };
}

// ── Boss AI (injected into updateEnemies via type check)
function updateBossAI(e, R){
  const dx=R.x-e.x, dy=R.y-e.y;
  const dist=Math.hypot(dx,dy);
  const toPlayer=Math.atan2(dy,dx);
  e.angle=toPlayer;

  if(e.ai==='boss_kuznetс'){
    // Phase transition
    if(e.phase===1&&e.hp/e.maxHP<0.4){
      e.phase=2; e.speed=1.8; e.fireRate=30;
      spawnParticles(e.x,e.y,'#ff8800',30,5,60);
      triggerFlash('#ff8800',15);
    }
    // Shield blocks damage until drones dead
    if(e.shield>0&&Arena.frame%120===0) e.shield=Math.min(e.maxShield,e.shield+8);
    // Strafe + approach
    e.strafeSwitchTimer++;
    if(e.strafeSwitchTimer>90){e.strafeDir*=-1;e.strafeSwitchTimer=0;}
    const perp=toPlayer+Math.PI/2*e.strafeDir;
    const ideal=180;
    if(dist>ideal+40){e.vx+=Math.cos(toPlayer)*0.18;e.vy+=Math.sin(toPlayer)*0.18;}
    else if(dist<ideal-40){e.vx-=Math.cos(toPlayer)*0.12;e.vy-=Math.sin(toPlayer)*0.12;}
    e.vx+=Math.cos(perp)*0.15; e.vy+=Math.sin(perp)*0.15;
    // Drone spawn every 8 sec (only 2 drones max)
    e.droneSpawnTimer++;
    if(e.droneSpawnTimer>=480&&Arena.enemies.filter(x=>x.type==='drone').length<2){
      e.droneSpawnTimer=0;
      const a=Math.random()*Math.PI*2;
      const ne={...ENEMY_DEFS.swarm,type:'drone',label:'ДРОН',
        x:e.x+Math.cos(a)*70,y:e.y+Math.sin(a)*70,
        vx:0,vy:0,angle:0,
        hp:35,maxHP:35,radius:11,
        color:'#3a3a1a',borderColor:'#ffaa22',
        fireCooldown:80,strafeDir:1,strafeSwitchTimer:0,
        dropPart:null,_meleeCooldown:0};
      Arena.enemies.push(ne);
      spawnParticles(ne.x,ne.y,'#ffaa22',8,3,25);
    }
  }

  if(e.ai==='boss_protocol'){
    // Teleport every 5 sec
    e.teleportTimer++;
    if(e.teleportTimer>=300){
      e.teleportTimer=0;
      const ay=Arena.arenaY,ah=Arena.arenaH,aw=Arena.arenaW;
      e.x=80+Math.random()*(aw-160);
      e.y=ay+80+Math.random()*(ah-160);
      spawnParticles(e.x,e.y,'#cc44ff',20,4,40);
      triggerFlash('#cc44ff',8);
    }
    // Burst mode: 5-shot spread at 50% HP
    if(!e.burstMode&&e.hp/e.maxHP<0.5){
      e.burstMode=true;
      spawnParticles(e.x,e.y,'#cc44ff',25,5,50);
    }
    // Orbit player
    e.strafeSwitchTimer++;
    if(e.strafeSwitchTimer>150){e.strafeDir*=-1;e.strafeSwitchTimer=0;}
    const ideal2=220;
    const perp2=toPlayer+Math.PI/2*e.strafeDir;
    if(dist>ideal2+40){e.vx+=Math.cos(toPlayer)*0.2;e.vy+=Math.sin(toPlayer)*0.2;}
    else if(dist<ideal2-40){e.vx-=Math.cos(toPlayer)*0.15;e.vy-=Math.sin(toPlayer)*0.15;}
    e.vx+=Math.cos(perp2)*0.2; e.vy+=Math.sin(perp2)*0.2;
  }

  // Speed cap + friction
  const spd=Math.hypot(e.vx,e.vy);
  if(spd>e.speed){e.vx*=e.speed/spd;e.vy*=e.speed/spd;}
  e.vx*=0.88;e.vy*=0.88;
}

// ── Boss fire override
function bossFire(e,R){
  const toPlayer=Math.atan2(R.y-e.y,R.x-e.x);
  const bx=e.x+Math.cos(toPlayer)*(e.radius+8);
  const by=e.y+Math.sin(toPlayer)*(e.radius+8);

  if(e.ai==='boss_kuznetс'){
    // Triple spread in phase 2
    const shots=e.phase===2?3:1;
    for(let s=0;s<shots;s++){
      const ang=toPlayer+(s-1)*0.22;
      spawnBullet(bx,by,ang,{bulletSpeed:e.bulletSpeed,damage:e.damage,range:e.range},false);
    }
  }
  if(e.ai==='boss_protocol'){
    if(e.burstMode){
      // 5-way spread
      for(let s=0;s<5;s++){
        const ang=toPlayer+(s-2)*0.28;
        spawnBullet(bx,by,ang,{bulletSpeed:e.bulletSpeed,damage:e.damage*0.7,range:e.range},false);
      }
    } else {
      spawnBullet(bx,by,toPlayer,{bulletSpeed:e.bulletSpeed,damage:e.damage,range:e.range},false);
    }
  }
}

// ── Boss draw
function drawBoss(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.rotate(e.angle+Math.PI/2);

  // Glow aura
  ctx.save();
  ctx.globalAlpha=0.18+Math.sin(Arena.frame*0.05)*0.07;
  ctx.fillStyle=e.borderColor;
  ctx.beginPath(); ctx.arc(0,0,e.radius+12,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body (octagon for bosses)
  ctx.fillStyle=e.color;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    i===0?ctx.moveTo(Math.cos(a)*e.radius,Math.sin(a)*e.radius)
         :ctx.lineTo(Math.cos(a)*e.radius,Math.sin(a)*e.radius);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=e.borderColor; ctx.lineWidth=3; ctx.stroke();

  // Shield ring
  if(e.shield>0){
    ctx.save();
    ctx.globalAlpha=(e.shield/e.maxShield)*0.6;
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(0,0,e.radius+6,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Barrel
  ctx.fillStyle='#666';
  ctx.fillRect(-5,-e.radius-10,10,16);

  ctx.restore();

  // HP bar (wide, below boss)
  const bw=e.radius*3, bx2=e.x-bw/2, by2=e.y+e.radius+8;
  fillRect(bx2,by2,bw,8,'#111');
  fillRect(bx2,by2,bw*(e.hp/e.maxHP),8,e.hp/e.maxHP>0.4?e.borderColor:'#ff3333');
  if(e.maxShield){
    fillRect(bx2,by2-9,bw,6,'#112244');
    fillRect(bx2,by2-9,bw*(e.shield/e.maxShield),6,'#4488ff');
  }

  // Name + phase
  ctx.fillStyle=e.borderColor; ctx.font='bold 12px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText('⚠ '+e.label+(e.phase===2?' [БЕРСЕРК]':''),e.x,e.y-e.radius-14);
}

// Override damageEnemy for boss shield
const _origDE=window.damageEnemy;
window.damageEnemy=function(idx,dmg,bvx,bvy){
  const e=Arena.enemies[idx];
  if(e&&e.shield>0){
    const absorbed=Math.min(e.shield,dmg);
    e.shield-=absorbed;
    dmg-=absorbed;
    spawnParticles(e.x,e.y,'#4488ff',4,2,12);
    if(dmg<=0){spawnParticles(e.x,e.y,'#ff8800',3,1.5,8);return;}
  }
  _origDE(idx,dmg,bvx,bvy);
};

// Hook boss AI into enemy update — patch spawnEnemiesForRound
const _origSpawn=window.spawnEnemiesForRound;
window.spawnEnemiesForRound=function(round){
  if(isBossRound(round)) return spawnBossForRound(round);
  return _origSpawn(round);
};

// Hook boss draw + AI into drawEnemies / updateEnemies
const _origDrawEnemies=window.drawEnemies;
window.drawEnemies=function(){
  for(const e of Arena.enemies){
    if(e.ai&&e.ai.startsWith('boss_')) drawBoss(e);
  }
  _origDrawEnemies();
};

const _origUpdateEnemies=window.updateEnemies;
window.updateEnemies=function(){
  const R=Arena.robot;
  for(const e of Arena.enemies){
    if(!e.ai||!e.ai.startsWith('boss_')) continue;
    updateBossAI(e,R);
    e.x=Math.max(e.radius,Math.min(Arena.arenaW-e.radius,e.x));
    e.y=Math.max(Arena.arenaY+e.radius,Math.min(Arena.arenaY+Arena.arenaH-e.radius,e.y));
    e.fireCooldown--;
    const dist=Math.hypot(R.x-e.x,R.y-e.y);
    if(e.fireCooldown<=0&&dist<e.shootRange){
      e.fireCooldown=e.fireRate+Math.floor(Math.random()*20-10);
      bossFire(e,R);
    }
    const sep=e.radius+R.radius+4;
    if(dist<sep&&dist>0.1){
      const nx=(R.x-e.x)/dist,ny=(R.y-e.y)/dist;
      const overlap=sep-dist;
      e.x-=nx*overlap*0.3; e.y-=ny*overlap*0.3;
      if(!R.knockbackImmune){R.x+=nx*overlap*0.7;R.y+=ny*overlap*0.7;}
      if(!e._meleeCooldown||e._meleeCooldown<=0){
        damageRobot(e.damage*0.6); e._meleeCooldown=50;
      }
    }
    if(e._meleeCooldown>0)e._meleeCooldown--;
  }
  _origUpdateEnemies();
};
</script>

function applyEncounterAction(action){
  const allParts=Object.keys(PART_DEFS).filter(k=>k!=='chassis');
  const rareParts=['laser','gun_heavy','shield_gen','legs','jets','timer_fast'];
  switch(action){
    case 'take_parts':
      for(let i=0;i<2;i++) Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));
      break;
    case 'search_deep':
      for(let i=0;i<4;i++) Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));
      Game._bonusEnemyNext=(Game._bonusEnemyNext||0)+1;
      break;
    case 'take_scrap': Game.scrap+=25; break;
    case 'buy_rare':
      if(Game.scrap>=30){
        Game.scrap-=30;
        Game.inventory.push(createPart(rareParts[Math.floor(Math.random()*rareParts.length)]));
      } break;
    case 'trade':
      if(Game.inventory.length>=2){
        Game.inventory.splice(0,2);
        for(let i=0;i<3;i++) Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));
      } break;
    case 'rob':
      Game.scrap+=40; damageRobot(20); break;
    case 'bonus_mutation':{
      const avail=MUTATIONS_DEF.filter(m=>!Game.mutations.includes(m.id));
      if(avail.length){Game.mutations.push(avail[Math.floor(Math.random()*avail.length)].id);}

    case 'take_cache':
      Game.scrap+=20;
      Game.inventory.push(createPart(allParts[Math.floor(Math.random()*allParts.length)]));

    case 'leave': break;

const FONT_FAMILIES = [
  { id: 'pixel',    label: 'Пиксельный',   css: '"Press Start 2P",monospace' },
  { id: 'courier',  label: 'Courier New',  css: '"Courier New",monospace' },

  { id: 'system',   label: 'Системный',    css: 'system-ui,sans-serif' },
];

const FONT_CFG_KEY = 'wreck_font_v1';
function fontCfgLoad() {
  try { const r = localStorage.getItem(FONT_CFG_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { family: 'pixel', scale: 1.0, bold: false };
}
function fontCfgSave(cfg) {
  try { localStorage.setItem(FONT_CFG_KEY, JSON.stringify(cfg)); } catch(e) {}
}
let FontCfg = fontCfgLoad();

// Apply font config: patch ctx.font property to intercept all font assignments
(function() {
  const proto = CanvasRenderingContext2D.prototype;
  let _fontVal = '10px monospace';
  const _origDesc = Object.getOwnPropertyDescriptor(proto, 'font');
  Object.defineProperty(proto, 'font', {
    set(v) {
      // Replace font family and apply scale/bold
      const fam = FONT_FAMILIES.find(f => f.id === FontCfg.family) || FONT_FAMILIES[0];
      let patched = v
        .replace(/"Courier New",monospace/g, fam.css)
        .replace(/'Courier New',monospace/g, fam.css)
        .replace(/Courier New/g, fam.css);

      // Scale font size
      if (FontCfg.scale !== 1.0) {
        patched = patched.replace(/(\d+(?:\.\d+)?)px/g, (m, n) =>
          Math.round(parseFloat(n) * FontCfg.scale) + 'px');
      }
      // Bold override
      if (FontCfg.bold && !patched.startsWith('bold')) {
        patched = 'bold ' + patched;
      }
      _fontVal = patched;
      _origDesc.set.call(this, patched);
    },
    get() { return _fontVal; },
    configurable: true
  });
})();
