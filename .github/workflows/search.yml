name: Web Search

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        type: string

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Search
        run: |
          pip install duckduckgo-search requests beautifulsoup4 -q 2>/dev/null

          python3 << 'PYEOF'
          import json, sys, os, time

          query = os.environ['SEARCH_QUERY']
          results = []
          errors = []

          UA = 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'

          # Method 1: duckduckgo-search package
          try:
              from duckduckgo_search import DDGS
              with DDGS(headers={'User-Agent': UA}) as d:
                  for r in d.text(query, max_results=10):
                      results.append({
                          'title':   r.get('title', ''),
                          'url':     r.get('href', ''),
                          'content': r.get('body', '')
                      })
              print(f"Method 1 (DDGS): {len(results)} results")
          except Exception as e:
              errors.append(f'DDGS: {e}')
              print(f"Method 1 failed: {e}", file=sys.stderr)

          # Method 2: DDG HTML scrape (if method 1 got nothing)
          if not results:
              try:
                  import requests, urllib.parse
                  from bs4 import BeautifulSoup
                  q = urllib.parse.quote_plus(query)
                  r = requests.get(
                      f'https://html.duckduckgo.com/html/?q={q}',
                      headers={'User-Agent': UA},
                      timeout=15
                  )
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for tag in soup.find_all('div', class_='result'):
                      a = tag.find('a', class_='result__a')
                      snip = tag.find('a', class_='result__snippet')
                      if a:
                          results.append({
                              'title':   a.get_text(strip=True),
                              'url':     a.get('href', ''),
                              'content': snip.get_text(strip=True) if snip else ''
                          })
                  print(f"Method 2 (DDG HTML): {len(results)} results")
              except Exception as e:
                  errors.append(f'DDG HTML: {e}')
                  print(f"Method 2 failed: {e}", file=sys.stderr)

          # Method 3: Bing HTML scrape (last resort)
          if not results:
              try:
                  import requests, urllib.parse
                  from bs4 import BeautifulSoup
                  q = urllib.parse.quote_plus(query)
                  r = requests.get(
                      f'https://www.bing.com/search?q={q}',
                      headers={'User-Agent': UA},
                      timeout=15
                  )
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for li in soup.find_all('li', class_='b_algo')[:10]:
                      h2 = li.find('h2')
                      p = li.find('p')
                      if h2 and h2.find('a'):
                          results.append({
                              'title':   h2.get_text(strip=True),
                              'url':     h2.find('a').get('href', ''),
                              'content': p.get_text(strip=True) if p else ''
                          })
                  print(f"Method 3 (Bing): {len(results)} results")
              except Exception as e:
                  errors.append(f'Bing: {e}')
                  print(f"Method 3 failed: {e}", file=sys.stderr)

          output = {'query': query, 'results': results}
          if errors and not results:
              output['errors'] = errors

          with open('search_results.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"Final: {len(results)} results for {query!r}")
          PYEOF
        env:
          SEARCH_QUERY: ${{ inputs.query }}

      - name: Push results to search-results branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Switch to (or create) search-results branch
          git fetch origin search-results 2>/dev/null && \
              git checkout -B search-results origin/search-results || \
              git checkout --orphan search-results

          # Keep only the results file
          git rm -rf . --quiet 2>/dev/null || true
          cp search_results.json results.json 2>/dev/null || true

          git add results.json
          git commit -m "search: ${{ inputs.query }}" --allow-empty
          git push -f origin search-results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
