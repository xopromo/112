name: Tests

on:
  push:
    branches-ignore:
      - main
      - _config
      - _db
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: node --test tests/unit/*.test.cjs
