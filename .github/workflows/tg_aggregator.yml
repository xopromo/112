name: TG Aggregator

on:
  schedule:
    # Запуск 4 раза в день: 6:00, 10:00, 14:00, 18:00 UTC (9/13/17/21 МСК)
    - cron: '0 6,10,14,18 * * *'
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Max posts per run (default: 1)'
        default: '1'
      lookback_hours:
        description: 'Lookback window in hours (default: 5)'
        default: '5'

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tg_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r tg_agent/requirements.txt

      - name: Run aggregator
        env:
          TG_API_ID:       ${{ secrets.TG_API_ID }}
          TG_API_HASH:     ${{ secrets.TG_API_HASH }}
          TG_SESSION:      ${{ secrets.TG_SESSION }}
          BOT_TOKEN:       ${{ secrets.TG_BOT_TOKEN }}
          TARGET_CHANNEL:  ${{ secrets.TG_TARGET_CHANNEL }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          MAX_PER_RUN:     ${{ github.event.inputs.max_per_run || '1' }}
          LOOKBACK_HOURS:  ${{ github.event.inputs.lookback_hours || '5' }}
        run: python tg_agent/aggregator.py
