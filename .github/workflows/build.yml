name: Auto Build

on:
  push:
    branches: [main]
    paths:
      - 'shell.html'
      - 'ui.js'
      - 'core.js'
      - 'opt.js'
      - 'pine_export.js'
      - 'projects.js'
      - 'synthesis.js'
      - 'synthesis_worker.js'
      - 'pareto_front.js'
      - 'build.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: python3 build.py

      - name: Commit & push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add USE_Optimizer_v6_built.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "build: auto-update bundle [skip ci]" && \
            git push origin main
