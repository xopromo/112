name: Auto Build

on:
  push:
    branches: [main, 'claude/*']
    paths:
      - 'shell.html'
      - 'ui.js'
      - 'ui_*.js'
      - 'core.js'
      - 'opt.js'
      - 'pine_export.js'
      - 'projects.js'
      - 'synthesis.js'
      - 'synthesis_worker.js'
      - 'pareto_front.js'
      - 'build.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          node -c opt.js
          node -c core.js
          node -c ui.js
          node -c ui_oos.js
          node -c ui_hc.js
          node -c ui_ml.js
          node -c ui_heatmap.js
          node -c ui_projects.js
          node -c ui_comparator.js
          node -c ui_equity.js
          node -c ui_table.js
          node -c ui_queue.js
          node -c ui_archive.js
          node -c ui_detail.js
          node -c pine_export.js
          node -c filter_registry.js
          node -c synthesis.js
          node -c synthesis_worker.js
          node -c pareto_front.js
          node -c projects.js
          echo "✅ All JavaScript files have valid syntax"

      - name: Build
        run: python3 build.py

      - name: Commit & push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add USE_Optimizer_v6_built.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "build: auto-update bundle [skip ci]" && \
            git push origin HEAD
